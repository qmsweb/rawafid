- title: "اختبار الإدارة الصفية"
  subject-name: "الإدارة الصفية"
  subject-code: "EDUC317"
  questions:
    
    - type: instructions 
      mainTitle: أولا الأسئلة الموضوعية (الاختيار من متعدد)
      description: اختر الإجابة الصحيحة من بين البدائل المتاحة
      
    - type: mcq
      question: "أدرك مدير مدرسة أن المعلمين يشعرون بالإنهاك بعد فترة الامتحانات فقرر تنظيم يوم ترفيهي وتأجيل بعض المهام الإدارية. أي النظريات الإدارية يطبق هذا المدير"
      points: 1
      choices:
        - "السلوكية"
        - "التقليدية"
        - "الأوتوقراطية"
        - "الميكانيكية"
      answer: "السلوكية"
      
    - type: mcq
      question: "عندما تقوم إدارة المدرسة بتوزيع المعلمين على المهام حسب تخصصاتهم مع تقليل الهدر في استخدام الميزانية المخصصة للأنشطة فهي تحقق مبدأ"
      points: 1
      choices:
        - "الفاعلية"
        - "الكفاءة"
        - "التقويم"
        - "التنسيق"
      answer: "الكفاءة"
      
    - type: mcq
      question: "حدث تعارض بين موعد تدريب المعلمين وموعد رحلة طلابية. تدخل المدير لجدولة التدريب في يوم آخر. هذه الممارسة تعكس أي وظيفة من وظائف الإدارة"
      points: 1
      choices:
        - "التنظيم"
        - "التنسيق"
        - "الرقابة"
        - "التوجيه"
      answer: "التنسيق"
      
    - type: mcq
      question: "مدير يؤمن بأن المعلمين يبحثون دائما عن تحمل المسؤولية ويبادرون لإنجاز المهام دون رقابة لصيقة. هذا الاعتقاد يمثل"
      points: 1
      choices:
        - "نظرية X"
        - "نظرية Y"
        - "الإدارة التقليدية"
        - "الإدارة المتساهلة"
      answer: "نظرية Y"
      
    - type: mcq
      question: "من مؤشرات الإدارة المدرسية التي تفتقر إلى التخطيط"
      points: 1
      choices:
        - "كثرة اللجان المدرسية"
        - "تكرار الفعاليات وتضارب المواعيد"
        - "تفويض الصلاحيات"
        - "الشورى في اتخاذ القرار"
      answer: "تكرار الفعاليات وتضارب المواعيد"
      
    - type: mcq
      question: "إذا أراد مدير مدرسة تحفيز المعلمين لتجاوز أداء مهامهم الروتينية والوصول إلى مستوى الابتكار والريادة التربوية فالنمط الأنسب هو"
      points: 1
      choices:
        - "التحويلي"
        - "المتساهل"
        - "الأوتوقراطي"
        - "الفوضوي"
      answer: "التحويلي"
      
    - type: mcq
      question: "دمج التكنولوجيا في التعليم وتدريب المعلمين على استخدام الذكاء الاصطناعي يندرج تحت خصائص الإدارة المدرسية المتمثلة في"
      points: 1
      choices:
        - "ديمقراطية الإدارة"
        - "شمولية التقويم"
        - "القدرة على معايشة عصر المعلومات"
        - "التوازن بين المدرسة والمجتمع"
      answer: "القدرة على معايشة عصر المعلومات"
      
    - type: mcq
      question: "معلم جديد يحتاج إلى إرشاد مستمر في طرق التدريس. التدخل الإداري الأنسب لمساعدته يمثل وظيفة"
      points: 1
      choices:
        - "التقويم"
        - "التوجيه"
        - "التخطيط"
        - "التنسيق"
      answer: "التوجيه"
      
    - type: mcq
      question: "مدرسة تعاني من انعدام النظام وتأخر مستمر من المعلمين والطلاب دون حسيب أو رقيب. النمط الإداري السائد هنا هو"
      points: 1
      choices:
        - "الديمقراطي"
        - "الأوتوقراطي"
        - "المتساهل"
        - "التحويلي"
      answer: "المتساهل"
      
    - type: mcq
      question: "الموازنة بين اللوائح والقوانين المدرسية من جهة والظروف الإنسانية والاجتماعية للمعلمين من جهة أخرى تمثل جوهر"
      points: 1
      choices:
        - "النظرية التقليدية"
        - "النظرية الاجتماعية"
        - "الإدارة الأوتوقراطية"
        - "نظرية X"
      answer: "النظرية الاجتماعية"
      
    - type: instructions 
      mainTitle: ثانيا الأسئلة الموضوعية (صواب أو خطأ)
      description: حدد ما إذا كانت العبارة صحيحة أم خاطئة
      
    - type: tf
      question: "الإدارة المدرسية المعاصرة تكتفي بتنفيذ التعليمات الواردة من الجهات العليا دون إشراك المعلمين في اتخاذ القرار"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
      
    - type: tf
      question: "يعتبر التنسيق حلقة الوصل الفعالة بين مرحلتي التخطيط والتنفيذ في الإدارة المدرسية"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
      
    - type: tf
      question: "النمط الإداري الديمقراطي هو النمط المثالي الذي يجب على المدير تطبيقه في كل المواقف التربوية دون استثناء"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
      
    - type: tf
      question: "الإدارة فن لأنها تعتمد على القوانين والمعادلات الرياضية الثابتة التي لا تتغير بتغير الأفراد"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
      
    - type: tf
      question: "المتابعة الإدارية الفعالة تعني الرقابة البناءة التي تهدف إلى كشف القصور وعلاجه وليس مجرد تصيد الأخطاء"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
      
    - type: tf
      question: "التركيز على الإنتاجية وإهمال الجانب الإنساني والعلاقات بين العاملين من أبرز سمات النظرية التقليدية في الإدارة"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
      
    - type: tf
      question: "التقويم الشامل يقتصر على قياس مستوى تحصيل الطلبة في نهاية العام الدراسي فقط"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
      
    - type: tf
      question: "إنشاء مجالس أولياء الأمور وتفعيل دورها يقع ضمن ميدان علاقة المدرسة بالمجتمع"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
      
    - type: tf
      question: "النمط الإداري المتساهل يعزز من روح الابتكار والمبادرة المنظمة لدى جميع العاملين في المدرسة"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
      
    - type: tf
      question: "القيادة بالرؤية وإلهام المعلمين لتطوير بيئة التعلم هي من خصائص الإدارة المدرسية التحويلية"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
      
    - type: instructions
      mainTitle: ثالثا الأسئلة المقالية (التحليل والاستنتاج)
      description: أجب عن الأسئلة التالية بناء على فهمك للنصوص
      
    - type: essay
      question: "بناء على فهمك للنظرية الاجتماعية كيف يمكن لمدير مدرسة التعامل مع معلم متميز أكاديميا ولكنه يرفض الالتزام بمواعيد الحضور والانصراف بسبب ظروفه العائلية القهرية"
      points: 3
      answer: "يمكن للمدير الموازنة بين متطلبات الدور الوظيفي (القوانين) واحتياجات المعلم الإنسانية من خلال عقد جلسة حوارية معه لفهم ظروفه وتعديل جدول حصصه بما يتناسب مع ظرفه مؤقتا دون الإخلال بنظام المدرسة العام مما يحافظ على إنتاجيته وانتمائه"
      
    - type: essay
      question: "تواجه مدرسة تدنيا في مستوى تفاعل الطلاب مع الأنشطة اللاصفية. بصفتك مديرا للمدرسة اشرح خطوتين عمليتين من وظيفة التخطيط لمعالجة هذه المشكلة"
      points: 3
      answer: "الخطوة الأولى دراسة الواقع لمعرفة أسباب عزوف الطلاب (تحديد المشكلة). الخطوة الثانية وضع أهداف واضحة لزيادة التفاعل وصياغة خطة تتضمن أنشطة متنوعة وتحديد الموارد اللازمة وتوزيع المهام على لجان متخصصة لتنفيذها"
      
    - type: essay
      question: "قارن بين المدير الذي يتبنى نظرية X والمدير الذي يتبنى نظرية Y في كيفية تحفيز المعلمين"
      points: 3
      answer: "المدير وفق نظرية X يعتقد أن المعلمين يتهربون من العمل لذلك يعتمد على التحفيز السلبي كالعقاب والرقابة اللصيقة لتسيير العمل. بينما المدير وفق نظرية Y يرى أن المعلمين يحبون العمل والإنجاز لذلك يعتمد على التحفيز الإيجابي وتفويض الصلاحيات ومنحهم الحرية للابتكار"
      
    - type: essay
      question: "هل يمكن للمدير الناجح أن يستخدم النمط الأوتوقراطي في بعض المواقف اذكر موقفا يبرر ذلك"
      points: 3
      answer: "نعم يمكن ذلك فمدير المدرسة الناجح يطبق الإدارة الموقفية. يمكن استخدام النمط الأوتوقراطي في حالات الطوارئ التي تتطلب قرارات حاسمة وسريعة أو عند انتشار فوضى عارمة وعدم انضباط في المدرسة تتطلب إعادة فرض النظام بحزم"
      
    - type: essay
      question: "استنتج العلاقة بين وظيفتي التنظيم والتقويم في العملية الإدارية داخل المدرسة"
      points: 3
      answer: "التنظيم يعنى بتوزيع المهام وتحديد الصلاحيات لتنفيذ العمل بانتظام في حين يأتي التقويم لقياس مدى نجاح هذا التنظيم في تحقيق الأهداف المرجوة وتحديد نقاط الضعف في توزيع المهام مما يعطي تغذية راجعة للإدارة لإعادة هيكلة التنظيم إذا لزم الأمر"
      
    - type: instructions
      description: انتهى الاختبار، ردد معي اللهم إني استودعتك ما قرأتُ وما حفظتُ وما تعلمتُ، فرده إليّ عند حاجتي إليه، إنك على كل شيء قدير.
