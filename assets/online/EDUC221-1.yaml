- title: "اختبار في الوحدة الأولى (المفاهيم الأساسية)"
  subject-name: "تكنولوجيا التعليم والتعلم"
  subject-code: "EDUC 221"
  questions: 
    - type: "instructions"
      mainTitle: "أولا الأسئلة الموضوعية (اختيار من متعدد)"
      description: "تخير الإجابة الصحيحة من بين البدائل المعطاة"
    - type: "mcq"
      question: "متى ظهرت مرحلة التركيز على تكنولوجيا التعليم كعملية تصميم منهجية حسب مراحل تطور المفهوم؟"
      points: 1
      choices:
        - "أوائل القرن العشرين"
        - "1940 - 1950"
        - "1960 - 1970"
        - "1977 - 1999"
      answer: "1977 - 1999"
    - type: "mcq"
      question: "أي مما يلي يمثل المعنى الاصطلاحي الدقيق لـ (التكنولوجيا)؟"
      points: 1
      choices:
        - "مجموعة الأجهزة والمعدات الحديثة فقط في أي مجال"
        - "التطبيق المنظم للمعرفة القائمة على أسس علمية في مواقف عملية"
        - "المهارة الفنية اليدوية لإنتاج الأدوات"
        - "دراسة النظريات العلمية دون تطبيقها"
      answer: "التطبيق المنظم للمعرفة القائمة على أسس علمية في مواقف عملية"
    - type: "mcq"
      question: "ما الفرق الأساسي بين التربية والتعليم من حيث الشمولية؟"
      points: 2
      choices:
        - "التعليم أعم وأشمل من التربية"
        - "التربية تركز على الجانب العقلي فقط بينما التعليم يشمل الجوانب الروحية"
        - "التعليم أضيق نطاقا ويركز على الجانب العقلي والمعرفي، بينما التربية أعم وأشمل"
        - "لا يوجد فرق بينهما، فكلاهما مصطلحان مترادفان"
      answer: "التعليم أضيق نطاقا ويركز على الجانب العقلي والمعرفي، بينما التربية أعم وأشمل"
    - type: "mcq"
      question: "معلم يعتقد أن تكنولوجيا التعليم هي مجرد أجهزة لعرض المحتوى وتوفر السبورة الذكية فقط، ما المفهوم الخاطئ الذي وقع فيه؟"
      points: 2
      choices:
        - "اعتقاده أن التكنولوجيا تزيد من الفجوة بين الطلاب"
        - "اعتقاده أنها مجرد أجهزة وليست عملية منظمة تستهدف تطبيق المعرفة العلمية لحل مشكلات التعلم"
        - "استخدامه لبرامج قديمة بدلا من الحديثة"
        - "اعتماده على الأجهزة مع عدم وجود فني صيانة في المدرسة"
      answer: "اعتقاده أنها مجرد أجهزة وليست عملية منظمة تستهدف تطبيق المعرفة العلمية لحل مشكلات التعلم"
    - type: "instructions"
      mainTitle: "ثانيا الأسئلة الموضوعية (صواب أو خطأ)"
      description: "حدد ما إذا كانت العبارة صحيحة أم خاطئة"
    - type: "tf"
      question: "تكنولوجيا التعليم والوسائل التعليمية مصطلحان مترادفان يحل أحدهما محل الآخر."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
    - type: "tf"
      question: "يقتصر مفهوم التكنولوجيا على مجال التعليم فقط دون المجالات الإنسانية الأخرى كالطب والزراعة."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
    - type: "tf"
      question: "من المشكلات التربوية لدمج التكنولوجيا، الاعتماد عليها كوسيط في التعليم وليس كأساس في التعلم."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
    - type: "tf"
      question: "في عصر التكنولوجيا، تحول دور المعلم ليصبح المصدر الوحيد للمعلومات والمسؤول عن التلقين المباشر."
      points: 2
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
    - type: "instructions"
      mainTitle: "ثالثا الأسئلة المقالية (التحليل والاستنتاج)"
      description: "أجب عن الأسئلة التالية بناء على فهمك للنصوص"
    - type: "essay"
      question: "وضح التحدي المتمثل في (تغير دور المعلم) في ظل دمج التقنيات الحديثة في التعليم."
      points: 3
      answer: "لم يعد المعلم المصدر الوحيد للتعلم والمعلومات بظهور الشبكات العالمية وقواعد المعلومات، بل تغير دوره من المنفذ والمسيطر إلى المخطط والموجه والمرشد للمتعلمين للاستفادة من مصادر المعلومات وتوظيفها في التعلم."
    - type: "essay"
      question: "ناقش كيف تساهم التكلفة الاقتصادية وعدم توفر البرامج باللغة المحلية في الحد من فعالية دمج تكنولوجيا التعليم، مستندا إلى المشكلات الفنية والاقتصادية."
      points: 4
      answer: "تقف التكلفة العالية لتقنيات التعليم عائقا أمام المؤسسات لتوفيرها كمشكلة اقتصادية، ويترافق ذلك مع مشكلات فنية تتمثل في صعوبة الحصول على برامج تعليمية مناسبة باللغات المحلية، مما يحد من قدرة الكثيرين على الاستخدام الفعال للتقانة والاستفادة من الخيارات المعلوماتية المتاحة."
    - type: "instructions"
      description: "انتهى الاختبار، ردد معي اللهم إني استودعتك ما قرأتُ وما حفظتُ وما تعلمتُ، فرده إليّ عند حاجتي إليه، إنك على كل شيء قدير."
