- title: اختبار في الوحدة الأولى (المفاهيم الأساسية)
  subject-name: تكنولوجيا التعليم والتعلم
  subject-code: EDUC 221
  questions: 
    - type: instructions
      mainTitle: أولا الأسئلة الموضوعية (اختيار من متعدد)
      description: تخير الإجابة الصحيحة من بين البدائل المعطاة
    - type: mcq
      [span_0](start_span)question: متى ظهرت مرحلة التركيز على تكنولوجيا التعليم كعملية تصميم منهجية حسب مراحل تطور المفهوم؟[span_0](end_span)
      points: 1
      choices:
        - أوائل القرن العشرين
        - 1940 - 1950
        - 1960 - 1970
        - 1977 - 1999
      [span_1](start_span)answer: 1977 - 1999[span_1](end_span)
    - type: mcq
      [span_2](start_span)question: أي مما يلي يمثل المعنى الاصطلاحي الدقيق لـ (التكنولوجيا)؟[span_2](end_span)
      points: 1
      choices:
        - مجموعة الأجهزة والمعدات الحديثة فقط في أي مجال
        - التطبيق المنظم للمعرفة القائمة على أسس علمية في مواقف عملية
        - المهارة الفنية اليدوية لإنتاج الأدوات
        - دراسة النظريات العلمية دون تطبيقها
      [span_3](start_span)answer: التطبيق المنظم للمعرفة القائمة على أسس علمية في مواقف عملية[span_3](end_span)
    - type: mcq
      [span_4](start_span)question: ما الفرق الأساسي بين التربية والتعليم من حيث الشمولية؟[span_4](end_span)
      points: 2
      choices:
        - التعليم أعم وأشمل من التربية
        - التربية تركز على الجانب العقلي فقط بينما التعليم يشمل الجوانب الروحية
        - التعليم أضيق نطاقا ويركز على الجانب العقلي والمعرفي، بينما التربية أعم وأشمل
        - لا يوجد فرق بينهما، فكلاهما مصطلحان مترادفان
      [span_5](start_span)answer: التعليم أضيق نطاقا ويركز على الجانب العقلي والمعرفي، بينما التربية أعم وأشمل[span_5](end_span)
    - type: mcq
      [span_6](start_span)question: معلم يعتقد أن تكنولوجيا التعليم هي مجرد أجهزة لعرض المحتوى وتوفر السبورة الذكية فقط، ما المفهوم الخاطئ الذي وقع فيه؟[span_6](end_span)
      points: 2
      choices:
        - اعتقاده أن التكنولوجيا تزيد من الفجوة بين الطلاب
        - اعتقاده أنها مجرد أجهزة وليست عملية منظمة تستهدف تطبيق المعرفة العلمية لحل مشكلات التعلم
        - استخدامه لبرامج قديمة بدلا من الحديثة
        - اعتماده على الأجهزة مع عدم وجود فني صيانة في المدرسة
      [span_7](start_span)answer: اعتقاده أنها مجرد أجهزة وليست عملية منظمة تستهدف تطبيق المعرفة العلمية لحل مشكلات التعلم[span_7](end_span)
    - type: instructions
      mainTitle: ثانيا الأسئلة الموضوعية (صواب أو خطأ)
      description: حدد ما إذا كانت العبارة صحيحة أم خاطئة
    - type: tf
      [span_8](start_span)question: تكنولوجيا التعليم والوسائل التعليمية مصطلحان مترادفان يحل أحدهما محل الآخر.[span_8](end_span)
      points: 1
      choices:
        - صح
        - خطأ
      [span_9](start_span)answer: خطأ[span_9](end_span)
    - type: tf
      [span_10](start_span)question: يقتصر مفهوم التكنولوجيا على مجال التعليم فقط دون المجالات الإنسانية الأخرى كالطب والزراعة.[span_10](end_span)
      points: 1
      choices:
        - صح
        - خطأ
      [span_11](start_span)answer: خطأ[span_11](end_span)
    - type: tf
      [span_12](start_span)question: من المشكلات التربوية لدمج التكنولوجيا، الاعتماد عليها كوسيط في التعليم وليس كأساس في التعلم.[span_12](end_span)
      points: 1
      choices:
        - صح
        - خطأ
      [span_13](start_span)answer: صح[span_13](end_span)
    - type: tf
      [span_14](start_span)question: في عصر التكنولوجيا، تحول دور المعلم ليصبح المصدر الوحيد للمعلومات والمسؤول عن التلقين المباشر.[span_14](end_span)
      points: 2
      choices:
        - صح
        - خطأ
      [span_15](start_span)answer: خطأ[span_15](end_span)
    - type: instructions
      mainTitle: ثالثا الأسئلة المقالية (التحليل والاستنتاج)
      description: أجب عن الأسئلة التالية بناء على فهمك للنصوص
    - type: essay
      [span_16](start_span)question: وضح التحدي المتمثل في (تغير دور المعلم) في ظل دمج التقنيات الحديثة في التعليم.[span_16](end_span)
      points: 3
      [span_17](start_span)answer: لم يعد المعلم المصدر الوحيد للتعلم والمعلومات بظهور الشبكات العالمية وقواعد المعلومات، بل تغير دوره من المنفذ والمسيطر إلى المخطط والموجه والمرشد للمتعلمين للاستفادة من مصادر المعلومات وتوظيفها في التعلم.[span_17](end_span)
    - type: essay
      [span_18](start_span)question: ناقش كيف تساهم التكلفة الاقتصادية وعدم توفر البرامج باللغة المحلية في الحد من فعالية دمج تكنولوجيا التعليم، مستندا إلى المشكلات الفنية والاقتصادية.[span_18](end_span)
      points: 4
      [span_19](start_span)answer: تقف التكلفة العالية لتقنيات التعليم عائقا أمام المؤسسات لتوفيرها كمشكلة اقتصادية[span_19](end_span)[span_20](start_span)، ويترافق ذلك مع مشكلات فنية تتمثل في صعوبة الحصول على برامج تعليمية مناسبة باللغات المحلية[span_20](end_span)[span_21](start_span)، مما يحد من قدرة الكثيرين على الاستخدام الفعال للتقانة والاستفادة من الخيارات المعلوماتية المتاحة[span_21](end_span).
    - type: instructions
      description: انتهى الاختبار، ردد معي اللهم إني استودعتك ما قرأتُ وما حفظتُ وما تعلمتُ، فرده إليّ عند حاجتي إليه، إنك على كل شيء قدير.
