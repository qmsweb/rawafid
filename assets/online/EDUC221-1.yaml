- title: "اختبار في الوحدة الثانية (الاتصال التعليمي)"
  subject-name: "تكنولوجيا التعليم والتعلم"
  subject-code: "EDUC 221"
  questions: 
    - type: "instructions"
      mainTitle: "أولا الأسئلة الموضوعية (اختيار من متعدد)"
      description: "تخير الإجابة الصحيحة من بين البدائل المعطاة"
    - type: "mcq"
      question: "ما هو الأصل اللغوي لمصطلح الاتصال (Communication)؟"
      points: 1
      choices:
        - "يرجع للأصل اليوناني ويعني التلقين"
        - "يرجع للأصل اللاتيني Commuis ويعني عام أو شائع"
        - "يرجع للأصل الفرنسي ويعني النقل المباشر"
        - "يرجع للأصل الإنجليزي ويعني التحدث"
      [span_0](start_span)answer: "يرجع للأصل اللاتيني Commuis ويعني عام أو شائع[span_0](end_span)"
    - type: "mcq"
      question: "في نموذج شانون وويفر للاتصال، ما هو أبرز أوجه القصور؟"
      points: 2
      choices:
        - "عدم اهتمامه بمصدر المعلومات"
        - "غياب عنصر الاستجابة أو التغذية الراجعة"
        - "اعتماده على الاتصال متعدد الاتجاهات"
        - "تجاهله لعنصر التشويش"
      [span_1](start_span)answer: "غياب عنصر الاستجابة أو التغذية الراجعة[span_1](end_span)"
    - type: "mcq"
      question: "إذا كان الطالب يشعر بالجوع الشديد أو النعاس أثناء الشرح مما أعاق فهمه، فما نوع هذا التشويش؟"
      points: 2
      choices:
        - "عوامل نفسية"
        - "عوامل جسمية"
        - "عوامل فيزيائية (بيئية)"
        - "ضعف مهارات الاتصال لدى المرسل"
      [span_2](start_span)answer: "عوامل جسمية[span_2](end_span)"
    - type: "mcq"
      question: "كيف يختلف الاتصال الدائري عن نموذج أرسطو الخطي بشكل جوهري؟"
      points: 3
      choices:
        - "نموذج أرسطو دائري بينما الاتصال الدائري خطي"
        - "نموذج أرسطو يهتم بالتغذية الراجعة بينما الدائري يتجاهلها"
        - "نموذج أرسطو يسير في اتجاه واحد بينما الدائري عملية ديناميكية يتم فيها تبادل الأدوار"
        - "كلاهما يسير في اتجاه واحد ولكن الدائري يستخدم قنوات حديثة"
      [span_3](start_span)[span_4](start_span)answer: "نموذج أرسطو يسير في اتجاه واحد بينما الدائري عملية ديناميكية يتم فيها تبادل الأدوار[span_3](end_span)[span_4](end_span)"
    - type: "instructions"
      mainTitle: "ثانيا الأسئلة الموضوعية (صواب أو خطأ)"
      description: "حدد ما إذا كانت العبارة صحيحة أم خاطئة"
    - type: "tf"
      question: "الاتصال التعليمي يقتصر فقط على التفاعل اللفظي بين المعلم والمتعلم."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      [span_5](start_span)answer: "خطأ[span_5](end_span)"
    - type: "tf"
      question: "حسب نموذج بيرلو للاتصال، يتأثر المرسل بمهارات الاتصال والاتجاهات والمستوى الثقافي."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      [span_6](start_span)answer: "صح[span_6](end_span)"
    - type: "tf"
      question: "الاتصال متعدد الاتجاهات يعطي الفرصة الكافية للمرسل والمستقبل للمحادثة والمناقشة وتبادل الآراء."
      points: 2
      choices:
        - "صح"
        - "خطأ"
      [span_7](start_span)answer: "صح[span_7](end_span)"
    - type: "tf"
      question: "من نقاط القوة في نموذج لاسويل أنه يقدم نموذجاً دائرياً يعتمد على التغذية الراجعة بشكل أساسي."
      points: 2
      choices:
        - "صح"
        - "خطأ"
      [span_8](start_span)answer: "خطأ[span_8](end_span)"
    - type: "instructions"
      mainTitle: "ثالثا الأسئلة المقالية (التحليل والاستنتاج)"
      description: "أجب عن الأسئلة التالية بناء على فهمك للنصوص"
    - type: "essay"
      question: "تعتبر (الرسالة) قلب عملية الاتصال التعليمي. اذكر المكونات الأساسية لأي رسالة اتصال تعليمية، مع ذكر ثلاث من خصائص الرسالة الجيدة."
      points: 3
      [span_9](start_span)answer: "تتكون أي رسالة اتصال تعليمية من: رموز، تصميم، ومعنى[span_9](end_span). [span_10](start_span)ومن خصائص الرسالة الجيدة أن تكون صحيحة ودقيقة علمياً، واضحة وسهلة الفهم، وتامة وكاملة[span_10](end_span)."
    - type: "essay"
      question: "حلل نموذج لاسويل في الاتصال بناءً على عبارته الشهيرة (من يقول، ماذا يقول، لمن يقول، وبأي وسيلة، وبأي أثر)، موضحاً نقطة قوة ونقطة ضعف في هذا النموذج."
      points: 4
      [span_11](start_span)answer: "نقطة القوة في هذا النموذج هي اهتمامه بدراسة تأثير الرسالة على المستقبل (بأي أثر)[span_11](end_span). [span_12](start_span)أما نقطة الضعف فتتمثل في كونه اتصالاً خطياً يغيب عنه عنصر الاستجابة والتغذية الراجعة، كما أنه يفترض أن للرسائل دائماً تأثير وهذا يعتبر نقطة ضعف[span_12](end_span)."
    - type: "instructions"
      description: "انتهى الاختبار، ردد معي اللهم إني استودعتك ما قرأتُ وما حفظتُ وما تعلمتُ، فرده إليّ عند حاجتي إليه، إنك على كل شيء قدير."
