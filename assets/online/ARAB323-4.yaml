- title: اختبار الفهم والتحليل في الأدب العماني القديم
  subject-name: الأدب العماني
  subject-code: ARAB323
  questions: 
    - type: instructions
      mainTitle: "أولًا الأسئلة الموضوعية (اختيار من متعدد)"
      description: تخير الإجابة الصحيحة من بين البدائل المعطاة
    - type: mcq
      question: "ربط ابن سلام الجمحي بين قلة الشعر في عمان وقريش يعود في جوهره المنهجي إلى"
      points: 1
      choices:
        - ضعف السليقة اللغوية في أطراف الجزيرة العربية
        - غياب الصراعات والحروب المحفزة للانفعال العاطفي
        - الانشغال بالتجارة والرحلات على حساب الأدب
        - الاعتماد على الخطابة أكثر من الشعر
      answer: غياب الصراعات والحروب المحفزة للانفعال العاطفي
    - type: mcq
      question: "استشهاد المستند بآية قرآنية وأبيات لجرير والأعشى يهدف نقدياً إلى إثبات"
      points: 1
      choices:
        - أن عمان كانت معزولة جغرافياً عن مجريات الأحداث
        - أن البعد الجغرافي لعمان جعلها مقصداً للرحلات والملاذات الآمنة
        - تفوق شعراء العصر الأموي على شعراء الجاهلية
        - أن الشعر العماني تأثر كثيراً بالشعراء الوافدين
      answer: أن البعد الجغرافي لعمان جعلها مقصداً للرحلات والملاذات الآمنة
    - type: mcq
      question: "تعجب الجاحظ من تحول قسم من قبيلة عبد القيس لخطباء العرب بعد استقرارهم في عمان يدل سوسيولوجياً على"
      points: 1
      choices:
        - تأثير البيئة المستقرة والجديدة في صقل المواهب وتغيير طبيعة الإنتاج الأدبي
        - أن البادية هي البيئة الوحيدة القادرة على إنتاج فصاحة حقيقية
        - فقدان القبيلة لقدراتها الشعرية بسبب اختلاطها بأمم أخرى
        - انتقال مركز الخلافة الإسلامية إلى أطراف الجزيرة العربية
      answer: تأثير البيئة المستقرة والجديدة في صقل المواهب وتغيير طبيعة الإنتاج الأدبي
    - type: mcq
      question: "صدمة عمر بن عبد العزيز من جودة وجزالة شعر كعب الأشقري تعكس بالضرورة"
      points: 1
      choices:
        - عدم اهتمام الخليفة بالشعر السياسي
        - وجود صورة نمطية سابقة في مركز الخلافة عن ضعف أو ندرة النتاج الأدبي العماني
        - انقطاع التواصل تماماً بين عمان وعاصمة الخلافة الأموية
        - تفوق الشعر العماني على جميع أشعار العصر الأموي
      answer: وجود صورة نمطية سابقة في مركز الخلافة عن ضعف أو ندرة النتاج الأدبي العماني
    - type: mcq
      question: "قول كعب الأشقري عمال أرضك بالبلاد ذئاب يمثل من الناحية الأدبية والتاريخية"
      points: 1
      choices:
        - مديحاً تقليدياً لتقرب الشاعر من السلطة
        - توظيفاً جريئاً للشعر في النقد السياسي ومواجهة قمة السلطة
        - وصفاً لبيئة عمان الجغرافية وتضاريسها
        - رثاءً لحالة الضعف التي وصلت إليها قبيلته
      answer: توظيفاً جريئاً للشعر في النقد السياسي ومواجهة قمة السلطة
    - type: mcq
      question: "عبارة الشيخ السالمي وأهل عمان لا يعتنون بالتاريخ تقدم للمحلل الأدبي تفسيراً منطقياً لـ"
      points: 1
      choices:
        - غزارة الدواوين الشعرية العمانية المطبوعة
        - الفجوة الكبيرة بين التراث الأدبي الفعلي الذي قيل وما وصلنا منه في المدونات
        - كثرة الحروب الداخلية في عمان
        - اهتمام العمانيين بالعلوم التجريبية حصراً
      answer: الفجوة الكبيرة بين التراث الأدبي الفعلي الذي قيل وما وصلنا منه في المدونات
    - type: mcq
      question: "من خلال نصوص المستند، الخاصية المكانية لعمان (كونها في طرف) أدت إلى نتيجتين متناقضتين ظاهرياً هما"
      points: 1
      choices:
        - ندرة الشعر الحماسي مقارنة بالمركز مقابل ازدهار الخطابة وجذب الرحالة للاقتصاد
        - كثرة الحروب الداخلية وانقطاع التجارة الخارجية
        - تحول جميع السكان للشعر وتركهم لمهنة الخطابة
        - العزلة التامة عن العرب والاندماج مع الفرس
      answer: ندرة الشعر الحماسي مقارنة بالمركز مقابل ازدهار الخطابة وجذب الرحالة للاقتصاد
    - type: mcq
      question: "عندما يذكر الأعشى أنه طاف الآفاق للمال وذكر عمان فحمص فأوريشلم فإن هذا النسق يضع عمان في سياق"
      points: 1
      choices:
        - القرى البدوية المعزولة
        - المراكز الحضارية والاقتصادية الكبرى والمهمة في العصور القديمة
        - المناطق التي تعاني من حروب طاحنة
        - الأماكن المقدسة دينياً فقط
      answer: المراكز الحضارية والاقتصادية الكبرى والمهمة في العصور القديمة
    - type: mcq
      question: "وفقاً لنظرية ابن سلام الجمحي، البيئة المثالية لازدهار الشعر الجاهلي والإسلامي المبكر هي"
      points: 1
      choices:
        - البيئة التجارية المستقرة
        - البيئة المضطربة المليئة بالثارات والنزاعات القبلية
        - البيئة الزراعية الهادئة
        - البيئة الدينية الخالصة
      answer: البيئة المضطربة المليئة بالثارات والنزاعات القبلية
    - type: mcq
      question: "غياب التدوين الذي أشار إليه السالمي يفرض على الباحث المعاصر في الأدب العماني القديم أن"
      points: 1
      choices:
        - يتجاهل دراسة الفترات القديمة تماماً
        - يعتمد على الاستنباط من الإشارات العابرة في المصادر الخارجية واستنطاق الشعر نفسه كوثيقة
        - يكتفي بدراسة تاريخ الأئمة فقط
        - يعتمد حصراً على الروايات الأسطورية
      answer: يعتمد على الاستنباط من الإشارات العابرة في المصادر الخارجية واستنطاق الشعر نفسه كوثيقة
    - type: instructions
      mainTitle: "ثانيًا الأسئلة الموضوعية (صواب أو خطأ)"
      description: حدد ما إذا كانت العبارة صحيحة أم خاطئة.
    - type: tf
      question: "يُفهم من نص ابن سلام الجمحي أن الاستقرار السياسي والاجتماعي والسلام التام هو المحفز الأول لغزارة الإنتاج الشعري"
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: tf
      question: "انتقال قبيلة عبد القيس من سرة البادية إلى عمان أفقدهم فصاحتهم الأصلية وجعلهم مجرد خطباء بلا تأثير"
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: tf
      question: "يُستنتج من مقولة الجاحظ أن الملكات الأدبية كالفصاحة والخطابة قابلة للتطور وإعادة التشكيل بناءً على تغير الجغرافيا والظروف المعيشية"
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: tf
      question: "العزلة الجغرافية أو الطرفية لعمان، كما صورها ابن سلام، انعكست سلباً على كمية شعر الفخر والحروب مقارنة بقبائل وسط الجزيرة"
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: tf
      question: "تصريح الخليفة عمر بن عبد العزيز يؤكد أن الشعر العماني السياسي كان ذائع الصيت ومألوفاً جداً لدى الخلفاء الأمويين قبل ظهور كعب الأشقري"
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: instructions
      mainTitle: "ثالثًا الأسئلة المقالية (التحليل والاستنتاج)"
      description: أجب عن الأسئلة التالية
    - type: essay
      question: "بناءً على نظرية ابن سلام الجمحي في ربط كثرة الشعر بالحروب، كيف يمكننا نقدياً تفسير ظهور شاعر مفوه مثل كعب الأشقري يتحدث بقوة في قضايا سياسية كبرى؟"
      points: 3
      answer: "نظرية ابن سلام تركز على الشعر القبلي الحماسي الناتج عن الاحتكاك العسكري بينما حالة كعب الأشقري تمثل تطوراً لوعي سياسي وإسلامي فظهوره لا يعتمد على الصراع القبلي الداخلي بل على نضج فكري ورغبة في النقد الموجه للسلطة والإصلاح الاجتماعي والمؤسسي"
    - type: essay
      question: "حلل التناقض الظاهري بين وصف عمان بأنها في طرف ومهمشة شعرياً وبين كونها مقصداً لرحلات الرزق والتجارة كما يتضح في شعر الأعشى وجرير"
      points: 3
      answer: "الطرفية هنا تعني البعد الجغرافي عن مركز الصراعات والنزاعات القبلية مما قلل شعر الحروب لكن هذا البعد الجغرافي وفر في ذات الوقت بيئة مستقرة اقتصادياً وتجارياً وجعلها ممراً آمناً مما حولها إلى وجهة مزدهرة وملاذاً للباحثين عن الرزق"
    - type: essay
      question: "عمال أرضك بالبلاد ذئاب. ما الدلالة النفسية والأدبية لاستخدام الشاعر لرمز الذئاب في مخاطبة قمة الهرم السلطوي؟"
      points: 2
      answer: "يدل على شجاعة الشاعر العماني واستخدامه لهذا الرمز يكشف عن وحشية الولاة ونهبهم لمقدرات الناس ويحمل الخليفة المسؤولية الأخلاقية بأسلوب بلاغي مباشر يتجاوز المديح التقليدي ويلامس قضايا المظلومين"
    - type: essay
      question: "كيف يمكن توظيف استغراب الجاحظ من حالة عبد القيس لدحض الفكرة القائلة بأن البادية هي المصدر الوحيد والأبدي للفصاحة؟"
      points: 3
      answer: "حالة عبد القيس تثبت أن انتقالهم من قلب البادية واستقرارهم في مناطق ذات طبيعة جغرافية واجتماعية مختلفة كعمان والبحرين أدى إلى تبلور فنون متقدمة كالخطابة بشكل يفوق ما كانوا عليه في البادية مما يؤكد أن التفاعل الحضاري والاستقرار يثريان القدرات اللغوية ولا يميتانها"
    - type: essay
      question: "في ضوء مقولة السالمي عن ضعف التدوين التاريخي، ما هي أبرز التحديات المنهجية التي ستواجه الباحث المعاصر عند دراسة وتحليل التراث الأدبي العماني القديم؟"
      points: 3
      answer: "التحديات تشمل ندرة المصادر المكتوبة والمدونات الكبرى مما يؤدي إلى فقدان السياق التاريخي والاجتماعي للقصائد المتبقية هذا يجبر الباحث على الاعتماد المفرط على المرويات الشفهية أو التقاط شذرات متناثرة من كتب الأدب غير العمانية مما يتطلب جهداً مضاعفاً في التحليل والاستنباط"
