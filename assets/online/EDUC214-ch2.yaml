- title: اختبار مفاهيم أساسية في التقويم
  subject-name: القياس والتقويم
  subject-code: EDUC214
  questions:
    - type: instructions
      mainTitle: أولا الأسئلة الموضوعية (اختيار من متعدد)
      description: اختر الإجابة الصحيحة من بين البدائل المعطاة
    - question: أراد معلم معرفة مدى تأثير استراتيجيته الجديدة في التدريس على تحصيل الطلاب فقام بجمع علاماتهم ثم أصدر حكما بأن الاستراتيجية فعالة وقرر الاستمرار بها، ما قام به المعلم يمثل
      type: mcq
      points: 1
      choices:
        - قياسا فقط
        - تقييما فقط
        - تقويما
      answer: تقويما
    - question: يتميز التقويم بأنه عملية إنسانية، وهذا يعني أنه
      type: mcq
      points: 1
      choices:
        - يتساهل في منح الدرجات للطلاب
        - لا يهدف إلى إحباط الطالب بل مساعدته
        - يعتمد على التعاطف في التصحيح
      answer: لا يهدف إلى إحباط الطالب بل مساعدته
    - question: إذا قام مدير المدرسة بجمع آراء المعلمين والطلاب وأولياء الأمور حول فاعلية الأنشطة المدرسية، فإن هذا يعكس إحدى خصائص التقويم وهي أنه
      type: mcq
      points: 1
      choices:
        - مستمر
        - شامل
        - اقتصادي
      answer: شامل
    - question: عندما يطبق المعلم اختبارا في بداية العام الدراسي لمعرفة مكتسبات الطلاب السابقة لتحديد نقطة الانطلاق في الشرح، فإنه يقوم بنوع من التقويم يسمى
      type: mcq
      points: 1
      choices:
        - التقويم الختامي
        - التقويم التكويني
        - التقويم القبلي التشخيصي
      answer: التقويم القبلي التشخيصي
    - question: أداة القياس التي يتم فيها إثارة دافعية الطالب للحصول على أعلى درجة ممكنة كما في اختبارات الذكاء أو التحصيل تصنف ضمن فئة
      type: mcq
      points: 1
      choices:
        - الأداء الطبيعي
        - أقصى أداء
        - مرجعية القدرة
      answer: أقصى أداء
    - question: عند تفسير نتيجة طالب بأنها أفضل من 70 بالمئة من زملائه في الصف، فإننا نعتمد على طريقة التفسير
      type: mcq
      points: 1
      choices:
        - محكية المرجع
        - معيارية المرجع
        - مرجعية النمو
      answer: معيارية المرجع
    - question: اختبار القيادة الذي يتطلب من المتدرب قيادة السيارة فعليا في الشارع لاختبار مهاراته يصنف بناء على أسلوب تقديم الإجابة كاختبار
      type: mcq
      points: 1
      choices:
        - لفظي
        - أدائي
        - مقنن
      answer: أدائي
    - question: التقويم الذي يركز على تقويم الامكانات المادية والبشرية للبرنامج قبل البدء بتنفيذه يسمى تقويما حسب مرحلة
      type: mcq
      points: 1
      choices:
        - المدخلات
        - العمليات
        - المخرجات
      answer: المدخلات
    - question: للتغلب على القصور ومحاولات إخفاء نقاط الضعف التي قد ترافق التقويم الذاتي للمؤسسات يفضل اللجوء إلى
      type: mcq
      points: 1
      choices:
        - التقويم المستقل الخارجي
        - التقويم التكويني
        - التقويم الجزئي
      answer: التقويم المستقل الخارجي
    - question: الاختبار الذي يبنى لقياس سمة مجالها مفتوح وغير محدد بدقة كاختبارات الذكاء يصنف على أنه اختبار
      type: mcq
      points: 1
      choices:
        - كمؤشر
        - كعينة
        - محكي المرجع
      answer: كمؤشر

    - type: instructions
      mainTitle: ثانيا أسئلة الصواب والخطأ
      description: حدد ما إذا كانت كل عبارة من العبارات التالية صحيحة أم خاطئة
    - question: القياس يعتبر أعم وأشمل من التقويم لأنه يوفر البيانات الرقمية الدقيقة
      type: tf
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - question: التقويم التكويني البنائي يهدف بشكل أساسي إلى تقديم تغذية راجعة مستمرة أثناء عملية التدريس لتدارك الأخطاء
      type: tf
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - question: التقويم محكي المرجع يقارن أداء الطالب بمستوى إتقان محدد مسبقا بغض النظر عن أداء زملائه
      type: tf
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - question: مقاييس الاتجاهات والميول تصنف ضمن أدوات أقصى أداء لأنها تتطلب من المفحوص إظهار أفضل ما لديه
      type: tf
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - question: من وظائف القياس والتقويم في المجال الإداري المساعدة في اتخاذ قرارات بتسكين المتعلمين في المراحل المناسبة
      type: tf
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - question: في اختبارات الاختيار من متعدد وصواب وخطأ تكون ذاتية المصحح عالية جدا مما يؤثر على دقة النتيجة
      type: tf
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - question: الاختبار كعينة يستخدم عندما يكون مجال السمة المقاسة محدودا ومعروفا مثل الاختبارات التحصيلية
      type: tf
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - question: التقويم النوعي يعتمد بالدرجة الأولى على استخدام الاختبارات المعرفية لجمع أرقام دقيقة عن المفحوص
      type: tf
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - question: من خطوات تقويم البرامج التربوية البدء بإصدار الأحكام ثم تحديد الغرض من التقويم
      type: tf
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - question: التقويم المستمر يعني أن التقويم عند نهاية مرحلة معينة يعتبر بمثابة تقويم قبلي لمرحلة جديدة
      type: tf
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح

    - type: instructions
      mainTitle: ثالثا الأسئلة المقالية
      description: أجب عن الأسئلة المقالية التالية بصورة واضحة ومفصلة مدعما إجابتك بالأمثلة
    - question: اشرح بمثال من تخصصك كيف تتكامل عمليات القياس والتقييم والتقويم لاتخاذ قرار تربوي سليم
      type: essay
      points: 2.5
      answer: تبدأ العملية بالقياس كجمع بيانات كمية مثل تطبيق اختبار تحصيلي ثم يأتي التقييم لإصدار حكم على هذه الدرجة كأن نعتبر أداء الطالب ضعيفا أو ممتازا وأخيرا التقويم وهو اتخاذ القرار بناء على هذا التقييم مثل وضع خطة علاجية لتحسين مستوى الطالب
    - question: قارن بين التقويم التكويني والتقويم الختامي من حيث الهدف والتوقيت الزمني مستعينا بأمثلة من البيئة المدرسية
      type: essay
      points: 2.5
      answer: التقويم التكويني يطبق أثناء التدريس وهدفه تقديم تغذية راجعة لتدارك الأخطاء مثل الأسئلة الشفوية وسط الحصة بينما التقويم الختامي يطبق في نهاية البرنامج أو الوحدة وهدفه معرفة مدى تحقق الأهداف ورصد الدرجات النهائية مثل الامتحان النهائي للمادة
    - question: يواجه بعض المعلمين صعوبة في تجنب ذاتية التصحيح عند استخدام الأسئلة المقالية اقترح حلولا عملية يمكن للمعلم استخدامها لرفع موضوعية هذا النوع من الاختبارات بناء على ما درست
      type: essay
      points: 2.5
      answer: يمكن للمعلم التقليل من ذاتية التصحيح من خلال استخدام نماذج التقويم الواضحة أو ما يسمى بالروبريكس وكذلك يمكن الاستعانة بأكثر من مصحح للمادة الواحدة بالإضافة إلى استخدام أدوات التقييم الواقعي لتقييم الأداء بشكل موضوعي
    - question: فسر لماذا يصنف اختبار الذكاء ضمن فئة أقصى أداء والاختبار كمؤشر في نفس الوقت مبينا دور هذا التصنيف في فهم طبيعة السمة المقاسة
      type: essay
      points: 2.5
      answer: يصنف كأقصى أداء لأن الفاحص يستثير دافعية الطالب ليقدم أفضل ما لديه ويحصل على أعلى درجة ممكنة ويصنف كاختبار مؤشر لأن الذكاء سمة افتراضية مجالها مفتوح وغير محدد بدقة ولا يمكن حصر جميع السلوكات الدالة عليه ولذلك يتم اختيار عينة من السلوكات كمؤشر على مستوى الذكاء العام
