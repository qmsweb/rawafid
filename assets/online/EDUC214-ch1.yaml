    - question: "من صعوبات القياس التربوي عدم القدرة على عزل السمات وتداخل المفاهيم النفسية مع بعضها"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
    - question: "المتغير التابع هو المتغير الذي يعمد الباحث إلى تغييره ليرى أثره في متغير آخر"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
    - question: "المقياس النسبي هو أعلى مستويات القياس ويستخدم للمتغيرات الفيزيائية كالطول والوزن"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"

    - type: instructions
      mainTitle: "ثالثا الأسئلة المقالية"
      description: "أجب عن الأسئلة المقالية التالية بصورة واضحة ومفصلة مدعما إجابتك بالأمثلة"
    - question: "قارن بين القياس الفيزيائي والقياس النفسي من حيث درجة الدقة ومباشرة القياس مع ذكر مثال لكل منهما"
      type: essay
      points: 3
      answer: "القياس الفيزيائي يقيس السمة بشكل مباشر وهو دقيق جدا ومستقر مثل قياس الطول بالشريط المتري بينما القياس النفسي يقيس السمة بشكل غير مباشر عن طريق السلوكات الدالة عليها وهو أقل دقة وعرضة للخطأ مثل قياس القلق أو الذكاء باختبارات ورقية"
    - question: "وضح لماذا تعتبر درجة الطالب في اختبار الرياضيات درجة ظاهرية وليست حقيقية وما هي مكونات هذه الدرجة"
      type: essay
      points: 3
      answer: "لأن القياس التربوي لا يخلو من الخطأ والدرجة الخام تسمى ظاهرية لأنها تتكون من الدرجة الحقيقية للطالب مضافا إليها أو مطروحا منها مقدار خطأ القياس الذي ينتج عن عوامل مختلفة كظروف التطبيق أو التخمين"
    - question: "صنف المتغيرات التالية حسب طبيعة البيانات وحسب مستوى القياس الجنس الطول درجات اختبار التحصيل"
      type: essay
      points: 3
      answer: "الجنس متغير نوعي ومستوى قياسه اسمي والطول متغير كمي متصل ومستوى قياسه نسبي ودرجات اختبار التحصيل متغير كمي متصل ومستوى قياسه فتري"
    - question: "اشرح بمثال تطبيقي من بيئتك المدرسية كيف يمكن أن يتأثر صدق وثبات أداة القياس التربوي متضمنا اثنين من مصادر خطأ القياس المختلفين وكيف ينعكس ذلك على تفسير نتيجة الطالب"
      type: essay
      points: 4
      answer: "إذا تم تقديم اختبار تحصيلي في قاعة شديدة الضوضاء فهذا خطأ قياس يعود لظروف التطبيق مما يقلل من ثبات الدرجة وإذا احتوى الاختبار على أسئلة غامضة أو خارج المنهج فهذا خطأ يعود لأداة القياس مما يؤثر على صدقها وبالتالي تصبح الدرجة الظاهرية غير معبرة عن الدرجة الحقيقية للطالب ويصعب الاعتماد عليها في اتخاذ قرارات تعليمية دقيقة"
