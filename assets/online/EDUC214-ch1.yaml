- title: "اختبار مفاهيم القياس والتقويم"
  subject-name: "القياس والتقويم"
  subject-code: "EDUC214"
  questions:
    - type: instructions
      mainTitle: "أولا الأسئلة الموضوعية (اختيار من متعدد)"
      description: "اختر الإجابة الصحيحة من بين البدائل المعطاة"
    - question: "إعطاء طالب درجة 80 في اختبار الذكاء لا يعني شيئا بمفرده إلا إذا تمت مقارنته بمعايير محددة وهذا يعكس إحدى خصائص القياس النفسي وهي أنه"
      type: mcq
      points: 1
      choices:
        - "غير مباشر"
        - "غير تام"
        - "نسبي"
      answer: "نسبي"
    - question: "عندما نحسب الكثافة بقسمة الكتلة على الحجم فإننا نستخدم نوعا من القياس يسمى"
      type: mcq
      points: 1
      choices:
        - "القياس الأساسي"
        - "القياس الاشتقاقي"
        - "القياس بالتعريف"
      answer: "القياس الاشتقاقي"
    - question: "إذا حصل طالب على درجة منخفضة بسبب شعوره بالإرهاق أثناء الاختبار فإن مصدر خطأ القياس هنا يعود إلى"
      type: mcq
      points: 1
      choices:
        - "الفاحص"
        - "أداة القياس"
        - "المفحوص"
      answer: "المفحوص"
    - question: "المتغير الذي يمكن أن يأخذ أي قيمة ضمن مدى محدد ويمكن التعبير عنه بالكسور مثل المعدل التراكمي للطالب يسمى"
      type: mcq
      points: 1
      choices:
        - "متغيرا نوعيا"
        - "متغيرا كميا منفصلا"
        - "متغيرا كميا متصلا"
      answer: "متغيرا كميا متصلا"
    - question: "في دراسة تبحث أثر طريقة التدريس على تحصيل الطلاب تعد طريقة التدريس"
      type: mcq
      points: 1
      choices:
        - "متغيرا تابعا"
        - "متغيرا مستقلا"
        - "متغيرا فئويا فقط"
      answer: "متغيرا مستقلا"
    - question: "إذا كان الفرق بين درجتي طالبين في اختبار تحصيلي هو 10 درجات وهو نفس الفرق بين طالبين آخرين ولكن الدرجة صفر لا تعني انعدام المعرفة فإن هذا يمثل المقياس"
      type: mcq
      points: 1
      choices:
        - "الرتبي"
        - "الفتري"
        - "النسبي"
      answer: "الفتري"
    - question: "الأرقام التي تمنح للاعبين في فريق كرة القدم تمثل أي مستوى من مستويات القياس"
      type: mcq
      points: 1
      choices:
        - "الاسمي"
        - "الرتبي"
        - "الفتري"
      answer: "الاسمي"
    - question: "مجموعة من السلوكات المترابطة التي تميل للحدوث معا ويستدل عليها من السلوك الملاحظ ولا تقاس مباشرة"
      type: mcq
      points: 1
      choices:
        - "السمة"
        - "المتغير المستقل"
        - "الدرجة الحقيقية"
      answer: "السمة"
    - question: "يتفق القياس النفسي مع القياس الفيزيائي في"
      type: mcq
      points: 1
      choices:
        - "وجود صفر مطلق لكليهما"
        - "إعطاء قيم رقمية للخصائص"
        - "دقة النتائج وثباتها"
      answer: "إعطاء قيم رقمية للخصائص"
    - question: "من أسباب صعوبة قياس السمات النفسية مقارنة بالخصائص الفيزيائية"
      type: mcq
      points: 1
      choices:
        - "أن المسافة بين الأفراد على متصل السمة متساوية دائما"
        - "الاعتماد على عينات من السلوك"
        - "وجود أداة قياس واحدة متفق عليها"
      answer: "الاعتماد على عينات من السلوك"

    - type: instructions
      mainTitle: "ثانيا أسئلة الصواب والخطأ"
      description: "حدد ما إذا كانت كل عبارة من العبارات التالية صحيحة أم خاطئة"
    - question: "القياس بالتعريف هو النوع المستخدم غالبا في العلوم الإنسانية والاجتماعية كقياس الذكاء"
