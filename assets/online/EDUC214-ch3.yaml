    - question: "من الإجراءات السليمة في بناء جدول المواصفات أنه يعتمد على تحليل المحتوى لتحديد الأوزان النسبية."
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"

    - type: instructions
      mainTitle: "ثالثا الأسئلة المقالية"
      description: "أجب عن الأسئلة المقالية التالية بصورة واضحة ومفصلة مدعما إجابتك بالأمثلة"
    - question: "عددي خطوات بناء (جدول المواصفات) للاختبار التحصيلي."
      type: essay
      points: 3
      answer: "حصر الأهداف التدريسية لكل وحدة دراسية ومستواها المعرفي وتحديد الأهمية النسبية لكل وحدة دراسية ولكل مستوى معرفي وتحديد طول الاختبار واستخراج عدد الأسئلة لكل خلية بضرب الوزن النسبي للوحدة في الوزن النسبي للهدف في العدد الكلي للأسئلة."
    - question: "حددي ثلاثة فروق أساسية بين أسئلة الاختيار من متعدد، والأسئلة المقالية."
      type: essay
      points: 3
      answer: "المقالية سهلة الإعداد وصعبة التصحيح بينما الاختيار من متعدد صعبة الإعداد وسهلة وموضوعية التصحيح. المقالية تقيس القدرة التعبيرية وتسلسل الأفكار بينما الاختيار من متعدد تعتمد على التعرف ولا تقيس التعبير. المقالية التخمين فيها معدوم والاختيار من متعدد بها نسبة تخمين. المقالية تغطي عينة قليلة من المحتوى بينما الاختيار من متعدد قادرة على تغطية شاملة للمحتوى."
    - question: "ما هي الخطوات العامة التي يجب اتباعها لبناء الاختبار التحصيلي؟ (اذكر 5 منها بالترتيب)."
      type: essay
      points: 3
      answer: "1 تحديد الغرض من الاختبار. 2 تحديد المجال السلوكي والأهداف وتحليل المحتوى. 3 بناء جدول المواصفات. 4 بناء الفقرات وكتابة الأسئلة. 5 مراجعة الفقرات وتجريبها. 6 إخراج الاختبار وتطبيقه."
    - question: "اُذكر ثلاث ميزات لأسئلة التكميل (الإجابة القصيرة)."
      type: essay
      points: 3
      answer: "سهلة الإعداد ولا تتيح مجالاً كبيراً للتخمين لاعتمادها على الاستدعاء وتغطي عينة كبيرة من محتوى المادة الدراسية."
    - question: "حدد الخطأ في الهدف السلوكي الآتي (أن يستوعب الطالب أهمية دراسة علم النفس التربوي)."
      type: essay
      points: 3
      answer: "الخطأ هو استخدام الفعل يستوعب وهو فعل غير محدد وغير قابل للملاحظة والقياس المباشر ويعتبر من الأفعال الممنوعة في صياغة الأهداف السلوكية."
