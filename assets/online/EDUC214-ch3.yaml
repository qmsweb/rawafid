- title: "اختبار في بناء الاختبار التحصيلي"
  subject-name: "القياس والتقويم"
  subject-code: "EDUC214"
  questions:
    - type: instructions
      mainTitle: "أولا الأسئلة الموضوعية (اختيار من متعدد)"
      description: "اختر الإجابة الصحيحة من بين البدائل المعطاة"
    - question: "يصنف الهدف التعليمي (يلخص الطالب القصة بلغته الخاصة) في مستوى"
      type: mcq
      points: 1
      choices:
        - "التحليل"
        - "التقويم"
        - "الفهم"
        - "التطبيق"
      answer: "الفهم"
    - question: "يصنف الهدف التعليمي (يحسب الطالب الوسط الحسابي لمجموعة من القيم) في مستوى"
      type: mcq
      points: 1
      choices:
        - "التحليل"
        - "التقويم"
        - "التطبيق"
        - "الفهم"
      answer: "التطبيق"
    - question: "جميع الأفعال السلوكية الآتية قابلة للملاحظة والقياس ما عدا"
      type: mcq
      points: 1
      choices:
        - "يصنف"
        - "يشرح / يقارن"
        - "يعي / يدرك"
        - "يذكر / يطبق"
      answer: "يعي / يدرك"
    - question: "فقرة مزاوجة مكونة من (5) مقدمات و (6) إجابات، فإن نسبة التخمين عند إجابة الطالب على المقدمة الثالثة هي"
      type: mcq
      points: 1
      choices:
        - "0.75"
        - "0.33"
        - "0.25"
        - "0.50"
      answer: "0.25"
    - question: "يتم تغطية اسم الطالب أثناء عملية تصحيح الإجابات المقالية للتغلب على أثر"
      type: mcq
      points: 1
      choices:
        - "الهالة (Halo Effect)"
        - "الرتابة"
        - "الحمل (Carry Over Effect)"
        - "التخمين"
      answer: "الهالة (Halo Effect)"
    - question: "أي من المفردات التالية يقيس مستوى (الفهم) حسب تصنيف بلوم للأهداف المعرفية؟"
      type: mcq
      points: 1
      choices:
        - "في أي سنة تأسس مجلس التعاون الخليجي؟"
        - "رتب الدول الأعضاء في مجلس التعاون من حيث عدد السكان."
        - "اكتب اسم منظمة عربية أخرى شبيهة بمجلس التعاون الخليجي."
        - "لخص بأسلوبك السبب في قيام مجلس التعاون الخليجي."
      answer: "لخص بأسلوبك السبب في قيام مجلس التعاون الخليجي."
    - question: "(السلطنة عمان دولة أفريقية، وعاصمتها مسقط)، تعتبر هذه المفردة مفردة ضعيفة من نوعية الصواب والخطأ وذلك بسبب"
      type: mcq
      points: 1
      choices:
        - "احتوائها على مفتاح للإجابة."
        - "تحتمل أكثر من إجابة."
        - "تحتوي على فكرتين في نفس الوقت."
        - "سهلة للطلبة."
      answer: "تحتوي على فكرتين في نفس الوقت."
    - question: "الهدف السلوكي (أن يصوب المعلم الكرة من مسافة 5 متر أمام الطلاب)، الخطأ في هذا الهدف السلوكي هو"
      type: mcq
      points: 1
      choices:
        - "استخدام الفعل المضارع."
        - "يحتوي على ناتج تعليمي واحد."
        - "يصف سلوك المعلم وليس سلوك المتعلم."
        - "واضح وقابل للقياس."
      answer: "يصف سلوك المعلم وليس سلوك المتعلم."
    - question: "يعد من أعلى المستويات المعرفية في هرم بلوم المطور"
      type: mcq
      points: 1
      choices:
        - "التذكر"
        - "الفهم"
        - "التطبيق"
        - "الإبداع (التركيب)"
      answer: "الإبداع (التركيب)"
    - question: "الأسئلة التي تتميز بقدرتها على فحص قدرة الطالب في مهارات التحليل والربط والخيال وحل المشكلات وتوليد الأفكار هي"
      type: mcq
      points: 1
      choices:
        - "الاختيار من متعدد"
        - "المزاوجة"
        - "التكميل"
        - "المقالية (الإنشائية)"
