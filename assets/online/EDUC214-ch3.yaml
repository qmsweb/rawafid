        - "المقالية"
        - "الصواب والخطأ"
        - "المزاوجة"
      answer: "المقالية"
    - question: "الخطوة الأولى لبناء اختبار ختامي لوحدة تعليمية هي"
      type: mcq
      points: 1
      choices:
        - "اختيار العينة من مجتمع المفحوصين."
        - "اختيار العينة من مجال المفحوصين."
        - "تصميم جدول المواصفات."
        - "تحديد الغرض من الاختبار وصياغة الأهداف السلوكية."
      answer: "تحديد الغرض من الاختبار وصياغة الأهداف السلوكية."

    - type: instructions
      mainTitle: "ثانيا أسئلة الصواب والخطأ"
