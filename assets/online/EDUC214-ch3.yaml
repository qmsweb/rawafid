      choices:
        - "الاختبارات المقالية"
        - "اختبار الاختيار من متعدد"
        - "اختبار الصح والخطأ"
        - "اختبار التكملة"
      answer: "الاختبارات المقالية"
    - question: "أكثر أنواع الأسئلة تأثراً بالعوامل اللغوية وقدرة الطالب على التعبير هي"
      type: mcq
