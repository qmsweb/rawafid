- title: اختبار في الوحدة الأولى
  subject-name: نظام التعليم
  subject-code: EDUC310
  questions:
    - type: instructions
      mainTitle: أولا الأسئلة الموضوعية (اختيار من متعدد)
      description: تخير الإجابة الصحيحة من بين البدائل المعطاة
      
    - type: mcq
      question: قامت إحدى المدارس بتغيير طرق التدريس بعد ملاحظة انخفاض درجات الطلاب في الاختبارات الوطنية، هذا الإجراء يمثل أي مكون من مكونات النظام التعليمي؟
      points: 2
      choices:
        - المدخلات التعليمية
        - العمليات التنفيذية
        - التغذية الراجعة
        - البيئة المحيطة بالنظام
      answer: التغذية الراجعة
      
    - type: mcq
      question: وفقاً لفهمك لسمات النظام المفتوح والمغلق، لماذا لا يمكن تطبيق نموذج قانون الجاذبية الأرضية على سلوكيات الطلاب داخل الغرفة الصفية؟
      points: 2
      choices:
        - لأن القوانين الفيزيائية تتغير بتغير البيئة التعليمية
        - لأن النظام التعليمي مفتوح يتأثر بالمجتمع ويتفاعل معه
        - لأن الغرفة الصفية تمثل نظاما مغلقا تماما لا يقبل التغيير
        - لأن المخرجات التعليمية يستحيل قياسها بأي أداة
      answer: لأن النظام التعليمي مفتوح يتأثر بالمجتمع ويتفاعل معه

    - type: mcq
      question: عندما تقرر الجهات المعنية تقليل عدد المواد الدراسية وتغيير مسمى مادة لتصبح الهوية والمواطنة، فإن هذا التحديث يقع ضمن أي عنصر من عناصر النظام التعليمي؟
      points: 2
      choices:
        - السياسة التعليمية العامة
        - نظام الدراسة وتوزيع الفصول
        - السلم التعليمي والمراحل
        - المناهج والخطة الدراسية
      answer: المناهج والخطة الدراسية

    - type: instructions
      mainTitle: ثانيا الأسئلة الموضوعية (صواب أو خطأ)
      description: حدد ما إذا كانت العبارة صحيحة أم خاطئة
      
    - type: tf
      question: يمكن الحكم على نجاح النظام التعليمي بشكل كامل من خلال قياس كمية المعارف التي اكتسبها الطالب فقط وتجاهل قيموه وسلوكياته
      points: 1
      choices:
        - صواب
        - خطأ
      answer: خطأ
      
    - type: tf
      question: دراسة المعلم والمتعلم والمنهج كل على حدة وبمعزل تام عن الآخر يضمن لنا فهما دقيقا لمدى كفاءة النظام التعليمي
      points: 1
      choices:
        - صواب
        - خطأ
      answer: خطأ
      
    - type: instructions
      mainTitle: ثالثا الأسئلة المقالية (التحليل والاستنتاج)
      description: أجب عن الأسئلة التالية بناء على فهمك للنصوص
      
    - type: essay
      question: بناء على دراستك لمفهوم النظام المفتوح، حلل ماذا سيحدث في حال قررت مؤسسة تعليمية عزل مناهجها بالكامل عن التغيرات التكنولوجية والاقتصادية في المجتمع المحيط بها
      points: 5
      answer: ستفقد المؤسسة التعليمية توازنها واستقرارها ولن تلبي احتياجات المجتمع لأن النظام التعليمي المفتوح يستمد مقوماته من البيئة المحيطة به وأي انغلاق سيؤدي إلى مخرجات تعليمية غير قادرة على التكيف أو الأداء في الواقع الفعلي كما سيفقد النظام التغذية الراجعة الضرورية لنموه وتطويره
      
    - type: instructions
      description: انتهى الاختبار، ردد معي اللهم إني استودعتك ما قرأتُ وما حفظتُ وما تعلمتُ، فرده إليّ عند حاجتي إليه، إنك على كل شيء قدير.
