- title: اختبار تطبيقي في مصادر التعلم والوسائل التعليمية
  subject-name: تكنولوجيا التعليم والتعلم
  subject-code: EDUC 221
  questions:
    - type: instructions
      mainTitle: أولا الأسئلة الموضوعية (اختيار من متعدد)
      description: تخير الإجابة الصحيحة من بين البدائل المعطاة
    - type: mcq
      question: نظم معلم رحلة للطلاب إلى المتحف الوطني واستخدم مجسما ثلاثي الأبعاد لتوضيح بعض المعالم التاريخية فما هو التصنيف الصحيح لمصادر التعلم المستخدمة في هذا الموقف
      points: 1
      choices:
        - المتحف مصدر مكاني والمجسم مصدر بشري
        - الرحلة نشاط تعليمي والمتحف مصدر مكاني والمجسم وسيلة تعليمية
        - المعلم وسيلة تعليمية والمتحف نشاط لامنهجي
        - المجسم بيئة تعليمية والمعلم مصدر مكاني
      answer: الرحلة نشاط تعليمي والمتحف مصدر مكاني والمجسم وسيلة تعليمية
    - type: mcq
      question: أراد معلم علوم شرح النظام الشمسي ولصعوبة أخذ الطلاب في رحلة فضائية حقيقية ما هو البديل الأفضل والأكثر تأثيرا في مخروط إدجار ديل من بين الخيارات التالية
      points: 1
      choices:
        - الرموز اللفظية المكتوبة في الكتاب المدرسي
        - الاستماع إلى تسجيل صوتي يشرح حركة الكواكب
        - استخدام الواقع الافتراضي لمحاكاة رحلة في الفضاء
        - رسم صورة ثابتة للكواكب على السبورة
      answer: استخدام الواقع الافتراضي لمحاكاة رحلة في الفضاء
    - type: mcq
      question: قام معلم باستخدام تقنية عرض حديثة ومعقدة جدا فقط لإبهار مدير المدرسة أثناء تقييمه رغم أن الدرس كان يمكن شرحه بنموذج بسيط فما هو الخطأ الذي وقع فيه المعلم عند اختيار الوسيلة
      points: 1
      choices:
        - عدم مراعاة الفروق الفردية بين المتعلمين
        - اختيارها لمجرد الترفيه والدعاية أو كنوع من الانبهار التكنولوجي
        - عدم توافقها مع البيئة التعليمية الريفية
        - تكرار استخدام نفس الوسيلة التعليمية
      answer: اختيارها لمجرد الترفيه والدعاية أو كنوع من الانبهار التكنولوجي
    - type: mcq
      question: طلب منك أحد الطلاب إرشاده إلى المكان الأنسب داخل مركز مصادر التعلم ليتمكن من قراءة كتاب ومراجعته بهدوء وبشكل منفرد فأي مساحة ستقترح عليه
      points: 1
      choices:
        - مساحة العرض الجماعي
        - وحدة أستديو التلفاز
        - مساحة التعلم الذاتي والمقاصير الفردية
        - مساحة إنتاج المواد التعليمية واللوحات
      answer: مساحة التعلم الذاتي والمقاصير الفردية
    - type: instructions
      mainTitle: ثانيا الأسئلة الموضوعية (صواب أو خطأ)
      description: حدد ما إذا كانت العبارة صحيحة أم خاطئة بناء على التطبيقات التربوية
    - type: tf
      question: تعتمد فلسفة مراكز مصادر التعلم على توفير مصدر تعلم واحد فقط لجميع الطلاب لضمان توحيد المعلومات بينهم وتجنب التشتت
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: tf
      question: إذا عرض المعلم خريطة جغرافية رقمية باستخدام جهاز العرض الذكي فإن الخريطة تعتبر مادة تعليمية بينما الجهاز يعتبر جهاز عرض تعليمي
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: tf
      question: تعد الأنشطة اللامنهجية خارج الفصل الدراسي مضيعة للوقت ولا تساهم في تحويل الخبرات النظرية المكتسبة إلى ممارسات عملية
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: tf
      question: عند دراسة ظاهرة خطيرة وسريعة جدا مثل الانفجارات البركانية يفضل الاستعانة بالأفلام التعليمية كبديل آمن وفعال للخبرة المباشرة
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: instructions
      mainTitle: ثالثا الأسئلة المقالية (التحليل والاستنتاج)
      description: أجب عن الأسئلة التالية مبينا قدرتك على ربط النظريات بالواقع الميداني
    - type: essay
      question: تخيل أنك معلم لغة عربية وتريد شرح قصيدة شعرية من الأدب العماني باستخدام أكثر من مصدر تعلم بناء على ما درسته اقترح ثلاثة مصادر تعلم مختلفة ومتنوعة يمكن توظيفها في هذا الدرس
      points: 3
      answer: يمكن توظيف المعلم كمصدر بشري لإلقاء القصيدة وشرحها واستخدام تسجيل صوتي أو عرض مرئي للقصيدة كوسيلة تعليمية وتنظيم نشاط تعليمي يقوم فيه الطلاب بتمثيل معاني القصيدة أو إلقائها في الإذاعة المدرسية واستخدام مركز مصادر التعلم كمصدر مكاني للبحث في سيرة الشاعر
    - type: essay
      question: واجهت إحدى المدارس نقصا في التمويل لشراء مجسمات علمية جاهزة فكيف يمكن للمعلم التغلب على هذه المشكلة بالاستفادة من مهارات إنتاج الوسائل التعليمية
      points: 3
      answer: يمكن للمعلم التغلب على ذلك من خلال تصميم وإنتاج وسائل تعليمية بسيطة باستخدام أدوات وموارد البيئة المحلية بمشاركة الطلاب مما يسهم في تقليل التكلفة المادية وتحقيق أهداف تربوية كإكسابهم مهارات يدوية وتحويل الخبرة المجردة إلى خبرة محسوسة
    - type: instructions
      description: انتهى الاختبار، ردد معي اللهم إني استودعتك ما قرأتُ وما حفظتُ وما تعلمتُ، فرده إليّ عند حاجتي إليه، إنك على كل شيء قدير.
