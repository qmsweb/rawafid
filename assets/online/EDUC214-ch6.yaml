- title: "اختبار في الفصل السادس التقويم الواقعي"
  subject-name: "القياس والتقويم"
  subject-code: "EDUC214"
  questions:
    - type: instructions
      mainTitle: "أولا الأسئلة الموضوعية (اختيار من متعدد)"
      description: "اختر الإجابة الصحيحة من بين البدائل المعطاة"
    - question: "أي طرق (فعاليات) التقويم الآتية تندرج تحت استراتيجية التواصل"
      type: mcq
      points: 1
      choices:
        - "المعرض"
        - "يوميات الطالب"
        - "المؤتمر"
        - "المناظرة"
      answer: "المؤتمر"
    - question: "أي أدوات التقويم الواقعي الآتية تعتبر الأكثر موضوعية وقدرة على تقديم وصف تفصيلي دقيق لمستويات أداء الطلبة"
      type: mcq
      points: 1
      choices:
        - "قائمة الرصد"
        - "سلم التقدير الكمي"
        - "السجل القصصي"
        - "نموذج قواعد التقييم اللفظي"
      answer: "نموذج قواعد التقييم اللفظي"
    - question: "من الخصائص التي تميز التقويم الواقعي عن التقويم التقليدي ما يلي"
      type: mcq
      points: 1
      choices:
        - "أن الأداء فيه يكون فرديا فقط"
        - "أنه يوظف مهارات التفكير الدنيا كالتذكر"
        - "أنه يأخذ شكل مهام واقعية حقيقية تتطلب الدمج والتطبيق"
        - "أنه ينجز في فترة زمنية قصيرة جدا لا تتعدى دقائق"
      answer: "أنه يأخذ شكل مهام واقعية حقيقية تتطلب الدمج والتطبيق"
    - question: "لقاء بين المعلم والمتعلم محدد مسبقا يمنح المعلم فرصة للحصول على معلومات تتعلق بأفكار واتجاهات المتعلم يندرج تحت فعالية"
      type: mcq
      points: 1
      choices:
        - "المناقشة"
        - "المقابلة"
        - "الأسئلة والأجوبة"
        - "السجل القصصي"
      answer: "المقابلة"
    - question: "عندما يطلب المعلم من الطالب كتابة مذكرات أو خواطر حول معلم أثري قام بزيارته ليعبر بحرية عن انطباعاته وما تعلمه فإن هذه الفعالية تندرج تحت استراتيجية"
      type: mcq
      points: 1
      choices:
        - "التقويم بالورقة والقلم"
        - "استراتيجية مراجعة الذات"
        - "استراتيجية التواصل"
        - "التقويم المعتمد على الأداء"
      answer: "استراتيجية مراجعة الذات"
    - question: "لتقويم مدى تقدم الطالب في مشروع عملي محدد وتحديد الخطوات اللاحقة اللازمة لتحسين تعلمه قرر المعلم عقد لقاء مبرمج معه لمناقشة ما تم إنجازه تعرف هذه الفعالية بـ"
      type: mcq
      points: 1
      choices:
        - "المقابلة"
        - "المؤتمر"
        - "التقديم"
        - "المعرض"
      answer: "المؤتمر"
    - question: "تنفيذ الطلبة لمسرحية داخل الفصل يمثلون فيها أدوارا مختلفة يظهر قدراتهم على اتباع التعليمات والتواصل في موقف يشبه الواقع ويصنف ذلك ضمن فعالية"
      type: mcq
      points: 1
      choices:
        - "العرض التوضيحي"
        - "الأداء العملي"
        - "المحاكاة أو لعب الأدوار"
        - "المناظرة"
      answer: "المحاكاة أو لعب الأدوار"
    - question: "أراد معلم تقويم قدرة طلابه على كتابة مقال نقدي فقام بتصميم أداة تجزئ المهمة إلى مجموعة من المهام الجزئية كجودة الأفكار والتنظيم والإملاء ووضع تدريجا رقميا من 1 إلى 5 ليقيس مدى امتلاكهم لها الأداة الأنسب التي طبقها هي"
      type: mcq
      points: 1
      choices:
        - "قائمة الرصد"
        - "سلم التقدير"
        - "السجل القصصي"
        - "سجل وصف سير التعلم"
      answer: "سلم التقدير"
    - question: "لاحظ معلم الرياضيات أن أحد الطلاب يميل دائما إلى الجدال الحاد دون الاستناد إلى أدلة علمية أثناء العمل التعاوني فقام المعلم بتدوين هذه الحالة بالتفصيل مع ذكر سياقها وتفسيره الشخصي لها ضمن بطاقة مخصصة الأداة التي استخدمها المعلم تسمى"
      type: mcq
      points: 1
      choices:
        - "سلم التقدير اللفظي"
        - "السجل القصصي"
        - "يوميات الطالب"
        - "ملف الطالب"
      answer: "السجل القصصي"

    - type: instructions
      mainTitle: "ثانيا أسئلة الصواب والخطأ"
      description: "حدد ما إذا كانت كل عبارة من العبارات التالية صحيحة أم خاطئة"
    - question: "يزيد التقويم الواقعي من قدرة الطالب على التقويم الذاتي"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
    - question: "التقويم الواقعي لا يحتاج إلى معايير واضحة للحكم على أداء الطالب"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
    - question: "يزيد التقويم الواقعي من ربط التعلم بحياة الطالب اليومية ومواجهته لمشكلات حقيقية"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
    - question: "قيام الطالب بعرض ما تعلمه من مقال علمي شفويا أمام زملائه يعد تطبيقا لفعالية المحاكاة ولعب الأدوار ضمن استراتيجية التقويم المعتمد على الأداء"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
    - question: "عندما يقوم الطالب بإنتاج مجسم للمكعب أمام زملائه فإنه يظهر مهاراته من خلال فعالية الأداء العملي"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
    - question: "تعتمد استراتيجية الملاحظة على مراقبة الطالب في مواقف نشطة لتقويم الجوانب التي يصعب قياسها بالاختبارات التقليدية مثل القيم والاتجاهات وطريقة التفكير"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"

    - type: instructions
      mainTitle: "ثالثا الأسئلة المقالية"
      description: "أجب عن الأسئلة المقالية التالية بصورة واضحة ومفصلة مدعما إجابتك بالأمثلة"
    - question: "اذكر ثلاثة فروق جوهرية بين التقويم التقليدي والتقويم الواقعي من حيث شكل المهمة المطلوبة ومستوى مهارات التفكير المستخدمة والوقت المستغرق للإنجاز"
      type: essay
      points: 3
      answer: "شكل المهمة التقليدي يعتمد على أسئلة كتابية لاختيار إجابة أو كتابة جمل بينما الواقعي يتطلب إنجاز أو أداء مهام حقيقية وواقعية مستوى التفكير التقليدي يوظف مهارات دنيا كالتذكر والاستيعاب بينما الواقعي يتطلب مهارات التفكير العليا كالتطبيق والتحليل والتقييم وحل المشكلات الوقت المستغرق التقليدي يستغرق وقتا قصيرا نسبيا بينما المهام في التقويم الواقعي قد تستغرق ساعات أو أيام لإنجازها"
    - question: "موقف دراسة حالة 1 قامت معلمة الفنون التشكيلية في المدرسة باستغلال رسومات طالباتها في المادة حيث أقامت فعالية لعرض أعمال الطلبة الفنية والفكرية في قاعة مخصصة مع تكليف كل طالبة بشرح ما تشير إليه لوحتها للزوار (أ) ما اسم استراتيجية التقويم التي استخدمتها المعلمة (ب) ما اسم الفعالية الدقيقة التي تندرج تحت هذا النوع من التقويم"
      type: essay
      points: 3
      answer: "(أ) استراتيجية التقويم المعتمد على الأداء (ب) الفعالية المعرض"
    - question: "موقف دراسة حالة 2 كلف معلم الدراسات الاجتماعية طلبته بزيارة معلم أثري ثم طلب من أحد الطلبة توضيح ما استفاده من الزيارة وإعادة سرد ما شاهده بلغة واضحة وربطه بالواقع شفويا أمام زملائه (أ) ما استراتيجية التقويم والفعالية التي استخدمها المعلم (ب) ما الأداة المناسبة التي يمكنك اقتراحها على المعلم لتقييم أداء هذا الطالب بدقة"
      type: essay
      points: 3
      answer: "(أ) استراتيجية التقويم المعتمد على الأداء فعالية التقديم أو الحديث (ب) سلم تقدير أو سلم تقدير لفظي لتقييم مهارات الإلقاء والتواصل والثقة بالنفس وتسلسل الأفكار"
    - question: "سؤال تحليلي حلل الموقف الآتي بناء على فهمك لمبادئ التقويم الواقعي طالب يحصل دائما على درجات نهائية في الاختبارات الكتابية لمادة الأحياء ولكنه يجد صعوبة كبيرة في استخدام المجهر أو تحضير شريحة مجهرية أثناء الحصص العملية كيف يفسر مفهوم التقويم الواقعي هذه الحالة وما الذي كان ينقص عملية التقويم المتبعة في هذه المدرسة"
      type: essay
      points: 3
      answer: "يفسر التقويم الواقعي this بأنه قصور في طرق التقويم التقليدية التي تركز على الحفظ والمعرفة النظرية ولا تعكس القدرة الحقيقية على التطبيق العملي وما كان ينقص المدرسة هو تنويع أدوات التقويم واستخدام استراتيجية التقويم المعتمد على الأداء كالأداء العملي وتطبيق أدوات مثل قائمة الرصد للتأكد من خطوات تحضير الطالب للشريحة بشكل متسلسل وصحيح"
    - question: "سؤال تطبيقي أراد معلم لغة إنجليزية تتبع التطور المهاراتي لأحد طلابه في مهارة الكتابة على مدار فصل دراسي كامل بحيث يتمكن الطالب نفسه من رؤية مقدار ما أنجزه مقارنة بمستويات الأداء المطلوبة ما هي أفضل أداة للتقويم الواقعي تحقق هذا الهدف ولماذا تعتبر تطبيقا فعالا لمبدأ التقويم الذاتي"
      type: essay
      points: 3
      answer: "الأداة الأفضل هي ملف الطالب وتعتبر فعالة في التقويم الذاتي لأنها تتضمن نماذج منتقاة من أعمال الطالب عبر الزمن مما يتيح له الرجوع إليها ورؤية الفارق بين مستواه في البداية والنهاية وتحديد نقاط ضعفه وقوته مما يطور لديه مهارات التأمل ومراجعة الذات"
