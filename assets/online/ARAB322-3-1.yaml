- title: "اختبار في الكناية"
  subject-name: "البلاغة العربية"
  subject-code: "ARAB322"
  questions:
    - type: instructions
      mainTitle: "أولا الأسئلة الموضوعية (اختيار من متعدد)"
      description: "تخير الإجابة الصحيحة من بين البدائل المعطاة"
      
    - type: mcq
      question: "قرأت عبارة (فلان ألقى سلاحه) في إحدى الروايات والمقصود بها استنتاجا من سياق الكناية هو"
      points: 1
      choices:
        - "الكرم"
        - "الاستسلام"
        - "الشجاعة"
        - "الخوف"
      answer: "الاستسلام"
      
    - type: mcq
      question: "في العبارة (تحدثت بلغة الضاد) الكناية هنا تشير إلى"
      points: 1
      choices:
        - "اللغة العربية"
        - "اللغة الإنجليزية"
        - "الشعر الجاهلي"
        - "النحو العربي"
      answer: "اللغة العربية"
      
    - type: mcq
      question: "عند قراءة جملة (اليمن يتبع ظله) ندرك أنها كناية عن"
      points: 1
      choices:
        - "صفة اليمن"
        - "موصوف وهو الظل"
        - "نسبة البركة إلى الشخص"
        - "صفة السرعة"
      answer: "نسبة البركة إلى الشخص"
      
    - type: mcq
      question: "الآية الكريمة (ولا تجعل يدك مغلولة إلى عنقك) تحتوي على كناية عن"
      points: 1
      choices:
        - "الشجاعة"
        - "البخل"
        - "التبذير"
        - "الكرم"
      answer: "البخل"
      
    - type: instructions
      mainTitle: "ثانيا الأسئلة الموضوعية (صواب أو خطأ)"
      description: "حدد ما إذا كانت العبارة صحيحة أم خاطئة"
      
    - type: tf
      question: "عبارة (ركبنا سفينة الصحراء) تمثل كناية عن صفة السرعة في السفر"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "خطأ"
      
    - type: tf
      question: "قولنا (الجود بين ثيابه) يعد كناية عن نسبة لأننا نسبنا الكرم إلى شيء متصل بالشخص وليس إليه مباشرة"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "صواب"
      
    - type: tf
      question: "حين نصف شخصا بأنه (كثير الرماد) فنحن نستخدم كناية عن موصوف وهو كثرة الطبخ"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "خطأ"
      
    - type: tf
      question: "التعبير القرآني (صاحب الحوت) يمثل كناية عن موصوف وهو النبي يونس عليه السلام"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "صواب"
      
    - type: instructions
      mainTitle: "ثالثا الأسئلة المقالية (التحليل والاستنتاج)"
      description: "أجب عن الأسئلة التالية بناء على فهمك للنصوص"
      
    - type: essay
      question: "اشرح نوع الكناية وسر جمالها في قولنا (فلان نظيف اليد) بناء على فهمك للمعنى المراد"
      points: 2
      answer: "كناية عن صفة وهي الأمانة والعفة وسر جمالها الإتيان بالمعنى مصحوبا بالدليل عليه في إيجاز وتجسيم"
      
    - type: essay
      question: "حلل العبارة (المجد يمشي في ركابه) مبينا كيف طبقت فيها الكناية عن نسبة"
      points: 2
      answer: "صرحنا بصفة المجد ولم ننسبها للشخص مباشرة بل نسبناها إلى شيء متصل به وهو ركابه ومسيره لإثبات هذه الصفة له"
      
    - type: essay
      question: "استنتج نوع الكناية في الحديث الشريف (الخيل معقود في نواصيها الخير) مع توضيح السبب"
      points: 2
      answer: "كناية عن نسبة حيث نسبت صفة الخير إلى جزء من الخيل وهو النواصي بدلا من نسبتها للخيل مباشرة"
      
    - type: essay
      question: "فسر كيف تكون عبارة (بناة الأهرام) كناية عن موصوف مبينا من هو هذا الموصوف"
      points: 2
      answer: "هي كناية عن موصوف وهم الفراعنة أو المصريون القدماء حيث ذكرنا عملا يختصون به للتدليل عليهم"
      
    - type: instructions
      description: "انتهى الاختبار، ردد معي اللهم إني استودعتك ما قرأت وما حفظت وما تعلمت، فرده إلي عند حاجتي إليه، إنك على كل شيء قدير."
