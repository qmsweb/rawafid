- title: اختبار في الدروس 1-4
  subject-name: فقه اللغة
  subject-code: ARAB321
  questions: 
    - type: instructions
      mainTitle: أولا الأسئلة الموضوعية (اختيار من متعدد)
      description: تخير الإجابة الصحيحة من بين البدائل المعطاة
    - type: mcq
      question: ما السبب الذي يجعل ترجمة مصطلح (فيلولوجيا) إلى (فقه اللغة) غير دقيقة تماما في الدراسات الحديثة
      points: 1
      choices:
        - لأن فقه اللغة يدرس الأصوات فقط بينما الفيلولوجيا تدرس النحو
        - لأن فقه اللغة في التراث مرتبط بدلالة المفردات بينما الفيلولوجيا تدرس تاريخ اللغة والنصوص
        - لأن الفيلولوجيا مصطلح يوناني لا يمكن ترجمته
        - لأن علم اللغة هو الترجمة الوحيدة المعتمدة
      answer: لأن فقه اللغة في التراث مرتبط بدلالة المفردات بينما الفيلولوجيا تدرس تاريخ اللغة والنصوص
    - type: mcq
      question: من هو أول من استخدم مصطلح (فقه اللغة) في التراث العربي وذلك في كتابه (الصاحبي)
      points: 1
      choices:
        - الثعالبي
        - ابن جني
        - ابن فارس
        - السيوطي
      answer: ابن فارس
    - type: mcq
      question: اعتمد العلماء العرب في مرحلة جمع اللغة وتدوينها على قبائل محددة لضمان فصاحتها ومن هذه القبائل
      points: 1
      choices:
        - تغلب وربيعة
        - طيء وقيس وتميم
        - غطفان وعبس
        - جميع قبائل العرب دون استثناء
      answer: طيء وقيس وتميم
    - type: mcq
      question: إطلاق كلمة (مفازة) على الصحراء المهلكة تفاؤلا بالسلامة يعد تطبيقا لظاهرة
      points: 1
      choices:
        - المشترك اللفظي
        - التضاد
        - النحت
        - الترادف
      answer: التضاد
    - type: mcq
      question: الكلمات الأجنبية التي دخلت اللغة العربية وجرى عليها تغيير بالنقص أو الزيادة أو القلب مثل كلمة (غرناطة) تسمى
      points: 1
      choices:
        - الدخيل
        - المعرب
        - المولد
        - المنحوت
      answer: المعرب
    - type: mcq
      question: عندما قال ابن خالويه أحفظ للسيف خمسين اسما ورد عليه أبو علي الفارسي بأن هذه صفات وليست أسماء فإنه يعبر عن موقف
      points: 1
      choices:
        - مؤيد لظاهرة المشترك اللفظي
        - منكر لظاهرة الترادف
        - داعم للتضاد
        - مؤسس لظاهرة النحت
      answer: منكر لظاهرة الترادف
    - type: mcq
      question: اشتقاق كلمة (حوقل) من العبارة (لا حول ولا قوة إلا بالله) يعد مثالا واضحا على ظاهرة
      points: 1
      choices:
        - التعريب
        - الترادف
        - النحت
        - التوليد
      answer: النحت
    - type: mcq
      question: يطلق مصطلح (الدخيل) في فقه اللغة المعاصر على
      points: 1
      choices:
        - اللفظ الذي استعمله الناس قديما بمعان جديدة
        - اللفظ الأجنبي الذي دخل العربية دون تغيير مثل أكسجين
        - الكلمة التي تتحد صورتها ويختلف معناها
        - اللفظ المأخوذ من قبائل خالطت الأعاجم
      answer: اللفظ الأجنبي الذي دخل العربية دون تغيير مثل أكسجين
    - type: instructions
      mainTitle: ثانيا الأسئلة الموضوعية (صواب أو خطأ)
      description: حدد ما إذا كانت العبارة صحيحة أم خاطئة
    - type: tf
      question: يدرس فقه اللغة قضايا اللغة بوصفها وسيلة لدراسة الحضارة والأدب ويعتمد غالبا على المنهج التاريخي المقارن وأحيانا المنهج الوصفي
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: tf
      question: بدأ جمع اللغة العربية مبكرا في شكل معاجم شاملة وكبيرة جدا تغطي كافة مفردات اللغة دفعة واحدة
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: tf
      question: تناول الأصمعي في كتابه (الخيل) موضوعات متخصصة كأنواع الخيل وعيوبها وارتباطها بالفروسية مما يبرز مكانتها في الثقافة العربية
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: tf
      question: يعد الجاحظ أول من أطلق مصطلح (فصيلة اللغات السامية) في أواخر القرن الثامن عشر الميلادي
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: tf
      question: يرى سيبويه أن ظاهرة المشترك اللفظي موجودة في اللغة العربية وهو من المؤيدين لثبوتها
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: tf
      question: تعد كلمة (تليفزيون) من الألفاظ الدخيلة التي دخلت اللغة العربية دون إحداث أي تغيير في بنيتها
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: tf
      question: من أسباب وقوع المشترك اللفظي اكتساب الكلمة لمعان جديدة بسبب التطور اللغوي أو المجاز مثل تطور دلالة كلمة (سيارة)
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: tf
      question: قام العرب بجمع اللغة من جميع القبائل العربية دون استثناء بما فيها القبائل التي خالطت الأعاجم لضمان شمولية الجمع
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: instructions
      mainTitle: ثالثا الأسئلة المقالية (التحليل والاستنتاج)
      description: أجب عن الأسئلة التالية بناء على فهمك للنصوص
    - type: essay
      question: كيف أثر نزول القرآن الكريم بلهجة قريش على توحيد اللغة العربية وتهذيبها في حقبة اللغة الفصحى
      points: 3
      answer: أجمع العرب على روعة بيان القرآن فحاولوا الاقتراب من لهجة قريش فأصبحت للعرب لهجة فصحى موحدة يتحدثون بها كما أصبح للأدب تقاليد موحدة وهذب اللسان وارتفعت درجة البيان
    - type: essay
      question: اذكر المنهج الذي اتبعه الأقدمون في جمع اللغة العربية وتدوينها موضحا أهم المعايير التي استندوا إليها في اختيار مصادرهم
      points: 3
      answer: كان منهجهم علميا دقيقا يعتمد على الملاحظة والاستقراء والحيطة حيث اقتصروا على أخذ اللغة من عرب البادية وفصحائهم وتجنبوا القبائل التي خالطت الأعاجم واعتمدوا على قبائل محددة مثل قريش وقيس وتميم
    - type: essay
      question: قارن بين ظاهرتي (الترادف) و(المشترك اللفظي) من حيث المفهوم مع الاستدلال بمثال واحد لكل ظاهرة من دراستك
      points: 3
      answer: الترادف هو تطابق اللفظين في المعنى ومسماه واحد وأسماؤه كثيرة مثل أسماء العسل والشهد أما المشترك اللفظي فهو ما اتحدت صورته واختلف معناه مثل كلمة العين التي تعني الباصرة ونبع الماء والجاسوس
    - type: essay
      question: وضح دور ظاهرة (النحت) في إثراء اللغة العربية واتساعها مع ذكر مثال تطبيقي من الاستعمال القديم وآخر من الاستعمال الحديث
      points: 3
      answer: النحت وسيلة لتنمية اللغة وتجديد أساليبها من خلال اختصار كلمتين في كلمة واحدة تأخذ بحظ منهما مثال قديم بسمل من بسم الله الرحمن الرحيم ومثال حديث درعمي نسبة إلى دار العلوم
      questions: 
    - type: instructions
      description: انتهى الاختبار، ردد/ ِ معي اللهم إني استودعتك ما قرأتُ وما حفظتُ وما تعلمتُ، فرده إليّ عند حاجتي إليه، إنك على كل شيء قدير.
