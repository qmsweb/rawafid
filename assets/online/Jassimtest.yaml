      points: 2
      answer: "تلعب التقنيات الذكية دورا محوريا في تحسين التعلم مثل الذكاء الاصطناعي الذي يحلل أداء المتعلم ويقدم محتوى مخصصا والتعلم التكيفي الذي يعدل سرعة التعلم والمحتوى بناء على أداء الطالب والتحليلات التعليمية التي تساعد في اتخاذ قرارات مبنية على البيانات لتحسين التدريس"
      
    - type: instructions
