      answer: "التعليم المتزامن هو تفاعل مباشر في نفس الوقت مثل الحصص الافتراضية المباشرة عبر منصة منظرة بينما التعليم غير المتزامن هو تفاعل غير مباشر لا يتقيد بزمن محدد مثل الدروس المسجلة والواجبات المتاحة عبر المنصة ذاتها"
      
    - type: essay
      question: "حلل كيف تساهم استراتيجية الصف المقلوب في تنمية مهارات التفكير العليا ومراعاة الفروق الفردية لدى الطلبة"
      points: 2
      answer: "تراعي الفروق الفردية من خلال السماح للطالب بإعادة مشاهدة المحتوى المرئي والتعلم وفق سرعته الخاصة وتنمي مهارات التفكير العليا عبر استثمار وقت الحصة في التحليل والنقد وحل المشكلات والعمل التعاوني بدلا من التلقين"
      
    - type: essay
      question: "استنتج من خلال النص أبرز التحديات التي قد تعيق تطبيق التعليم الإلكتروني بنجاح في المدارس مبديا رأيك في أثرها"
      points: 2
      answer: "من أبرز التحديات الفجوة الرقمية وعدم تكافؤ الوصول للإنترنت وضعف الدعم التقني وتفاوت المهارات الرقمية للمعلمين وتحديات الأمن السيبراني وتؤثر هذه التحديات سلبا على استمرارية التعلم وعدالة توزيع الفرص التعليمية بين الطلبة"
      
    - type: essay
