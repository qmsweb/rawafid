    - type: instructions
      mainTitle: "ثالثا - الأسئلة المقالية"
      description: أجب عن الأسئلة التالية باختصار ووضوح
    - type: essay
      question: "اذكر ثلاثة من أبرز العوامل التي ساعدت على ازدهار الحياة العلمية والثقافية في الدولة اليعربية"
      points: 3
      answer: "الاهتمامات العلمية لأئمة اليعاربة والرخاء الاقتصادي والأمن والاستقرار وروح التسامح"
    - type: essay
      question: "وضح أهم التغيرات التي طرأت على موضوعات الشعر العماني بعد الانفتاح على الشعرية العالمية"
      points: 3
      answer: "تجاوز الشعر الأغراض القديمة إلى موضوعات تتعلق بمواقف الذات الإنسانية مما يحيط بها وأصبح يعبر عن هموم الشاعر الذاتية وانعكاسها على قضايا المجتمع والعصر"
    - type: essay
      question: "ما هي القضايا الوطنية التي سيطرت على اهتمام كتاب القصة القصيرة في عمان"
      points: 3
      answer: "الشعب العماني بين عوامل الفقر والجهل والتخلف ومقاومة الاحتلال الأجنبي وتأكيد الهوية الوطنية"
    - type: essay
      question: "تحدث بإيجاز عن التطور الروائي في عمان مطلع الألفية الجديدة"
      points: 3
      answer: "ظهرت أسماء روائية جديدة وبدأت الرواية تأخذ مبناها الفني وتنوع الكتاب بين من يكتب الرواية للمرة الأولى أو قدم من منطقة القصة أو الشعر مع ظهور نزعات تجريبية"
    - type: essay
      question: "بم تميز النثر العماني في العصر اليعربي من حيث الأسلوب الفني"
      points: 3
      answer: "تأثر بالنثر العربي في العصرين المملوكي والعثماني فأصبح الأسلوب المسجوع المطرز بأشكال البديع والبيان هو السمة الأبرز كما يظهر في سيرة الإمام ناصر بن مرشد لابن قيصر"
    - type: essay
      question: "كيف تعامل جيل السبعينات من الشعراء العمانيين مع الموروث الشعري الكلاسيكي"
      points: 3
      answer: "حافظوا على سمات الشعر العربي القديم في جزالة اللغة والأساليب البلاغية والقالب العروضي وتناولوا الأغراض القديمة كالمدح والغزل والرثاء والوطنيات"
    - type: essay
      question: "اذكر بعض المؤسسات التي نهضت بنظام التعليم في الدولة اليعربية"
      points: 3
      answer: "المكتبات والمساجد والمدارس والمجالس"
    - type: essay
      question: "ما هو دور عبدالله الطائي في مسيرة السرد العماني الحديث"
      points: 3
      answer: "يعتبر أول من كتب القصة القصيرة في عمان في الأربعينات مثل قصة اختفاء امرأة ويمثل حلقة وصل بين فترتين أدبيتين في عمان"
    - type: essay
      question: "علل غلبة اللغة الجزلة القوية على النص الشعري العماني المحافظ"
      points: 3
      answer: "يعود ذلك إلى التمكن من علوم العربية والارتباط بلغة القرآن والأحاديث النبوية والأدب القديم شعرا ونثرا مما جعل معجمهم الشعري ثريا ولغتهم متينة"
    - type: essay
      question: "ما هي أهم ظواهر الحياة الثقافية التي برزت في الدولة البوسعيدية"
      points: 3
      answer: "ظهور مدرسة السلوك وتدوين التاريخ العماني وازدهار السير العمانية التي توضح آراء العلماء في الوقائع السياسية"
    - type: instructions
      description: "انتهى الاختبار بالتوفيق لكم"
