    - type: mcq
      question: "من رواد مدرسة السلوك في الدولة البوسعيدية"
      points: 1
      choices:
        - جاعد بن خميس الخروصي
        - أحمد بن ماجد
        - ناصر بن مرشد
        - الستالي
