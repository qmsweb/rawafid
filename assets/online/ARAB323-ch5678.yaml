        - 1970
        - 1983
        - 2000
      answer: 1983
    - type: mcq
      question: "من أبرز موضوعات الاتجاه الرومانسي في الشعر العماني الحديث"
      points: 1
      choices:
        - المدح والهجاء بالمعنى التقليدي
        - التعبير عن حديث النفس ونجوى الذات
        - المعارضات الشعرية القديمة
        - وصف المعارك والحروب
      answer: التعبير عن حديث النفس ونجوى الذات
    - type: mcq
      question: "ظهرت في أواخر العصر النبهاني المقامة الكلوية التي صنعها"
      points: 1
