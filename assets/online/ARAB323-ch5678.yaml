        - استخدام التفعيلة الحرة
        - غياب القافية
        - جزالة اللغة والأساليب البلاغية القديمة
        - الاعتماد على الرمزية السريالية
      answer: جزالة اللغة والأساليب البلاغية القديمة
    - type: mcq
      question: "تعتبر أول رواية فنية بصوت نسائي في الأدب العماني"
      points: 1
      choices:
