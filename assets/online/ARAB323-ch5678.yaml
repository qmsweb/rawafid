    - type: mcq
      question: "تميز الإنتاج الأدبي في عهد اليعاربة بكثرة النثر لا سيما في فن"
      points: 1
      choices:
        - المقامات
        - الروايات
        - الوصايا والمراسلات
        - المسرحيات
      answer: الوصايا والمراسلات
    - type: mcq
      question: "يعتبر عام مولد القصة القصيرة العمانية الحديثة بمختلف اتجاهاتها هو العام"
      points: 1
