- title: اختبار مهارات الذكاء الانفعالي والتحفيز الذاتي
  subject-name: الإدارة الصفية والمدرسية
  subject-code: EDUC317
  questions:
    - type: instructions
      mainTitle: أولا الأسئلة الموضوعية (اختيار من متعدد)
      description: تخير الإجابة الصحيحة من بين البدائل المعطاة
      
    - type: mcq
      question: اقتحم ولي أمر مكتبك كمدير مدرسة وهو في حالة غضب شديد وصوت مرتفع بسبب رسوب ابنه في إحدى المواد، التصرف الأمثل الذي يعكس الذكاء الانفعالي هو
      points: 1
      choices:
        - استدعاء حارس الأمن فورا لإخراجه من المكتب بحزم، وذلك بهدف فرض هيبة الإدارة المدرسية.
        - الرد عليه بحزم وبصوت مرتفع لإيقافه عند حده، وذلك من أجل الدفاع عن المعلم وحمايته.
        - الاستماع إليه بهدوء لامتصاص غضبه، ثم إبداء تفهمك، ودعوته للجلوس لمراجعة درجات الطالب معا.
        - تعديل درجات الطالب فورا لإنهاء الموقف، وذلك لتجنب تصعيد المشكلة واحتواء غضب ولي الأمر.
      answer: الاستماع إليه بهدوء لامتصاص غضبه، ثم إبداء تفهمك، ودعوته للجلوس لمراجعة درجات الطالب معا.
      
    - type: mcq
      question: تم إبلاغك كمدير مدرسة بإلغاء ميزانية الحفل السنوي لتكريم المعلمين هذا العام بسبب ظروف مالية، وشعرت بإحباط شخصي، الموقف الذي يمثل التحفيز الذاتي الصحيح هو
      points: 1
      choices:
        - إبلاغ المعلمين بالقرار فورا، ومشاركتهم التذمر والإحباط من سياسات الإدارة لتخفيف الضغط النفسي عنك.
        - إلغاء فكرة التكريم تماما هذا العام، وتوجيه كل التركيز نحو إنجاز الأعمال الورقية والروتينية اليومية.
        - التفكير في بدائل إبداعية غير مكلفة، مثل تنظيم إفطار جماعي بسيط، لتشجيعهم ورفع روحهم المعنوية.
        - الانعزال في المكتب وتجنب الحديث مع المعلمين في هذا اليوم لتفادي أي إحراج أو تبرير للموقف.
      answer: التفكير في بدائل إبداعية غير مكلفة، مثل تنظيم إفطار جماعي بسيط، لتشجيعهم ورفع روحهم المعنوية.

    - type: mcq
      question: لاحظت كمدير أن معلما متميزا ودائم النشاط أصبح يتأخر كثيرا عن الطابور الصباحي ويبدو عليه التشتت الملحوظ مؤخرا، كيف توظف الذكاء الانفعالي هنا؟
      points: 1
      choices:
        - توجيه لفت نظر رسمي مكتوب مباشرة لهذا المعلم، وذلك لضمان التطبيق الحازم للوائح المدرسية.
        - استدعاؤه لاجتماع فردي، وسؤاله عن ظروفه الحالية، وتقديم الدعم والمرونة لمساعدته لتجاوزها.
        - توجيه ملاحظة نقدية علنية له أمام زملائه في غرفة المعلمين، ليكون عبرة تحذر الآخرين من التأخير.
        - تجاهل هذا التغيير السلبي تماما دون أي تدخل، وذلك تقديرا لجهوده وتميزه الملحوظ في السنوات السابقة.
      answer: استدعاؤه لاجتماع فردي، وسؤاله عن ظروفه الحالية، وتقديم الدعم والمرونة لمساعدته لتجاوزها.

    - type: mcq
      question: طبّقت الوزارة نظاما إلكترونيا جديدا ومعقدا لإدارة شؤون الطلاب، ووجدت نفسك كمدير تواجه صعوبة في فهمه، التصرف الذي يعكس رغبة في التطوير المستمر هو
      points: 1
      choices:
        - تفويض هذه المهمة بالكامل لمعلم الحاسوب في المدرسة، والابتعاد كليا عن محاولة فهم هذا النظام.
        - الاستمرار في الاعتماد على السجلات الورقية القديمة سرا، وتجاهل تطبيق النظام الإلكتروني لتجنب الصعوبة.
        - المبادرة بالتسجيل في الدورة التدريبية، ومشاركة محاولاتك وأخطائك بشفافية مع المعلمين لتشجيعهم على التعلم.
        - تكرار الشكوى والتذمر من تعقيد النظام الجديد وصعوبته خلال كل اجتماع رسمي مع فريقك المدرسي.
      answer: المبادرة بالتسجيل في الدورة التدريبية، ومشاركة محاولاتك وأخطائك بشفافية مع المعلمين لتشجيعهم على التعلم.
      
    - type: instructions
      mainTitle: ثانيا الأسئلة الموضوعية (صواب أو خطأ)
      description: حدد ما إذا كانت العبارة صحيحة أم خاطئة
      
    - type: tf
      question: يعكس الذكاء الانفعالي لمدير المدرسة قدرته على كتمان جميع مشاعره تماما وإظهار الجمود العاطفي في أوقات الأزمات المدرسية للحفاظ على صورة القائد الصارم.
      points: 1
      choices:
        - صواب
        - خطأ
      answer: خطأ

    - type: tf
      question: إصرار مدير المدرسة على تطبيق استراتيجية تدريس حديثة رغم فشل التجربة في الأسبوع الأول، من خلال إعادة تقييم الخطة وتشجيع المعلمين بعبارات إيجابية، يُعد تطبيقا عمليا لمهارة التحفيز الذاتي.
      points: 1
      choices:
        - صواب
        - خطأ
      answer: صواب

    - type: tf
      question: عندما يلاحظ مدير المدرسة علامات الإرهاق والاحتراق الوظيفي على فريقه في نهاية الفصل الدراسي, فيقرر تخفيف بعض الأعباء الإدارية غير الضرورية عنهم، فإنه بذلك يطبق مهارة التعاطف وفهم انفعالات الآخرين.
      points: 1
      choices:
        - صواب
        - خطأ
      answer: صواب
      
    - type: instructions
      mainTitle: ثالثا الأسئلة المقالية (التحليل والاستنتاج)
      description: أجب عن الأسئلة التالية بناء على فهمك للنصوص
      
    - type: essay
      question: نشب خلاف حاد بين قسمي العلوم والرياضيات حول أحقية كل منهما في استخدام قاعة التقنية الجديدة في المدرسة، ووصل التوتر إلى انقسام بين المعلمين، بصفتك مدير المدرسة كيف تطبق مهارات الذكاء الانفعالي كضبط النفس والتعاطف وإدارة العلاقات لحل هذا النزاع دون أن تخسر ولاء أي من الفريقين؟
      points: 2
      answer: لحل النزاع سأتبع الخطوات التالية أولاً (ضبط النفس) المحافظة على هدوئي التام وعدم اتخاذ قرارات متسرعة أو الانحياز لطرف دون الآخر. ثانياً (التعاطف) عقد اجتماع مشترك للاستماع لمبررات واحتياجات كلا القسمين بإنصات وإبداء تفهمي لحرصهم على تطوير طرق التدريس. ثالثاً (إدارة العلاقات) توجيه النقاش نحو الهدف المشترك وهو مصلحة الطلاب، ومساعدتهم في التوصل إلى حل توافقي مثل إعداد جدول زمني مرن وعادل يضمن استخدام القاعة بالتناوب بما يرضي الطرفين ويعيد روح التعاون للمدرسة.
      
    - type: essay
      question: بعد مرور 5 سنوات على إدارتك لنفس المدرسة، شعرت بالروتين، ولاحظت أن أداء المدرسة الأكاديمي أصبح ثابتا ولا يتقدم، وبدأ يتسرب إليك الشعور بالملل، اذكر ثلاث خطوات عملية تطبيقية نابعة من التحفيز الذاتي يمكنك اتخاذها لتجديد طاقتك وشغفك المهني وكيف ستنقل هذه الطاقة الإيجابية لبيئة المدرسة؟
      points: 2
      answer: لتجديد طاقتي وشغفي، سأتخذ الخطوات التالية 1. وضع أهداف وتحديات جديدة إطلاق مشروع مدرسي مبتكر يشكل تحدياً إيجابياً لي ولفريقي (مثل دمج الذكاء الاصطناعي في التعليم). 2. التنمية المهنية المستمرة الانضمام لبرامج تدريبية متقدمة أو مجتمعات تعلم مهنية لتبادل الخبرات والاطلاع على أحدث الممارسات الإدارية. 3. تفويض الصلاحيات تمكين القيادات الشابة لتخفيف العبء الروتيني وإتاحة المجال للابتكار. وسأنقل هذه الطاقة الإيجابية للمدرسة من خلال إشراك المعلمين والطلاب في التخطيط لهذه المبادرات، والاحتفاء بالنجاحات الصغيرة، مما يخلق بيئة عمل متجددة ومحفزة للجميع.

    - type: essay
      question: تعرضت المدرسة لحادث طارئ أدى لإخلاء المبنى، ورغم السيطرة على الموقف دون إصابات، إلا أن حالة من الذعر سيطرت على بعض الطلاب والمعلمين، كيف يمكن لمدير المدرسة الموازنة بين التحفيز الذاتي لإظهار القدرة على القيادة وتجاوز الأزمة، وبين الذكاء الانفعالي للتعامل مع الصدمة النفسية في الساعات التي تلي هذا الحادث؟
      points: 2
      answer: يمكن الموازنة من خلال خطوتين أساسيتين أولاً (الذكاء الانفعالي والتعاطف) التواجد الميداني الفوري بين المعلمين والطلاب، والاستماع لمخاوفهم وتفهمها، وتقديم الدعم النفسي للمتأثرين بالصدمة دون التقليل من مشاعرهم. ثانياً (التحفيز الذاتي والقيادة) بعد احتواء الموقف عاطفياً، أستدعي طاقتي الإيجابية للظهور بمظهر القائد المتماسك والواثق، وأوجه رسائل طمأنة واضحة تعزز الشعور بالأمان، ثم أضع خطة مرنة ومتدرجة لاستئناف اليوم الدراسي أو الأيام التالية، مع التركيز على إبراز مرونة المدرسة وقدرتها الجماعية على تجاوز الأزمات بنجاح.
      
    - type: instructions
      description: انتهى الاختبار، ردد معي اللهم إني استودعتك ما قرأتُ وما حفظتُ وما تعلمتُ، فرده إليّ عند حاجتي إليه، إنك على كل شيء قدير.
