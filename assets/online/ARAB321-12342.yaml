- title: اختبار فقه اللغة - أسئلة القدرات العليا والتحليل
  subject-name: فقه اللغة
  subject-code: ARAB321
  questions: 
    - type: instructions
      mainTitle: أولا الأسئلة الموضوعية (اختيار من متعدد)
      description: تخير الإجابة الصحيحة من بين البدائل المعطاة والتي تتطلب دقة وتركيزا عاليا
    - type: mcq
      question: لماذا تعد ترجمة مصطلح (فيلولوجيا) إلى (فقه اللغة) غير دقيقة تماما عند مقارنة الدراسات التراثية بالدراسات اللغوية الغربية
      points: 1
      choices:
        - لأن فقه اللغة يقتصر على النحو بينما الفيلولوجيا تدرس الأصوات
        - لأن فقه اللغة التراثي مرتبط بدلالة المفردات بينما الفيلولوجيا تدرس تاريخ اللغة والنصوص الثقافية والسياسية
        - لأن الفيلولوجيا تعنى باللهجات البائدة فقط
        - لأن مصطلح اللسانيات هو المظلة الوحيدة التي تشمل دراسة الأدب المقارن
      answer: لأن فقه اللغة التراثي مرتبط بدلالة المفردات بينما الفيلولوجيا تدرس تاريخ اللغة والنصوص الثقافية والسياسية
    - type: mcq
      question: من أين اقتبس عالم اللاهوت الألماني شلوتزر مصطلح (اللغات السامية) عندما أطلقه في أواخر القرن الثامن عشر
      points: 1
      choices:
        - من المخطوطات الآرامية القديمة
        - من سفر التكوين في التوراة
        - من النقوش الأكدية المكتشفة
        - من كتابات الجاحظ عن سرة البادية
      answer: من سفر التكوين في التوراة
    - type: mcq
      question: تصنف النقوش العربية البائدة إلى قسمين من حيث درجة تأثرها باللغة الآرامية أي من النقوش الآتية يعد الأقل تأثرا بها
      points: 1
      choices:
        - النقوش اللحيانية
        - النقوش الصفوية
        - نقش النمارة
        - النقوش الثمودية
      answer: نقش النمارة
    - type: mcq
      question: ما السقف الزمني الذي حدده العلماء للاحتجاج باللغة المأخوذة من سكان البادية بعد عصر الفتوحات
      points: 1
      choices:
        - القرن الثاني الهجري
        - القرن الثالث الهجري
        - القرن الرابع الهجري
        - القرن الخامس الهجري
      answer: القرن الرابع الهجري
    - type: mcq
      question: ما الحجة الجوهرية التي اعتمد عليها التاج السبكي ومن نقل عنهم كابن فارس في إنكارهم لظاهرة الترادف
      points: 1
      choices:
        - أن الألفاظ المتعددة تعود لقبائل مختلفة ولا يمكن جمعها
        - أن الألفاظ التي يظن أنها مترادفة هي في الحقيقة متباينة بالصفات ولكل منها اختصاص دلالي
        - أن القرآن الكريم لم يستخدم الترادف مطلقا
        - أن كثرة الأسماء للشيء الواحد تدل على الاشتراك اللفظي وليس الترادف
      answer: أن الألفاظ التي يظن أنها مترادفة هي في الحقيقة متباينة بالصفات ولكل منها اختصاص دلالي
    - type: mcq
      question: في مباحث كتاب الخيل للأصمعي ما هي السمة الأساسية التي اعتبرت المعيار الأهم لتقييم الخيل ومدى قدرتها على المنافسة والفروسية
      points: 1
      choices:
        - الألوان الشائعة والأنساب
        - طريقة مشي الخيل وعدوها
        - نقاء السلالة من العيوب الخلقية
        - حجم الرأس وطول العنق
      answer: طريقة مشي الخيل وعدوها
    - type: mcq
      question: أي الأفعال المنحوتة الآتية وضعتها العرب لتدل اختصارا على عبارة (أدام الله عزك)
      points: 1
      choices:
        - طلبق
        - حيعل
        - سبحل
        - دمعز
      answer: دمعز
    - type: mcq
      question: كيف تصنف كلمة (بناطيل) في ضوء دراسات وسائل نمو اللغة المعاصرة وتاريخها
      points: 1
      choices:
        - لفظ دخيل نقل بحروفه دون تغيير
        - لفظ مولد استعمله الناس قديما بعد عصر الرواية وهو معرب عن الإيطالية
        - لفظ منحوت من كلمتين
        - لفظ معرب من اليونانية القديمة
      answer: لفظ مولد استعمله الناس قديما بعد عصر الرواية وهو معرب عن الإيطالية
    - type: instructions
      mainTitle: ثانيا الأسئلة الموضوعية (صواب أو خطأ)
      description: حدد ما إذا كانت العبارة صحيحة أم خاطئة بناء على الفهم الدقيق للمقرر
    - type: tf
      question: يقتصر كتاب الصاحبي لابن فارس على الجانب المعجمي المحض ولم يتطرق أبدا للقضايا اللغوية العميقة كنشأة اللغة أو دراسة الجمل
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: tf
      question: تاريخيا تعود أقدم الآثار المكتشفة للغة الأكدية إلى ما قبل القرن العشرين قبل الميلاد في حين لا تتجاوز أقدم آثار اللغة العربية القرن الأول قبل الميلاد
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: tf
      question: بناء على رأي ابن خلدون فإن المستوى البلاغي للشعر الجاهلي عند النابغة وعنترة يتفوق بمراحل على بلاغة الشعر الإسلامي والأموي كشعر حسان وجرير
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: tf
      question: يعد سيبويه من العلماء المؤيدين لثبوت ظاهرة المشترك اللفظي في اللغة بينما كان ابن درستويه من أشد الرافضين لها
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: tf
      question: انطلق منهج التدوين اللغوي عند العرب بتأليف المعاجم الشاملة الضخمة كمعجم العين ثم تدرج إلى كتابة رسائل صغيرة متخصصة في موضوعات دقيقة كالإبل والخيل
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: tf
      question: يلعب العامل النفسي والميل للتفاؤل دورا بارزا في توليد ظاهرة التضاد في اللغة العربية كإطلاق وصف (مفازة) على الصحراء المهلكة
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: tf
      question: تعتبر كلمة (الخوارزميات) وفقا لتصنيفات إثراء العربية المعاصرة من الألفاظ الدخيلة التي دخلت لغتنا دون إحداث أي تغيير في بنيتها
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: instructions
      mainTitle: ثالثا الأسئلة المقالية (التحليل والتركيب)
      description: أجب عن الأسئلة التالية بتحليل علمي مستند إلى مضامين الدروس
    - type: essay
      question: اشرح الرؤية التوفيقية العميقة التي طرحها عز الدين بن جماعة في مسألة الخلاف حول وقوع الترادف مستدلا بتحليله لأسماء الله الحسنى
      points: 3
      answer: وفق ابن جماعة بين المانعين والمؤيدين بأن من يرى الترادف ينظر إلى اتحاد دلالة الألفاظ على الذات الواحدة ومن يمنعه ينظر إلى اختصاص كل لفظ بصفة أو معنى زائد فأسماء الله كالسميع والبصير مترادفة لدلالتها على ذات واحدة ومتباينة لأن معنى السميع يختلف عن معنى البصير
    - type: essay
      question: فسر كيف أحدث نزول القرآن الكريم تحولا جذريا في مسار (العربية الباقية) وانتقالها من مرحلة تباين اللهجات وغرابة الألفاظ إلى سيادة لغة فصحى موحدة
      points: 3
      answer: قبل القرآن كانت اللهجات تتباين في الأصوات والدلالات وتمتلئ بالغريب والوحشي فلما نزل القرآن بلهجة قريش أجمع العرب على بيانه فحاولوا الاقتراب من لغته فتوحدت تقاليد الصياغة والأداء وهذب اللسان وارتفعت البلاغة لتصبح لغة قريش هي الفصحى الجامعة
    - type: essay
      question: اعتمد الأقدمون في جمع اللغة على المنهج الاستقرائي الوصفي وليس المعياري في بادئ الأمر وضح أثر هذا المنهج على موقفهم العلمي من اللهجات العربية المتنوعة
      points: 3
      answer: بفضل المنهج الوصفي الاستقرائي لم يتخذ العلماء موقفا ضد اللهجات بالرفض أو الإهمال بل سجلوا وفرقوا بين مستوى الفصيح ومستوى اللهجات المحيطة وأثبتوا أمثلة عديدة منها مبثوثة في كتبهم مما يعكس أمانة النقل ووصف الواقع اللغوي كما هو
    - type: essay
      question: ميز بدقة تحليلية بين مصطلحي (المعرب) و(الدخيل) مبينا آلية دخول كل منهما إلى بنية اللغة العربية مع الاستشهاد بمثال تطبيقي حديث لكل مصطلح
      points: 3
      answer: المعرب هو اللفظ الأجنبي الذي أخضعه العرب لتغييرات في بنيته بالنقص أو الزيادة أو القلب ليوافق أوزانهم مثل كلمة (غرناطة) أو (بكين) أما الدخيل فهو اللفظ الأجنبي الذي دخل العربية واحتفظ بصورته الأصلية دون تغيير يذكر مثل (أكسجين) و(ميكروويف)
    - type: essay
      question: يعلل علماء الأصول وقوع المشترك اللفظي في العربية لسببين رئيسيين أحدهما متعلق بتعدد الواضعين والآخر بواضع واحد فكك هذين السببين مبينا الغرض من كل منهما
      points: 3
      answer: السبب الأول (من واضعين) يحدث حين تضع قبيلة اسما لمعنى وتضع قبيلة أخرى نفس الاسم لمعنى مختلف ثم يشتهر اللفظان وهذا مبني على اصطلاحية اللغة والسبب الثاني (من واضع واحد) ويكون نادرا وغرضه الأساسي الإبهام على السامع حيث يكون التصريح سببا لمفسدة
