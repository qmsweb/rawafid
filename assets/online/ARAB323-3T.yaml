- title: اختبار الفهم والتحليل في الأدب العماني القديم
  subject-name: الأدب العماني
  subject-code: ARAB323
  questions:
    - type: instructions
      mainTitle: "أولًا: الأسئلة الموضوعية (اختيار من متعدد)"
      description: "تخير الإجابة الصحيحة من بين البدائل المعطاة."

    - type: mcq
      [span_3](start_span)question: "وفقًا لنص ابن سلام الجمحي، ما السبب الرئيس الذي جعل الشعر قليلًا في عمان والطائف؟[span_3](end_span)"
      points: 1
      choices:
        - "ضعف السليقة اللغوية عند سكان الأطراف"
        - "غياب الحروب والصراعات والنوائر بين القبائل"
        - "وجودهما في طرف (البعد الجغرافي)"
        - "اعتمادهم على الخطابة فقط دون الشعر"
      [span_4](start_span)answer: "وجودهما في طرف (البعد الجغرافي)[span_4](end_span)"

    - type: mcq
      question: "الآية القرآنية: 'وعلى كل ضامر يأتين من كل فج عميق'، وردت في النص لمناقشة الخاصية المكانية لعمان. [span_5](start_span)ما الذي تلمح إليه هذه الآية في السياق؟[span_5](end_span)"
      points: 1
      choices:
        - "أن عمان كانت معزولة تمامًا عن الحضارات"
        - "أن عمان تقع في طرف بعيد ولكنها مرتبطة بالمركز عبر طرق وعرة"
        - "أن عمان لا تصلح للسكن بسبب وعورة الطرق"
        - "أن عمان كانت مركزًا للحروب والغزوات"
      [span_6](start_span)answer: "أن عمان تقع في طرف بعيد ولكنها مرتبطة بالمركز عبر طرق وعرة[span_6](end_span)"

    - type: mcq
      [span_7](start_span)question: "ماذا يستفاد من قول جرير: 'لو يسمعون بأكلة أو شربة / بعمان أصبح جمعهم بعمان' في سياق حديث النص؟[span_7](end_span)"
      points: 1
      choices:
        - "وصف لتنوع القبائل والألوان في عمان"
        - "نقد لسكان عمان بسبب تشابه ألوانهم"
        - "الإشارة إلى بعد المسافة (الخاصية المكانية) ومع ذلك تُقصد طمعًا في الرزق"
        - "مدح لصفات أهل عمان"
      [span_8](start_span)answer: "الإشارة إلى بعد المسافة (الخاصية المكانية) ومع ذلك تُقصد طمعًا في الرزق[span_8](end_span)"

    - type: mcq
      question: "يقول الأعشى: 'وقد طفت للمال آفاقه / عمان فحمص فأوريشلم'. [span_9](start_span)ما الذي يدل عليه هذا البيت من حيث مكانة عمان؟[span_9](end_span)"
      points: 1
      choices:
        - "أن عمان كانت معزولة فقيرة لا يقصدها التجار"
        - "أن عمان كانت وجهة تجارية وحضارية إلى جانب مدن كبرى"
        - "أن عمان كانت محط رحال الشاعر فقط للاستجمام"
        - "أن عمان كانت تحت الحكم الروماني"
      [span_10](start_span)answer: "أن عمان كانت وجهة تجارية وحضارية إلى جانب مدن كبرى[span_10](end_span)"

    - type: mcq
      [span_11](start_span)question: "وفقًا لنص الجاحظ في 'البيان والتبيين'، ما الذي أثار عجبه في شأن قبيلة عبد القيس؟[span_11](end_span)"
      points: 1
      choices:
        - "أنهم حاربوا إياد واندثروا"
        - "أنهم أصبحوا خطباء العرب بعد استقرارهم في عمان، وشعراء في البحرين، بينما لم يكونوا كذلك في البادية"
        - "أنهم فقدوا فصاحتهم تمامًا بعد مغادرة البادية"
        - "أنهم تحولوا إلى التجارة وتركوا الأدب"
      [span_12](start_span)answer: "أنهم أصبحوا خطباء العرب بعد استقرارهم في عمان، وشعراء في البحرين، بينما لم يكونوا كذلك في البادية[span_12](end_span)"

    - type: mcq
      [span_13](start_span)question: "ماذا قال عمر بن عبد العزيز بعد سماع أبيات كعب الأشقري: 'عمال أرضك بالبلاد ذئاب...'؟[span_13](end_span)"
      points: 1
      choices:
        - "أمر بحبسه لجرأته"
        - "قال: 'ما كنت أظن أهل عمان يقولون مثل هذا الشعر'"
        - "كافأه وأعطاه جائزة"
        - "طلب منه أن يمدحه أكثر"
      [span_14](start_span)answer: "قال: 'ما كنت أظن أهل عمان يقولون مثل هذا الشعر'[span_14](end_span)"

    - type: mcq
      [span_15](start_span)question: "دلالة استخدام كعب الأشقري لكلمة 'ذئاب' في وصف عمال الخليفة تدل على:[span_15](end_span)"
      points: 1
      choices:
        - "مدح الولاة لأن الذئاب ترمز للقوة"
        - "نقدًا لاذعًا لاستغلال الولاة ونهبهم للمال العام"
        - "وصفًا لطبيعة عمان الجغرافية"
        - "إشارة إلى كثرة الذئاب في عمان"
      [span_16](start_span)answer: "نقدًا لاذعًا لاستغلال الولاة ونهبهم للمال العام[span_16](end_span)"

    - type: mcq
      [span_17](start_span)question: "من خلال النص، الخاصية المكانية لعمان (كونها في طرف) أدت إلى:[span_17](end_span)"
      points: 1
      choices:
        - "قلة الشعر الحماسي بسبب قلة الحروب، لكنها أصبحت مقصدًا للرحلات والتجارة"
        - "انقطاع كامل للتواصل مع مركز الجزيرة"
        - "تفوق الشعر العماني على كل الشعر الجاهلي"
        - "هجرة كل السكان إلى الحجاز"
      [span_18](start_span)answer: "قلة الشعر الحماسي بسبب قلة الحروب، لكنها أصبحت مقصدًا للرحلات والتجارة[span_18](end_span)"

    - type: mcq
      [span_19](start_span)question: "بمَ علل الشيخ نور الدين السالمي غياب أكثر أخبار الأئمة وغيرهم من أهل عمان في كتابه 'تحفة الأعيان'؟[span_19](end_span)"
      points: 1
      choices:
        - "بسبب ضياع الكتب في الحروب"
        - "لأن أهل عمان لا يعتنون بالتاريخ"
        - "لأن عمان كانت في طرف معزول"
        - "بسبب قلة العلماء في تلك الفترة"
      [span_20](start_span)answer: "لأن أهل عمان لا يعتنون بالتاريخ[span_20](end_span)"

    - type: mcq
      [span_21](start_span)question: "ما المهمة المطلوبة في الصفحات 7-10 من الملف (عدي بن وادع الأزدي، عقبة بن النعمان العتكي، مالك بن فهم الأزدي، كعب بن معدان الأشقري)؟[span_21](end_span)"
      points: 1
      choices:
        - "حفظ قصائدهم"
        - "البحث والتحدث عنهم كشعراء عمانيين"
        - "مقارنتهم بشعراء قريش"
        - "نقد شعرهم"
      [span_22](start_span)answer: "البحث والتحدث عنهم كشعراء عمانيين[span_22](end_span)"

    - type: mcq
      [span_23](start_span)question: "وفقًا لمنهج ابن سلام الجمحي، أي البيئات أكثر إنتاجًا للشعر؟[span_23](end_span)"
      points: 1
      choices:
        - "البيئات المستقرة آمنة"
        - "البيئات المضطربة بكثرة الحروب والثارات"
        - "البيئات التجارية المزدهرة"
        - "البيئات الزراعية"
      [span_24](start_span)answer: "البيئات المضطربة بكثرة الحروب والثارات[span_24](end_span)"

    - type: mcq
      [span_25](start_span)question: "قصة عمر بن عبد العزيز مع كعب الأشقري تعكس:[span_25](end_span)"
      points: 1
      choices:
        - "ضعف الشعر العماني مقارنة بالشام"
        - "وجود صورة نمطية سابقة في مركز الخلافة عن ندرة الأدب العماني"
        - "أن الخليفة كان شاعرًا مجيدًا"
        - "أن كعبًا كان من شعراء البلاط"
      [span_26](start_span)answer: "وجود صورة نمطية سابقة في مركز الخلافة عن ندرة الأدب العماني[span_26](end_span)"

    - type: instructions
      mainTitle: "ثانيًا: الأسئلة الموضوعية (صواب أو خطأ)"
      description: "حدد ما إذا كانت العبارة صحيحة أم خاطئة."

    - type: tf
      [span_27](start_span)question: "يرى ابن سلام الجمحي أن كثرة الحروب والنزاعات القبلية هي السبب الرئيس في كثرة الشعر الجاهلي.[span_27](end_span)"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      [span_28](start_span)answer: "صح[span_28](end_span)"

    - type: tf
      [span_29](start_span)question: "وفقًا للجاحظ، قبيلة عبد القيس كانت خطباء وشعراء حتى قبل استقرارهم في عمان والبحرين حين كانوا في سرة البادية.[span_29](end_span)"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      [span_30](start_span)answer: "خطأ[span_30](end_span)"

    - type: tf
      [span_31](start_span)question: "استشهاد النص ببيت الأعشى الذي يذكر عمان إلى جانب حمص وأورشليم يدل على أن عمان كانت معزولة وغير معروفة.[span_31](end_span)"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      [span_32](start_span)answer: "خطأ[span_32](end_span)"

    - type: tf
      [span_33](start_span)question: "عمر بن عبد العزيز تفاجأ بجودة شعر كعب الأشقري مما يدل على أن الأدب العماني لم يكن مشهورًا في مراكز الخلافة.[span_33](end_span)"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      [span_34](start_span)answer: "صح[span_34](end_span)"

    - type: tf
      [span_35](start_span)question: "البيت 'عمال أرضك بالبلاد ذئاب' يعتبر نموذجًا للشعر السياسي الناقد في العصر الأموي.[span_35](end_span)"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      [span_36](start_span)answer: "صح[span_36](end_span)"

    - type: instructions
      mainTitle: "ثالثًا: الأسئلة المقالية (التحليل والاستنتاج)"
      description: "أجب عن الأسئلة التالية."

    - type: essay
      [span_37](start_span)[span_38](start_span)question: "كيف يمكن الجمع بين قلة الشعر في عمان وفقًا لابن سلام الجمحي، وظهور شاعر ناقد جريء مثل كعب الأشقري في العصر الأموي؟[span_37](end_span)[span_38](end_span)"
      points: 3
      [span_39](start_span)[span_40](start_span)answer: "قلة الشعر حسب ابن سلام تتعلق بالشعر القبلي الحماسي الناتج عن الحروب الداخلية، أما كعب الأشقري فيمثل تطور الشعر إلى أغراض سياسية واجتماعية، حيث أتاح استقرار الدولة فرصة للنقد السياسي الموجه للسلطة بعيدًا عن الصراعات القبلية الداخلية.[span_39](end_span)[span_40](end_span)"

    - type: essay
      [span_41](start_span)question: "بين الدلالة الأدبية والتاريخية لاستشهاد النص بالآية القرآنية 'وعلى كل ضامر يأتين من كل فج عميق' في سياق الحديث عن عمان.[span_41](end_span)"
      points: 2
      answer: "الآية تشير إلى بعد المسافة ووعورة الطريق، مما يعكس موقع عمان الطرفي جغرافيًا. [span_42](start_span)ومع ذلك، فإن مجيء الإبل من كل فج عميق يرمز إلى أن عمان بالرغم من بعدها كانت متصلة بالمركز الحضاري عبر الرحلات، وهو ما تؤكده أبيات الأعشى وجرير.[span_42](end_span)"

    - type: essay
      question: "ماذا نستفيد من تعجب الجاحظ من تحول عبد القيس إلى خطباء بعد استقرارهم في عمان؟ [span_43](start_span)حلل العلاقة بين البيئة والإبداع الأدبي.[span_43](end_span)"
      points: 3
      answer: "تعجب الجاحظ يدل على أن البيئة المستقرة والاختلاط يمكن أن ينتج أجناسًا أدبية متطورة كالخطابة، خلافًا للاعتقاد السائد بأن البادية وحدها معدن الفصاحة. [span_44](start_span)انتقال عبد القيس ساهم في صقل مواهبهم وتنوع إنتاجهم الأدبي.[span_44](end_span)"

    - type: essay
      [span_45](start_span)question: "باستخدام نموذج عمر بن عبد العزيز وكعب الأشقري، ناقش كيف يمكن للشعر أن يكون أداة للمحاسبة السياسية في العصر الأموي.[span_45](end_span)"
      points: 3
      answer: "أبيات كعب الأشقري التي يصف فيها عمال الخليفة بـ'الذئاب' تمثل نقدًا سياسيًا مباشرًا، يحمل الخليفة المسؤولية عن ظلم الولاة. [span_46](start_span)دهشة عمر بن عبد العزيز تؤكد أن هذا النقد لم يكن متوقعًا من الأطراف، مما يعطي الشعر دورًا رقابيًا.[span_46](end_span)"

    - type: essay
      [span_47](start_span)question: "بناءً على النص، كيف يمكن تفسير التناقض الظاهري بين كون عمان طرفًا جغرافيًا (فقلة شعر الحروب) وكونها مقصدًا للرحلات والتجارة في شعر الأعشى وجرير؟[span_47](end_span)"
      points: 2
      answer: "الطرفية الجغرافية تعني البعد عن مركز الصراعات التي تنتج الشعر الحماسي، لكن هذا البعد جعل عمان منطقة آمنة وممرًا تجاريًا، مما جذب التجار والرحالة. [span_48](start_span)وبالتالي فإن 'الطرف' لم يمنع النشاط الاقتصادي، بل قلل فقط من نوع معين من الشعر.[span_48](end_span)"
