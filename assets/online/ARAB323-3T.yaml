- title: "محاكاة لاختبار المنتصف"
  subject-name: الأدب العماني
  subject-code: ARAB323
  questions:
    - type: instructions
      mainTitle: "أولًا: الأسئلة الموضوعية (اختيار من متعدد)"
      description: "تخير الإجابة الصحيحة من بين البدائل المعطاة."

    - type: mcq
      [span_0](start_span)question: "متى تبدأ وتنتهي حقبة الأدب العماني القديم وفقاً للتقسيم التاريخي المذكور في المصادر؟[span_0](end_span)"
      points: 1
      choices:
        - "من ظهور الإسلام إلى العصر الحديث"
        - "من العصر الأموي إلى دولة اليعاربة"
        - "من نزول الأزد عمان إلى ما قبل الدولة النبهانية الأولى (549 هـ)"
        - "من بداية التدوين إلى نهاية حكم السلطان سعيد بن تيمور"
      answer: "من نزول الأزد عمان إلى ما قبل الدولة النبهانية الأولى (549 هـ)"

    - type: mcq
      [span_1](start_span)question: "لمن يُنسب أقدم ما وصلنا من شعر ينتمي لإقليم عمان في فترة الأدب القديم؟[span_1](end_span)"
      points: 1
      choices:
        - "مازن بن غضوبة"
        - "كعب بن معدان الأشقري"
        - "المهلب بن أبي صفرة"
        - "مالك بن فهم"
      answer: "مالك بن فهم"

    - type: mcq
      [span_2](start_span)question: "أي من الكتب التالية يُعد من المصادر العمانية التي أرخت للتاريخ العماني واعتُمد عليها كمصدر للأدب؟[span_2](end_span)"
      points: 1
      choices:
        - "البيان والتبيين للجاحظ"
        - "الأنساب للعوتبي"
        - "جمهرة أنساب العرب لابن حزم"
        - "الكامل لابن الأثير"
      answer: "الأنساب للعوتبي"

    - type: mcq
      [span_3](start_span)question: "من القائل للمثل الشعري الشهير 'اتسع الخرق على الراقع' الموثق في الأدب العماني القديم؟[span_3](end_span)"
      points: 1
      choices:
        - "سليمة بن مالك بن فهم"
        - "صعصعة بن صوحان العبدي"
        - "الشاعر ابن حمام الأزدي"
        - "مازن بن غضوبة"
      answer: "الشاعر ابن حمام الأزدي"

    - type: mcq
      [span_4](start_span)question: "عُرفت بعض القبائل العمانية بالفصاحة والخطابة، مَن هم خطباء العرب الذين ضُرب بهم المثل وقيل (أخطب من مصقلة)؟[span_4](end_span)"
      points: 1
      choices:
        - "خطباء قبيلة الأزد"
        - "خطباء قبيلة إياد"
        - "خطباء آل صوحان"
        - "خطباء قبيلة عبد القيس"
      answer: "خطباء قبيلة عبد القيس"

    - type: instructions
      mainTitle: "ثانيًا: الأسئلة الموضوعية (صواب أو خطأ)"
      description: "حدد ما إذا كانت العبارة صحيحة أم خاطئة."

    - type: tf
      [span_5](start_span)question: "وفد الشاعر الجاهلي الأعشى ميمون بن قيس إلى الملك الجلندى بن المستكبر في عمان، وامتدحه في شعره.[span_5](end_span)"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"

    - type: tf
      [span_6](start_span)question: "يذكر الجاحظ في 'البيان والتبيين' أن فرقة قبيلة عبد القيس التي وقعت إلى البحرين أصبحوا خطباء العرب، بينما من وقعوا في عمان أصبحوا شعراء.[span_6](end_span)"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"

    - type: tf
      [span_7](start_span)question: "لم يتأثر الأدب العماني بمجيء الإسلام، وظل محافظاً على نفس الأغراض الشعرية الجاهلية كالغزل الفاحش والهجاء المقذع.[span_7](end_span)"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"

    - type: instructions
      mainTitle: "ثالثًا: الأسئلة المقالية (التحليل والاستنتاج)"
      description: "أجب عن الأسئلة التالية."

    - type: essay
      question: "يرى الباحثون أن قلة ما وصلنا من الأدب العماني القديم لا تعني بالضرورة قلة الأدب فعلياً. اذكر أبرز العوامل والأسباب التي أدت إلى ضياع الكثير من هذا النتاج الأدبي."
      points: 3
      [span_8](start_span)answer: "اتسمت هذه الحقبة بقلة الرواة، وقلة التدوين خاصة في فترة ما قبل الإسلام[span_8](end_span). كما كان للعامل الجغرافي دور كبير؛ [span_9](start_span)والمتمثل في بعد عمان عن الحواضر الثقافية المزدهرة ووجود الربع الخالي ومشقة السفر[span_9](end_span). [span_10](start_span)يضاف إلى ذلك ما ذكره الشيخ نور الدين السالمي من أن أهل عمان لا يعتنون بالتاريخ مما أدى لغياب أكثر الأخبار[span_10](end_span)."

    - type: essay
      question: "لعب ملوك عمان دوراً مهماً في إذكاء الحركة الأدبية في عمان قديماً. وضّح ذلك مدعماً إجابتك بالأمثلة."
      points: 3
      [span_11](start_span)answer: "كان الكثير من ملوك عمان شعراء أو خطباء أو محبين للأدب، مما أوجد اهتماماً عاماً بالشعر[span_11](end_span). [span_12](start_span)فعلى سبيل المثال، كان مالك بن فهم الأزدي شاعراً وخطيباً وله مقطوعات شعرية[span_12](end_span)[span_13](start_span)، وكذلك ابنه هناءة وأخوه سليمة[span_13](end_span). [span_14](start_span)كما قام الملوك بتقريب الشعراء وإجزال العطايا لهم، مثل اتخاذ مالك بن فهم للشاعر أوس بن زيد مناة وزيراً له[span_14](end_span)[span_15](start_span)، ووفادة الأعشى إلى الملك الجلندى بن المستكبر[span_15](end_span)."

    - type: essay
      question: "كيف تجلى تأثير دخول عمان في الدين الإسلامي على سمات الأدب العماني وأغراضه؟ مستشهداً بنموذج لأحد الشعراء."
      points: 3
      [span_16](start_span)answer: "تأثر الأدب العماني بالإسلام فتجلت سمات جديدة كظهور المدائح النبوية، والحث على الدعوة للإسلام، وإبراز قيمه، مع الابتعاد عن المنهيات كالغزل الفاحش والهجاء المقذع[span_16](end_span). [span_17](start_span)من أبرز النماذج شعر مازن بن غضوبة الذي عبّر في شعره عن تركه للخمر والعهر، واستبداله ذلك بالخوف والخشية، جاعلاً همه في الجهاد والصوم والحج[span_17](end_span)."
