title: اختبار الفهم والتحليل في الأدب العماني القديم
subject-name: الأدب العماني
subject-code: ARAB323
questions:
  - type: instructions
    mainTitle: "أولًا الأسئلة الموضوعية (اختيار من متعدد)"
    description: تخير الإجابة الصحيحة من بين البدائل المعطاة
  - type: mcq
    question: "وفقًا لنص ابن سلام الجمحي، ما السبب الرئيس الذي جعل الشعر قليلًا في عمان وقريش؟"
    points: 1
    choices:
      - ضعف السليقة اللغوية عند سكان الأطراف
      - غياب الحروب والصراعات والنوائر بين القبائل
      - انشغالهم بالتجارة البحرية
      - اعتمادهم على الخطابة فقط دون الشعر
    answer: غياب الحروب والصراعات والنوائر بين القبائل
  - type: mcq
    question: "الآية القرآنية: 'وعلى كل ضمير يأتين من كل فج عميق'، وردت في النص لمناقشة الخاصية المكانية لعمان. ما الذي تلمح إليه هذه الآية في السياق؟"
    points: 1
    choices:
      - أن عمان كانت معزولة تمامًا عن الحضارات
      - أن عمان تقع في طرف بعيد ولكنها مرتبطة بالمركز عبر طرق وعرة
      - أن عمان لا تصلح للسكن بسبب وعورة الطرق
      - أن عمان كانت مركزًا للحروب والغزوات
    answer: أن عمان تقع في طرف بعيد ولكنها مرتبطة بالمركز عبر طرق وعرة
  - type: mcq
    question: "ماذا يستفاد من بيت جرير: 'حص اللحى متشابهو الألوان بعمان أصبح جمعهم بعمان'؟"
    points: 1
    choices:
      - وصف لتنوع القبائل والألوان في عمان
      - نقد لسكان عمان بسبب تشابه ألوانهم
      - إشارة إلى أن عمان أصبحت مجمعًا لقبائل متعددة
      - مدح لصفات أهل عمان
    answer: إشارة إلى أن عمان أصبحت مجمعًا لقبائل متعددة
  - type: mcq
    question: "يقول الأعشى: 'وقد طفت للمال آفاقه / عمان فحمص فأوريشلم'. ما الذي يدل عليه هذا البيت من حيث مكانة عمان؟"
    points: 1
    choices:
      - أن عمان كانت معزولة فقيرة لا يقصدها التجار
      - أن عمان كانت وجهة تجارية وحضارية إلى جانب مدن كبرى
      - أن عمان كانت محط رحال الشاعر فقط للاستجمام
      - أن عمان كانت تحت الحكم الروماني
    answer: أن عمان كانت وجهة تجارية وحضارية إلى جانب مدن كبرى
  - type: mcq
    question: "وفقًا لنص الجاحظ في 'البيان والتبيين'، ما الذي أثار عجبه في شأن قبيلة عبد القيس؟"
    points: 1
    choices:
      - أنهم حاربوا إياد واندثروا
      - أنهم أصبحوا خطباء العرب بعد استقرارهم في عمان، وشعراء في البحرين، بينما لم يكونوا كذلك في البادية
      - أنهم فقدوا فصاحتهم تمامًا بعد مغادرة البادية
      - أنهم تحولوا إلى التجارة وتركوا الأدب
    answer: أنهم أصبحوا خطباء العرب بعد استقرارهم في عمان، وشعراء في البحرين، بينما لم يكونوا كذلك في البادية
  - type: mcq
    question: "ماذا قال عمر بن عبد العزيز بعد سماع أبيات كعب الأشقري: 'عمال أرضك بالبلاد ذئاب...'؟"
    points: 1
    choices:
      - أمر بحبسه لجرأته
      - قال: 'ما كنت أظن أهل عمان يقولون مثل هذا الشعر'
      - كافأه وأعطاه جائزة
      - طلب منه أن يمدحه أكثر
    answer: "قال: 'ما كنت أظن أهل عمان يقولون مثل هذا الشعر'"
  - type: mcq
    question: "دلالة استخدام كعب الأشقري لكلمة 'ذئاب' في وصف عمال الخليفة تدل على:"
    points: 1
    choices:
      - مدح الولاة لأن الذئاب ترمز للقوة
      - نقدًا لاذعًا لاستغلال الولاة ونهبهم للمال العام
      - وصفًا لطبيعة عمان الجغرافية
      - إشارة إلى كثرة الذئاب في عمان
    answer: نقدًا لاذعًا لاستغلال الولاة ونهبهم للمال العام
  - type: mcq
    question: "من خلال النص، الخاصية المكانية لعمان (كونها في طرف) أدت إلى:"
    points: 1
    choices:
      - قلة الشعر الحماسي بسبب قلة الحروب، لكنها أصبحت مقصدًا للرحلات والتجارة
      - انقطاع كامل للتواصل مع مركز الجزيرة
      - تفوق الشعر العماني على كل الشعر الجاهلي
      - هجرة كل السكان إلى الحجاز
    answer: قلة الشعر الحماسي بسبب قلة الحروب، لكنها أصبحت مقصدًا للرحلات والتجارة
  - type: mcq
    question: "ما المهمة المطلوبة في الصفحات 7-10 من الملف (عدي بن وادع، عقبة بن النعمان، مالك بن فهم، كعب بن معدان)؟"
    points: 1
    choices:
      - حفظ قصائدهم
      - البحث والتحدث عنهم كشعراء عمانيين
      - مقارنتهم بشعراء قريش
      - نقد شعرهم
    answer: البحث والتحدث عنهم كشعراء عمانيين
  - type: mcq
    question: "وفقًا لمنهج ابن سلام الجمحي، أي البيئات أكثر إنتاجًا للشعر؟"
    points: 1
    choices:
      - البيئات المستقرة آمنة
      - البيئات المضطربة بكثرة الحروب والثارات
      - البيئات التجارية المزدهرة
      - البيئات الزراعية
    answer: البيئات المضطربة بكثرة الحروب والثارات
  - type: mcq
    question: "قصة عمر بن عبد العزيز مع كعب الأشقري تعكس:"
    points: 1
    choices:
      - ضعف الشعر العماني مقارنة بالشام
      - وجود صورة نمطية سابقة في مركز الخلافة عن ندرة الأدب العماني
      - أن الخليفة كان شاعرًا مجيدًا
      - أن كعبًا كان من شعراء البلاط
    answer: وجود صورة نمطية سابقة في مركز الخلافة عن ندرة الأدب العماني
  - type: instructions
    mainTitle: "ثانيًا الأسئلة الموضوعية (صواب أو خطأ)"
    description: حدد ما إذا كانت العبارة صحيحة أم خاطئة.
  - type: tf
    question: "يرى ابن سلام الجمحي أن كثرة الحروب والنزاعات القبلية هي السبب الرئيس في كثرة الشعر الجاهلي."
    points: 1
    choices:
      - صح
      - خطأ
    answer: صح
  - type: tf
    question: "وفقًا للجاحظ، قبيلة عبد القيس كانت خطباء وشعراء حتى قبل استقرارهم في عمان والبحرين."
    points: 1
    choices:
      - صح
      - خطأ
    answer: خطأ
  - type: tf
    question: "استشهاد النص ببيت الأعشى الذي يذكر عمان إلى جانب حمص وأورشليم يدل على أن عمان كانت معزولة وغير معروفة."
    points: 1
    choices:
      - صح
      - خطأ
    answer: خطأ
  - type: tf
    question: "عمر بن عبد العزيز تفاجأ بجودة شعر كعب الأشقري مما يدل على أن الأدب العماني لم يكن مشهورًا في مراكز الخلافة."
    points: 1
    choices:
      - صح
      - خطأ
    answer: صح
  - type: tf
    question: "البيت 'عمال أرضك بالبلاد ذئاب' يعتبر نموذجًا للشعر السياسي الناقد في العصر الأموي."
    points: 1
    choices:
      - صح
      - خطأ
    answer: صح
  - type: instructions
    mainTitle: "ثالثًا الأسئلة المقالية (التحليل والاستنتاج)"
    description: أجب عن الأسئلة التالية
  - type: essay
    question: "كيف يمكن الجمع بين قلة الشعر في عمان وفقًا لابن سلام الجمحي، وظهور شاعر ناقد جريء مثل كعب الأشقري في العصر الأموي؟"
    points: 3
    answer: "قلة الشعر حسب ابن سلام تتعلق بالشعر القبلي الحماسي الناتج عن الحروب الداخلية في الجاهلية، أما كعب الأشقري فيمثل تطور الشعر إلى أغراض سياسية واجتماعية في عصر الإسلام، حيث استقرت عمان وأصبحت جزءًا من الدولة، مما أتاح فرصة للنقد السياسي الموجه للسلطة بعيدًا عن الصراعات القبلية الداخلية."
  - type: essay
    question: "بين الدلالة الأدبية والتاريخية لاستشهاد النص بالآية القرآنية 'وعلى كل ضمير يأتين من كل فج عميق' في سياق الحديث عن عمان."
    points: 2
    answer: "الآية تشير إلى بعد المسافة ووعورة الطريق، مما يعكس موقع عمان الطرفي جغرافيًا. ومع ذلك، فإن 'الضمير' (الإبل السريعة) تأتي من كل فج عميق، مما يرمز إلى أن عمان بالرغم من بعدها كانت متصلة بالمركز الحضاري عبر الرحلات والتجارة والحج، وهو ما تؤكده أبيات الأعشى وجرير."
  - type: essay
    question: "ماذا نستفيد من تعجب الجاحظ من تحول عبد القيس إلى خطباء بعد استقرارهم في عمان؟ حلل العلاقة بين البيئة والإبداع الأدبي."
    points: 3
    answer: "تعجب الجاحظ يدل على أن البيئة المستقرة والاختلاط الحضاري يمكن أن ينتج أجناسًا أدبية متطورة كالخطابة، خلافًا للاعتقاد السائد بأن البادية وحدها معدن الفصاحة. انتقال عبد القيس من البادية (سرّة البادية) إلى عمان والبحرين ساهم في صقل مواهبهم وتنوع إنتاجهم الأدبي، مما يثبت أن الاستقرار والتحضر لا يضعفان الملكة اللغوية بل يطورانها."
  - type: essay
    question: "باستخدام نموذج عمر بن عبد العزيز وكعب الأشقري، ناقش كيف يمكن للشعر أن يكون أداة للمحاسبة السياسية في العصر الأموي."
    points: 3
    answer: "أبيات كعب الأشقري التي يصف فيها عمال الخليفة بـ'الذئاب' تمثل نقدًا سياسيًا جريئًا ومباشرًا، حيث حمل الخليفة المسؤولية الأخلاقية عن ظلم الولاة. دهشة عمر بن عبد العزيز تؤكد أن هذا النوع من النقد الشعري لم يكن متوقعًا من أطراف الدولة، مما يعطي الشعر دورًا رقابيًا وإصلاحيًا يتجاوز المديح التقليدي."
  - type: essay
    question: "بناءً على النص، كيف يمكن تفسير التناقض الظاهري بين كون عمان طرفًا جغرافيًا (فقلة شعر الحروب) وكونها مقصدًا للرحلات والتجارة في شعر الأعشى وجرير؟"
    points: 2
    answer: "الطرفية الجغرافية تعني البعد عن مركز الصراعات القبلية التي تنتج الشعر الحماسي، لكن هذا البعد نفسه جعل عمان منطقة آمنة نسبيًا وممرًا تجاريًا مهمًا، مما جذب التجار والرحالة. وبالتالي، فإن 'الطرف' لم يمنع النشاط الاقتصادي والحضاري، بل قلل فقط من نوع معين من الشعر (الحماسي) دون أن يمنع وجود شعراء كبار."
