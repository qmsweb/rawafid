- title: "محاكاة لاختبار المنتصف"
  subject-name: الأدب العماني
  subject-code: ARAB323
  questions:
    - type: instructions
      mainTitle: "سؤال مفتوح"
      description: "أجب عن السؤال التالي بدقة وتفصيل."

    - type: essay
      question: "تحدث عن الأدب العماني القديم مبينا حالته وأذكر العوامل الجغرافية والتاريخية التي أثرت فيه مع التمثيل."
      points: 10
      [span_0](start_span)[span_1](start_span)answer: "الأدب العماني القديم هو نتاج العمانيين نثراً وشعراً منذ نزول الأزد إلى ما قبل الدولة النبهانية الأولى عام 549 هـ[span_0](end_span)[span_1](end_span). [span_2](start_span)اتسمت حالته بقلة التدوين وضياع الكثير منه بسبب قلة الرواة[span_2](end_span). [span_3](start_span)أثرت فيه عدة عوامل: 1- العامل الجغرافي: أدى بُعد عمان عن الحواضر الثقافية ومشقة السفر عبر الربع الخالي إلى قلة وصول أخبارها وتصويرها كمكان ناءٍ في الذهنية العربية[span_3](end_span)[span_4](start_span)[span_5](start_span)، كما في قول جرير: (لو يسمعون بأكلة أو شربة بعمان أصبح جمعهم بعمان)[span_4](end_span)[span_5](end_span). [span_6](start_span)[span_7](start_span)2- العامل التاريخي: ربط ابن سلام الجمحي قلة شعر عمان بكونها في (طرف) بعيدة عن الحروب والنزاعات المحفزة للشعر[span_6](end_span)[span_7](end_span)[span_8](start_span)، بينما ساهم استقرار ملوك الأزد كمالك بن فهم ودعمهم للأدب في إذكاء القرائح[span_8](end_span). [span_9](start_span)[span_10](start_span)ومع الإسلام، تحولت الأغراض نحو القيم الجديدة كما في شعر مازن بن غضوبة الذي يصور هجر الخمر والعهر والتوجه للجهاد[span_9](end_span)[span_10](end_span)."

    - type: instructions
      mainTitle: "أولًا: الأسئلة الموضوعية (اختيار من متعدد)"
      description: "تخير الإجابة الصحيحة من بين البدائل المعطاة."

    - type: mcq
      question: "متى تبدأ وتنتهي حقبة الأدب العماني القديم وفقاً للتقسيم التاريخي المذكور في المصادر؟"
      points: 1
      choices:
        - "من ظهور الإسلام إلى العصر الحديث"
        - "من العصر الأموي إلى دولة اليعاربة"
        - "من نزول الأزد عمان إلى ما قبل الدولة النبهانية الأولى (549 هـ)"
        - "من بداية التدوين إلى نهاية حكم السلطان سعيد بن تيمور"
      answer: "من نزول الأزد عمان إلى ما قبل الدولة النبهانية الأولى (549 هـ)"

    - type: mcq
      question: "لمن يُنسب أقدم ما وصلنا من شعر ينتمي لإقليم عمان في فترة الأدب القديم؟"
      points: 1
      choices:
        - "مازن بن غضوبة"
        - "كعب بن معدان الأشقري"
        - "المهلب بن أبي صفرة"
        - "مالك بن فهم"
      answer: "مالك بن فهم"

    - type: mcq
      question: "أي من الكتب التالية يُعد من المصادر العمانية التي أرخت للتاريخ العماني واعتُمد عليها كمصدر للأدب؟"
      points: 1
      choices:
        - "البيان والتبيين للجاحظ"
        - "الأنساب للعوتبي"
        - "جمهرة أنساب العرب لابن حزم"
        - "الكامل لابن الأثير"
      answer: "الأنساب للعوتبي"

    - type: mcq
      question: "من القائل للمثل الشعري الشهير (اتسع الخرق على الراقع) الموثق في الأدب العماني القديم؟"
      points: 1
      choices:
        - "سليمة بن مالك بن فهم"
        - "صعصعة بن صوحان العبدي"
        - "الشاعر ابن حمام الأزدي"
        - "مازن بن غضوبة"
      answer: "الشاعر ابن حمام الأزدي"

    - type: mcq
      question: "عُرفت بعض القبائل العمانية بالفصاحة والخطابة، مَن هم خطباء العرب الذين ضُرب بهم المثل وقيل (أخطب من مصقلة)؟"
      points: 1
      choices:
        - "خطباء قبيلة الأزد"
        - "خطباء قبيلة إياد"
        - "خطباء آل صوحان"
        - "خطباء قبيلة عبد القيس"
      answer: "خطباء قبيلة عبد القيس"

    - type: instructions
      mainTitle: "ثانيًا: الأسئلة الموضوعية (صواب أو خطأ)"
      description: "حدد ما إذا كانت العبارة صحيحة أم خاطئة."

    - type: tf
      question: "وفد الشاعر الجاهلي الأعشى ميمون بن قيس إلى الملك الجلندى بن المستكبر في عمان، وامتدحه في شعره."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"

    - type: tf
      question: "يذكر الجاحظ في كتاب البيان والتبيين أن فرقة قبيلة عبد القيس التي وقعت إلى البحرين أصبحوا خطباء العرب، بينما من وقعوا في عمان أصبحوا شعراء."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"

    - type: tf
      question: "لم يتأثر الأدب العماني بمجيء الإسلام، وظل محافظاً على نفس الأغراض الشعرية الجاهلية كالغزل الفاحش والهجاء المقذع."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"

    - type: instructions
      mainTitle: "ثالثًا: الأسئلة المقالية (التحليل والاستنتاج)"
      description: "أجب عن الأسئلة التالية."

    - type: essay
      question: "يرى الباحثون أن قلة ما وصلنا من الأدب العماني القديم لا تعني بالضرورة قلة الأدب فعلياً. اذكر أبرز العوامل والأسباب التي أدت إلى ضياع الكثير من هذا النتاج الأدبي."
      points: 3
      [span_11](start_span)answer: "اتسمت هذه الحقبة بقلة الرواة، وقلة التدوين خاصة في فترة ما قبل الإسلام[span_11](end_span). كما كان للعامل الجغرافي دور كبير؛ [span_12](start_span)والمتمثل في بعد عمان عن الحواضر الثقافية المزدهرة ووجود الربع الخالي ومشقة السفر[span_12](end_span). [span_13](start_span)يضاف إلى ذلك ما ذكره الشيخ نور الدين السالمي من أن أهل عمان لا يعتنون بالتاريخ مما أدى لغياب أكثر الأخبار[span_13](end_span)."

    - type: essay
      question: "لعب ملوك عمان دوراً مهماً في إذكاء الحركة الأدبية في عمان قديماً. وضّح ذلك مدعماً إجابتك بالأمثلة."
      points: 3
      [span_14](start_span)answer: "كان الكثير من ملوك عمان شعراء أو خطباء أو محبين للأدب، مما أوجد اهتماماً عاماً بالشعر[span_14](end_span). [span_15](start_span)فعلى سبيل المثال، كان مالك بن فهم الأزدي شاعراً وخطيباً وله مقطوعات شعرية[span_15](end_span). [span_16](start_span)كما قام الملوك بتقريب الشعراء وإجزال العطايا لهم، مثل اتخاذ مالك بن فهم للشاعر أوس بن زيد مناة وزيراً له[span_16](end_span)[span_17](start_span)، ووفادة الأعشى إلى الملك الجلندى بن المستكبر[span_17](end_span)."
