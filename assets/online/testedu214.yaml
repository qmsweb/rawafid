    - type: instructions
      mainTitle: "ثالثا الأسئلة المقالية"
      description: "أجب عن الأسئلة المقالية التالية بصورة تحليلية مفصلة مع إبراز خطوات الحل في المسائل الرياضية"
    - question: "صمم معلم اختبارا تحصيليا يتكون من 60 فقرة موزعة على ثلاث وحدات دراسية إذا علمت أن الوحدة الثانية تحتوي على 15 هدفا تعليميا من أصل 75 هدفا للمادة كلها وأن نسبة الأهداف في مستوى التطبيق تبلغ 30 بالمائة من المنهج احسب عدد الفقرات المخصصة لمستوى التطبيق في الوحدة الثانية موضحا خطوات الحل الرياضية بالتفصيل"
      type: essay
      points: 3
      answer: "الخطوة الأولى حساب الأهمية النسبية للوحدة الثانية بقسمة أهدافها على الأهداف الكلية 15 تقسيم 75 ويساوي 20 بالمائة الخطوة الثانية حساب النسبة المئوية لخلايا مستوى التطبيق في الوحدة الثانية بضرب نسبة الوحدة في نسبة مستوى التطبيق 0.20 ضرب 0.30 ويساوي 0.06 أي 6 بالمائة الخطوة الثالثة حساب عدد الأسئلة بضرب النسبة الناتجة في العدد الكلي لأسئلة الاختبار 0.06 ضرب 60 ويساوي 3.6 فقرة وتقرب إلى 4 فقرات"
    - question: "اشرح رياضيا ومنطقيا كيف تؤثر الطريقة التحليلية مقارنة بالطريقة الكلية على دقة درجات الطلاب موضحا إجابتك بمثال رقمي مبسط لتصحيح سؤال مقالي مخصص له 10 درجات"
      type: essay
      points: 3
      answer: "في الطريقة التحليلية يتم تجزئة الدرجة على عناصر الإجابة مثلا 3 درجات للمقدمة و 4 لتسلسل الأفكار و 3 لصحة الاستنتاج فإذا أخطأ الطالب في الاستنتاج يحصل رياضيا على 7 من 10 بثبات وموضوعية بينما في الطريقة الكلية يعطي المصحح الدرجة بناء على انطباعه العام مما قد يجعله يمنح طالبا 5 من 10 وآخر 8 من 10 على نفس الإجابة لتأثره بعوامل نفسية مما يزيد من تباين الدرجات العشوائي ويضعف ثبات التصحيح"
    - question: "حلل الهدف التدريسي التالي أن يقارن الطالب بين الاختبارات الموضوعية والمقالية من حيث شمولية المحتوى محددا مستواه المعرفي في تصنيف بلوم ثم طبق فهمك بصياغة سؤال من نوع الاختيار من متعدد يقيس هذا الهدف متجنبا أخطاء الصياغة الفنية"
      type: essay
      points: 4
      answer: "المستوى المعرفي للهدف يقع ضمن الفهم والتحليل قدرة الطالب على استنتاج أوجه الشبه والاختلاف بناء على خصائص كل أداة صياغة السؤال المقترحة تتميز الاختبارات الموضوعية مقارنة بالاختبارات المقالية بقدرتها العالية على والبدائل هي تغطية جزء كبير من المادة الدراسية أو إبراز القدرات التعبيرية والإبداعية للطالب أو سهولة إعدادها وبناء فقراتها في وقت قصير أو القضاء التام على ظاهرة التخمين والبديل الصحيح هو الأول"
    - question: "قام معلم ببناء سؤال مزاوجة مطابقة يتكون من 12 مقدمة و 12 إجابة جميعها عبارات طويلة جدا وتمتد على صفحتين كاملتين بناء على دراستك لإرشادات بناء الاختبارات استخرج ثلاثة أخطاء فنية ارتكبها المعلم واقترح التعديل الرياضي أو الفني المناسب لكل خطأ"
      type: essay
      points: 4
      answer: "الخطأ الأول تساوي عدد المقدمات والإجابات والتعديل هو جعل قائمة الإجابات تزيد بعنصرين على الأقل لتصبح 14 إجابة لمنع التطابق التلقائي الخطأ الثاني عدد العناصر كبير جدا 12 عنصرا مما يربك الطالب والتعديل هو تخفيض عدد المقدمات بحيث لا يزيد عن 5 إلى 7 مقدمات الخطأ الثالث طول العبارات وامتدادها على صفحتين والتعديل هو جعل عناصر القائمتين قصيرة قدر الإمكان واحتواء كامل السؤال في صفحة واحدة لضمان تركيز الطالب وعدم تشتته في قلب الصفحات"
