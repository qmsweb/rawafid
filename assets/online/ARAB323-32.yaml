- title: اختبار الفهم والتحليل في الأدب العماني القديم (2)
  subject-name: الأدب العماني
  subject-code: ARAB323
  questions: 
    - type: instructions
      mainTitle: "أولًا الأسئلة الموضوعية (اختيار من متعدد)"
      description: تخير الإجابة الصحيحة من بين البدائل المعطاة
    - type: mcq
      [span_1](start_span)question: "ربط ابن سلام الجمحي بين قلة الشعر في عمان وقريش يعود في جوهره المنهجي إلى[span_1](end_span):"
      points: 1
      choices:
        - ضعف السليقة اللغوية في أطراف الجزيرة العربية
        - غياب الصراعات والحروب المحفزة للانفعال العاطفي
        - الانشغال بالتجارة والرحلات على حساب الأدب
        - الاعتماد على الخطابة أكثر من الشعر
      answer: غياب الصراعات والحروب المحفزة للانفعال العاطفي
    - type: mcq
      [span_2](start_span)question: "ذكر الأعشى لعمان في سياق واحد مع (حمص وأوريشلم) يهدف نقدياً إلى إثبات[span_2](end_span):"
      points: 1
      choices:
        - أن عمان كانت معزولة جغرافياً عن مجريات الأحداث
        - أن البعد الجغرافي لعمان جعلها مركزاً اقتصادياً ومقصداً للرحلات
        - تفوق شعراء العصر الأموي على شعراء الجاهلية
        - أن الشعر العماني تأثر كثيراً بالشعراء الوافدين
      answer: أن البعد الجغرافي لعمان جعلها مركزاً اقتصادياً ومقصداً للرحلات
    - type: mcq
      [span_3](start_span)question: "تعجب الجاحظ من تحول قسم من قبيلة عبد القيس لخطباء العرب بعد استقرارهم في عمان يدل سوسيولوجياً على[span_3](end_span):"
      points: 1
      choices:
        - تأثير البيئة الجديدة في صقل المواهب وتغيير طبيعة الإنتاج الأدبي
        - أن البادية هي البيئة الوحيدة القادرة على إنتاج فصاحة حقيقية
        - فقدان القبيلة لقدراتها الشعرية بسبب اختلاطها بأمم أخرى
        - انتقال مركز الفصاحة من الأطراف إلى قلب البادية
      answer: تأثير البيئة الجديدة في صقل المواهب وتغيير طبيعة الإنتاج الأدبي
    - type: mcq
      [span_4](start_span)question: "صدمة عمر بن عبد العزيز من جودة شعر كعب الأشقري تعكس بالضرورة[span_4](end_span):"
      points: 1
      choices:
        - عدم اهتمام الخليفة بالشعر السياسي عامة
        - وجود صورة نمطية سابقة في مركز الخلافة عن ندرة النتاج الأدبي العماني
        - انقطاع التواصل تماماً بين عمان وعاصمة الخلافة الأموية
        - تفوق الشعر العماني على جميع أشعار العصر الأموي
      answer: وجود صورة نمطية سابقة في مركز الخلافة عن ندرة النتاج الأدبي العماني
    - type: mcq
      [span_5](start_span)question: "عبارة الشيخ السالمي (وأهل عمان لا يعتنون بالتاريخ) تقدم للمحلل الأدبي تفسيراً منطقياً لـ[span_5](end_span):"
      points: 1
      choices:
        - غزارة الدواوين الشعرية العمانية المطبوعة في العصور القديمة
        - الفجوة الكبيرة بين التراث الأدبي الفعلي وبين ما وصل إلينا في المدونات
        - كثرة الحروب الداخلية التي شغلتهم عن التدوين
        - اهتمام العمانيين بالعلوم التجريبية حصراً
      answer: الفجوة الكبيرة بين التراث الأدبي الفعلي وبين ما وصل إلينا في المدونات
    - type: instructions
      mainTitle: "ثانيًا الأسئلة الموضوعية (صواب أو خطأ)"
      description: حدد ما إذا كانت العبارة صحيحة أم خاطئة.
    - type: tf
      [span_6](start_span)question: "يُفهم من نص ابن سلام الجمحي أن الاستقرار السياسي والسلام التام هو المحفز الأول لغزارة الإنتاج الشعري[span_6](end_span)."
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: tf
      [span_7](start_span)question: "يُستنتج من مقولة الجاحظ أن الملكات الأدبية (كالفصاحة والخطابة) تتطور بناءً على تغير الجغرافيا والظروف المعيشية[span_7](end_span)."
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: tf
      [span_8](start_span)question: "تصريح الخليفة عمر بن عبد العزيز يؤكد أن الشعر العماني كان ذائع الصيت ومألوفاً جداً في البلاط الأموي قبل كعب الأشقري[span_8](end_span)."
      points: 1
      choices:
        - صح
        - خطأ
      answer: خطأ
    - type: tf
      [span_9](start_span)question: "الخاصية المكانية لعمان (كونها في طرف) جعلتها، حسب ابن سلام، أقل إنتاجاً للشعر مقارنة ببيئات النزاع كالأوس والخزرج[span_9](end_span)."
      points: 1
      choices:
        - صح
        - خطأ
      answer: صح
    - type: instructions
      mainTitle: "ثالثًا الأسئلة المقالية (التحليل والاستنتاج)"
      description: أجب عن الأسئلة التالية بصورة تحليلية
    - type: essay
      [span_10](start_span)question: "بناءً على نص الجاحظ حول قبيلة عبد القيس، حلل كيف يمكن للاستقرار في 'شق عمان' أن يحول القبيلة من 'معدن الفصاحة' البدوي إلى 'خطباء العرب'؟[span_10](end_span)"
      points: 3
      answer: "الاستقرار في بيئة حضرية أو مستقرة كعمان يتطلب مهارات تواصل تختلف عن البادية؛ فالخطابة فن مدني يحتاجه المجتمع المستقر لإدارة الشؤون العامة والإقناع، مما أدى لتشكل ملكة الخطابة لديهم وتفوقها على الشعر الحماسي المرتبط بالترحال والصراعات"
    - type: essay
      [span_11](start_span)[span_12](start_span)question: "استخدم نص كعب الأشقري (عمال أرضك بالبلاد ذئاب) لدحض فكرة ابن سلام بأن أهل الأطراف (عمان) أقل مشاركة في الأحداث العظمى[span_11](end_span)[span_12](end_span)."
      points: 3
      answer: "نص كعب الأشقري يثبت أن الشعر العماني لم يكن منغلقاً، بل كان حاضراً في قلب القضايا السياسية الكبرى للدولة الإسلامية؛ فمواجهة الخليفة بنقد لاذع للولاة (الذئاب) تعكس وعياً سياسياً ناضجاً يتجاوز فكرة 'الطرفية' التي وصفها ابن سلام"
    - type: essay
      [span_13](start_span)question: "ما هي الضريبة المنهجية التي يدفعها الباحث في الأدب العماني اليوم نتيجة 'عدم اعتناء العمانيين بالتاريخ' كما ذكر السالمي؟[span_13](end_span)"
      points: 3
      answer: "الضريبة هي ضياع السياق الزماني والمكاني لكثير من النصوص الأدبية، وصعوبة التأريخ للأدباء المغمورين، مما يجعل الباحث يضطر للاعتماد على المصادر الخارجية أو الاستنباط التحليلي لسد الثغرات التاريخية في مسيرة الأدب العماني"
