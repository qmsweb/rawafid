- title: "اختبار الفهم والتحليل في الأدب العماني القديم - الدرس الثاني"
  subject-name: "الأدب العماني"
  subject-code: "ARAB323"
  questions: 
    - type: "instructions"
      mainTitle: "أولًا الأسئلة الموضوعية (اختيار من متعدد)"
      description: "تخير الإجابة الصحيحة من بين البدائل المعطاة"
    - type: "mcq"
      question: "يربط ابن سلام الجمحي قلة الشعر في عمان بعامل منهجي يتمثل في:"
      points: 1
      choices:
        - "خلو البيئة من الصراعات والحروب المثيرة للانفعال"
        - "انعزال المجتمع العماني عن اللسان العربي"
        - "تركيز أهل عمان على النثر دون المنظوم"
        - "صعوبة التضاريس الجغرافية وتأثيرها على اللغة"
      answer: "خلو البيئة من الصراعات والحروب المثيرة للانفعال"
    - type: "mcq"
      question: "ورود عمان في بيت الأعشى (عمان فحمص فأوريشلم) يشير في سياقه الأدبي إلى:"
      points: 1
      choices:
        - "وصف الرحلات الجغرافية الشاقة للشاعر"
        - "كونها وجهة مقصودة لطلب المال والرزق كغيرها من الحواضر"
        - "رغبة الشاعر في المقارنة بين المذاهب الدينية"
        - "تصوير عمان كمنطقة نائية ومنعزلة عن العالم"
      answer: "كونها وجهة مقصودة لطلب المال والرزق كغيرها من الحواضر"
    - type: "mcq"
      question: "تحول قبيلة عبد القيس إلى 'خطباء العرب' بعد استقرارهم في عمان يثبت وفق رؤية الجاحظ:"
      points: 1
      choices:
        - "أن الفصاحة فطرية ولا تتأثر بالبيئة"
        - "تراجع المستوى الأدبي للقبيلة عما كانت عليه في البادية"
        - "قدرة المكان والظروف الجديدة على تغيير وتطوير الملكات الأدبية"
        - "أن عمان كانت مركزاً للشعر أكثر من الخطابة"
      answer: "قدرة المكان والظروف الجديدة على تغيير وتطوير الملكات الأدبية"
    - type: "mcq"
      question: "دهشة الخليفة عمر بن عبد العزيز من شعر كعب الأشقري تعطي مؤشراً تاريخياً على:"
      points: 1
      choices:
        - "ضعف التواصل الأدبي بين عمان ومركز الخلافة في ذلك الوقت"
        - "رفض الخليفة للنقد السياسي الموجه لولاته"
        - "تفوق الأزد في الشعر على سائر قبائل العرب"
        - "ندرة الشعراء في العصر الأموي بشكل عام"
      answer: "ضعف التواصل الأدبي بين عمان ومركز الخلافة في ذلك الوقت"
    - type: "instructions"
      mainTitle: "ثانيًا الأسئلة الموضوعية (صواب أو خطأ)"
      description: "حدد ما إذا كانت العبارة صحيحة أم خاطئة."
    - type: "tf"
      question: "يُرجع ابن سلام الجمحي كثرة الشعر في الأوس والخزرج إلى كثرة الحروب والنايرات بينهم."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
    - type: "tf"
      question: "يرى الجاحظ أن قبيلة عبد القيس كانت أكثر فصاحة وخطابة حين كانت في 'سرة البادية'."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
    - type: "tf"
      question: "يعتبر الشيخ السالمي أن غياب الكثير من أخبار أئمة عمان يعود إلى قلة اعتناء العمانيين بالتاريخ."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
    - type: "instructions"
      mainTitle: "ثالثًا الأسئلة المقالية (التحليل والاستنتاج)"
      description: "أجب عن الأسئلة التالية بناءً على فهمك للنصوص المرفقة"
    - type: "essay"
      question: "كيف يمكن لبيت جرير (لو يسمعون بأكلة أو شربة بعمان) أن يدعم فكرة عمان كمقصد اقتصادي في العصر القديم؟"
      points: 3
      [span_5](start_span)answer: "يشير البيت بوضوح إلى أن صيت عمان وثرواتها (الأكل والشرب/الرزق) كان يتجاوز حدودها الجغرافية، لدرجة أن القبائل البعيدة كبني الهجيم كانت مستعدة للارتحال إليها طلباً للميرة والرزق، مما يعزز فكرة الاستقرار والوفرة فيها[span_5](end_span)"
    - type: "essay"
      question: "حلل العلاقة بين 'الطرفية الجغرافية' وبين نوعية المنتج الأدبي (شعر/خطابة) في عمان بناءً على نصوص الدرس."
      points: 3
      [span_6](start_span)answer: "أدت الطرفية والبعد عن مراكز النزاع القلبي إلى قلة شعر الحروب والحماسة (كما يرى ابن سلام)[span_6](end_span)[span_7](start_span)، ولكنها في الوقت ذاته وفرت بيئة استقرار حضري ساعدت على ازدهار فن الخطابة (كما لاحظ الجاحظ في عبد القيس)[span_7](end_span)، مما جعل الأدب العماني يتسم بالرصانة والنضج الفكري بدلاً من الانفعال القبلي"
    - type: "essay"
      question: "ما هي التحديات التي يفرضها نص الشيخ السالمي على الباحث في 'الأدب العماني القديم' عند محاولة توثيق سِيَر الشعراء؟"
      points: 2
      answer: "التحدي الأكبر هو 'الفقد التاريخي'؛ [span_8](start_span)[span_9](start_span)فعدم الاعتناء بالتدوين التاريخي أدى لضياع السياقات الزمانية والمكانية للنصوص، مما يجعل الباحث يضطر للاستعانة بالمصادر الخارجية (ككتب الجاحظ وابن سلام) لترميم صورة الأدب العماني القديم[span_8](end_span)[span_9](end_span)"
