    - type" "essay"
      question" >
        [span_27](start_span)كيف يمكن لبيت جرير (لو يسمعون بأكلة أو شربة بعمان) أن يدعم فكرة عمان كمقصد للرزق في العصر القديم؟[span_27](end_span)
      points" 3
      answer" >
        [span_28](start_span)يشير البيت إلى أن صيت عمان بالوفرة والرزق كان ذائعاً بين العرب، مما جعلها وجهة مرغوبة حتى للقبائل البعيدة، وهو ما يؤكد استقرارها المادي وجاذبيتها الاقتصادية في تلك العصور.[span_28](end_span)
    - type" "essay"
      question" >
        [span_29](start_span)[span_30](start_span)حلل العلاقة بين "الطرفية الجغرافية" وبين نوعية المنتج الأدبي (شعر/خطابة) في عمان بناءً على نصوص الدرس.[span_29](end_span)[span_30](end_span)
      points" 3
      answer" >
        [span_31](start_span)[span_32](start_span)أدت الطرفية والبعد عن مراكز النزاع إلى قلة شعر الحروب (حسب ابن سلام)، ولكنها وفرت بيئة استقرار حضري ساعدت على ازدهار فن الخطابة (كما لاحظ الجاحظ)، مما جعل الأدب العماني يتسم بالرصانة والنضج بدلاً من الانفعال القبلي.[span_31](end_span)[span_32](end_span)
    - type" "essay"
      question" >
        [span_33](start_span)ما التحدي المنهجي الذي يفرضه نص الشيخ السالمي (وأهل عمان لا يعتنون بالتاريخ) على الباحثين اليوم؟[span_33](end_span)
      points" 2
      answer" >
        التحدي هو "الفقد التدويني"؛ [span_34](start_span)حيث يضطر الباحث للاعتماد على المصادر الخارجية أو الاستنباط من شذرات الكتب لترميم السياق التاريخي للأدب العماني بسبب غياب التوثيق التاريخي المحلي المنظم قديماً.[span_34](end_span)
