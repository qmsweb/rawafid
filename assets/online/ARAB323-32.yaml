- title: اختبار الفهم والتحليل في الأدب العماني القديم - الدرس الثاني
  subject-name: الأدب العماني
  subject-code: ARAB323
  questions: 
    - type: instructions
      mainTitle: "أولًا الأسئلة الموضوعية (اختيار من متعدد)"
      description: "تخير الإجابة الصحيحة من بين البدائل المعطاة"
    - type: mcq
      question: "يرى ابن سلام الجمحي أن 'النائرة' والحروب هي المحرك الأساسي للشعر، وبناءً عليه فإن قلة شعر عمان تعود إلى:"
      points: 1
      choices:
        - "موقعها الجغرافي المنعزل تماماً عن العرب"
        - "طبيعة الحياة المستقرة والبعيدة عن النزاعات القبلية الحادة"
        - "ضعف لسان أهل عمان مقارنة بقريش"
        - "عدم اهتمام العمانيين بغير العلوم الدينية"
      answer: "طبيعة الحياة المستقرة والبعيدة عن النزاعات القبلية الحادة"
    - type: mcq
      question: "اقتران اسم 'عمان' بمدن مثل 'حمص' و'أوريشلم' في شعر الأعشى يعكس نظرة الشعراء لعمان كـ:"
      points: 1
      choices:
        - "منفى بعيد يصعب الوصول إليه"
        - "مركز اقتصادي وحضاري يقصده الباحثون عن الرزق"
        - "منطقة بدوية تفتقر للمظاهر المدنية"
        - "ساحة صراع دائم بين القبائل"
      answer: "مركز اقتصادي وحضاري يقصده الباحثون عن الرزق"
    - type: mcq
      question: "وصف الجاحظ لتحول 'عبد القيس' إلى خطباء العرب بعد استقرارهم في عمان بأنه 'عجب' يوحي بأن:"
      points: 1
      choices:
        - "الفصاحة مرتبطة بالجينات ولا تتغير بتغير المكان"
        - "البيئة الجغرافية الجديدة قادرة على إعادة تشكيل الموهبة الأدبية"
        - "أهل البادية أكثر قدرة على الخطابة من أهل المدن"
        - "عمان كانت تفتقر للخطباء قبل وصول عبد القيس"
      answer: "البيئة الجغرافية الجديدة قادرة على إعادة تشكيل الموهبة الأدبية"
    - type: mcq
      question: "ردة فعل عمر بن عبد العزيز تجاه شعر كعب الأشقري 'ما كنت أظن أهل عمان يقولون مثل هذا الشعر' تشير إلى:"
      points: 1
      choices:
        - "إعجاب الخليفة المسبق بالأدب العماني"
        - "غياب الصورة الحقيقية للإبداع العماني عن مركز الخلافة"
        - "رداءة مستوى الشعر الذي كان يصله من عمان"
        - "عدم اهتمام أهل عمان بالشعر السياسي"
      answer: "غياب الصورة الحقيقية للإبداع العماني عن مركز الخلافة"
    - type: instructions
      mainTitle: "ثانيًا الأسئلة الموضوعية (صواب أو خطأ)"
      description: "حدد ما إذا كانت العبارة صحيحة أم خاطئة."
    - type: tf
      question: "يُفهم من نص ابن سلام أن 'الطرفية' المكانية لعمان كانت سبباً في وفرة نتاجها الشعري الحماسي."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
    - type: tf
      question: "استنتاجاً من قول الجاحظ، فإن قبيلة عبد القيس فقدت فصاحتها تماماً حين فارقت 'سرة البادية'."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
    - type: tf
      question: "يرى الشيخ السالمي أن ضياع الكثير من أخبار الأئمة في عمان سببه عدم اعتناء أهلها بالتدوين التاريخي."
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
    - type: instructions
      mainTitle: "ثالثًا الأسئلة المقالية (التحليل والاستنتاج)"
      description: "أجب عن الأسئلة التالية بناءً على فهمك للنصوص"
    - type: essay
      question: "حلل كيف دحض كعب الأشقري بشعره السياسي تصور الخليفة عمر بن عبد العزيز عن الأدب في عمان."
      points: 3
      answer: "كشف شعر كعب الأشقري عن مستوى عالٍ من الجزالة والقوة في النقد السياسي (مثل وصفه للعمال بالذئاب)، مما أثبت للخليفة أن أهل عمان، رغم بعدهم الجغرافي عن المركز، يمتلكون أدباً ناضجاً وقادراً على معالجة قضايا الدولة الكبرى"
    - type: essay
      question: "قارن بين رؤية ابن سلام الجمحي ورؤية الجاحظ في تفسير أثر البيئة العمانية على الإنتاج الأدبي."
      points: 3
      answer: "ابن سلام ركز على الجانب الكمي وربطه بغياب الحروب، بينما ركز الجاحظ على الجانب النوعي (التحول النوعي للموهبة)، حيث رأى أن البيئة العمانية صقلت ملكة الخطابة لدى القبائل المستقرة فيها رغم ابتعادهم عن منبع الفصاحة البدوي"
    - type: essay
      question: "ما الأثر المترجم الذي خلفته مقولة الشيخ السالمي 'أهل عمان لا يعتنون بالتاريخ' على دراستنا للأدب العماني القديم اليوم؟"
      points: 3
      answer: "أدى ذلك إلى وجود فجوات في التوثيق التاريخي للأدباء والنصوص، مما يفرض على الباحث المعاصر الاعتماد على الاستنباط من المصادر الخارجية (مثل كتب الجاحظ وابن سلام) أو البحث في بطون الدواوين المتناثرة لتعويض غياب التدوين التاريخي المنظم"
