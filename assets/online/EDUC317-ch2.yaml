        - "المهارات الإدراكية (إدارة التغيير والتأثير في ثقافة المدرسة)"
        - "المهارات الذاتية (الكاريزما التربوية)"
        - "المهارات الفنية (إدارة الاجتماعات)"
      answer: "المهارات الإدراكية (إدارة التغيير والتأثير في ثقافة المدرسة)"

    - type: mcq
      question: "قدم معلم طلب إعفاء من الإشراف على الإذاعة لشعوره بالإرهاق الشديد، فاجتمع به المدير، وقدر جهوده السابقة، ووافق على طلبه مؤقتاً لتخفيف الضغط عنه. هذا يعكس"
      points: 1
      choices:
        - "المهارات الفنية (التخطيط)"
        - "المهارات الذاتية (الذكاء الانفعالي)"
        - "المهارات الإدراكية (التحليل المركب)"
        - "المهارات الإنسانية (التعاطف والإنصات الفعال)"
      answer: "المهارات الإنسانية (التعاطف والإنصات الفعال)"

    - type: mcq
      question: "قام المدير بوضع أهداف واضحة للعام الدراسي وتجزئتها إلى مستهدفات تشغيلية شهرية لكل قسم أكاديمي مع مؤشرات للقياس. هذا مثال تطبيقي على"
      points: 1
      choices:
        - "المهارات الفنية (مهارة التخطيط المدرسي)"
        - "المهارات الإنسانية (التسامح والمرونة)"
        - "المهارات الذاتية (الاتزان النفسي)"
        - "المهارات الإدراكية (الربط المنظومي)"
      answer: "المهارات الفنية (مهارة التخطيط المدرسي)"

    - type: instructions 
      mainTitle: ثانيا الأسئلة الموضوعية (صواب أو خطأ)
      description: حدد ما إذا كانت العبارة صحيحة أم خاطئة
      
    - type: tf
      question: "الإدارة المدرسية التي تستخدم أدوات التحليل الإحصائي لنتائج السنوات السابقة لربطها بالمعايير الوطنية وبناء خطة تطوير شاملة، تطبق بذلك مهارة فنية بحتة دون أي بُعد إدراكي."
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "خطأ"

    - type: tf
      question: "عندما يحافظ المدير على طاقته الإيجابية العالية ويشارك بحماس في الفعاليات المدرسية الميدانية رغم الإرهاق وضغوط العمل المكتبي، فإنه يطبق مهارة التحفيز الذاتي."
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "صواب"

    - type: tf
      question: "تعد القدرة على التوسط بين معلميْن يختلفان حول أحقية استخدام مرفق رياضي وتوجيه الحوار للوصول إلى حل مرضي، من ضمن المهارات الإدراكية للمدير."
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "خطأ"

    - type: tf
      question: "تصميم خطة بعيدة المدى لتحويل المدرسة إلى مؤسسة صديقة للبيئة خلال خمس سنوات بناءً على تشخيص الواقع والتحديات، هو تطبيق لمهارة صياغة رؤية استراتيجية تربوية."
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "صواب"

