- title: "اختبار في الوحدة الثانية"
  subject-name: "الإدارة الصفية"
  subject-code: "EDUC317"
  questions:
    
    - type: instructions 
      mainTitle: "أولا الأسئلة الموضوعية (الاختيار من متعدد)"
      description: "اختر الإجابة الصحيحة من بين البدائل المتاحة"
      
    - type: mcq
      question: "تخصيص مهام للمعلمين تتناسب مع ميولهم ورغباتهم يعد تطبيقا لـ"
      points: 1
      choices:
        - "المهارات الفنية"
        - "المهارات الإدراكية"
        - "المهارات الإنسانية"
        - "المهارات الذاتية"
      answer: "المهارات الإنسانية"

    - type: mcq
      question: "استباق الأحداث ووضع خطط بديلة للتعامل مع طوارئ محتملة يعكس امتلاك المدير لـ"
      points: 1
      choices:
        - "الذكاء الانفعالي"
        - "المهارات الإدراكية"
        - "المرونة الإنسانية"
        - "التخطيط الفني"
      answer: "المهارات الإدراكية"

    - type: mcq
      question: "إدارة المواقف الضاغطة بهدوء وعدم إظهار التوتر أمام فريق العمل يمثل"
      points: 1
      choices:
        - "الذكاء الاجتماعي"
        - "الذكاء الانفعالي"
        - "الإشراف الفني"
        - "إدارة النزاعات"
      answer: "الذكاء الانفعالي"

    - type: mcq
      question: "جدولة ورش عمل لمعالجة ضعف أداء المعلمين في استراتيجيات التدريس تصنف ضمن"
      points: 1
      choices:
        - "الإشراف الفني"
        - "التحفيز الذاتي"
        - "التطوير الإنساني"
        - "الرؤية الاستراتيجية"
      answer: "الإشراف الفني"

    - type: mcq
      question: "الاستماع لأطراف مشكلة ما وتوجيه الحوار للوصول إلى حلول توافقية يعكس مهارة"
      points: 1
      choices:
        - "إدارة الاجتماعات"
        - "النزاهة والعدالة"
        - "حل النزاعات"
        - "الاتزان النفسي"
      answer: "حل النزاعات"

    - type: mcq
      question: "قدرة المدير على فهم العلاقة بين تغيير مسارات الحافلات وتأخر الطلبة تدل على"
      points: 1
      choices:
        - "الربط المنظومي"
        - "إدارة الوقت"
        - "التخطيط المدرسي"
        - "الذكاء الانفعالي"
      answer: "الربط المنظومي"

    - type: mcq
      question: "توزيع حصص الاحتياط بالتساوي بين جميع المعلمين دون استثناء يعبر عن مهارة"
      points: 1
      choices:
        - "النزاهة والعدالة"
        - "بناء العلاقات"
        - "إدارة الموارد"
        - "حل النزاعات"
      answer: "النزاهة والعدالة"

    - type: mcq
      question: "توجيه المعلمين وإقناعهم بتبني طرق تدريس جديدة بدلا من القديمة يندرج تحت"
      points: 1
      choices:
        - "استخدام التقنية"
        - "إدارة التغيير"
        - "التخطيط المدرسي"
        - "الحضور المهني"
      answer: "إدارة التغيير"

    - type: mcq
      question: "الموافقة على تخفيف أعباء معلم يمر بظرف طارئ وتقدير جهوده السابقة يمثل"
      points: 1
      choices:
        - "التسامح والمرونة"
        - "التعاطف والإنصات"
        - "الذكاء الانفعالي"
        - "التخطيط المدرسي"
      answer: "التعاطف والإنصات"

    - type: mcq
      question: "تجزئة الأهداف السنوية إلى مستهدفات تشغيلية قصيرة المدى مثال على"
      points: 1
      choices:
        - "الربط المنظومي"
        - "صياغة الرؤية"
        - "التخطيط المدرسي"
        - "إدارة الموارد"
      answer: "التخطيط المدرسي"

    - type: instructions 
      mainTitle: "ثانيا الأسئلة الموضوعية (صواب أو خطأ)"
      description: "حدد ما إذا كانت العبارة صحيحة أم خاطئة"
      
    - type: tf
      question: "الإدارة المدرسية التي تستخدم أدوات التحليل الإحصائي لنتائج السنوات السابقة لربطها بالمعايير الوطنية وبناء خطة تطوير شاملة، تطبق بذلك مهارة فنية بحتة دون أي بُعد إدراكي"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "خطأ"

    - type: tf
      question: "عندما يحافظ المدير على طاقته الإيجابية العالية ويشارك بحماس في الفعاليات المدرسية الميدانية رغم الإرهاق وضغوط العمل المكتبي، فإنه يطبق مهارة التحفيز الذاتي"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "صواب"

    - type: tf
      question: "تعد القدرة على التوسط بين معلميْن يختلفان حول أحقية استخدام مرفق رياضي وتوجيه الحوار للوصول إلى حل مرضي، من ضمن المهارات الإدراكية للمدير"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "خطأ"

    - type: tf
      question: "تصميم خطة بعيدة المدى لتحويل المدرسة إلى مؤسسة صديقة للبيئة خلال خمس سنوات بناءً على تشخيص الواقع والتحديات، هو تطبيق لمهارة صياغة رؤية استراتيجية تربوية"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "صواب"

    - type: tf
      question: "تتضمن المهارات الفنية الجانب التنفيذي والإجرائي كإعداد الجداول المدرسية وإدارة نظم التقويم والتحصيل الدراسي واستخدام التقنية"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "صواب"

    - type: tf
      question: "إذا تجاوز المدير عن خطأ غير مقصود لمعلم في تنظيم فعالية مدرسية ومنحه فرصة لتصحيحه والتعلم منه دون قسوة، فهذا يعكس مهارة الإشراف الفني"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "خطأ"

    - type: tf
      question: "يقتصر الذكاء الانفعالي في الإدارة المدرسية على قدرة المدير على رفع درجات الطلبة الأكاديمية في الاختبارات النهائية"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "خطأ"

    - type: tf
      question: "تتطلب المهارات الإدراكية من المدير فهم المدرسة كنظام مترابط، بحيث يدرك كيف تؤثر التغييرات والقرارات في أحد الأقسام على النظام بأكمله"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "صواب"

    - type: tf
      question: "يُعد توزيع الأعباء والمسؤوليات وحصص الاحتياط بعدالة بين المعلمين دون محاباة، تطبيقاً مباشراً للمهارات الإنسانية للمدير"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "خطأ"

    - type: tf
      question: "تأثير المدير غير المباشر في سلوك العاملين من خلال لغة جسده الواثقة وتواصله الفعال كقدوة، يندرج تحت مهارة الحضور المهني والكاريزما التربوية"
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "صواب"

    - type: instructions
      mainTitle: "ثالثا الأسئلة المقالية (التحليل والاستنتاج)"
      description: "أجب عن الأسئلة التالية بناء على فهمك للنصوص"
      
    - type: essay
      question: "أنت مدير مدرسة تواجه أزمة مفاجئة تتمثل في استقبال أعداد كبيرة من الطلبة المحولين من منطقة أخرى، مما يهدد بحدوث اكتظاظ شديد ونقص في الموارد. اشرح كيف ستوظف المهارات الإدراكية (تحديداً التنبؤ بالمخاطر وبناء سيناريوهات بديلة) والمهارات الفنية (إدارة الموارد) للتعامل مع هذا الموقف بفاعلية"
      points: 2
      answer: "توظيف المهارات الإدراكية من خلال التنبؤ بالزيادة وحجم الضغط المتوقع وتصميم خطط طوارئ مسبقة كإعادة توزيع المساحات، وتوظيف المهارات الفنية بإعادة تنظيم الجدول المدرسي وتوزيع الكادر والموارد المتاحة بشكل يرشد استغلال القاعات والخدمات الهيكلية"

    - type: essay
      question: "يرفض أحد المعلمين ذوي الخبرة الطويلة في مدرستك تبني طرق التدريس التفاعلية الحديثة المعتمدة مؤخراً، مبرراً ذلك بأن الطرق التقليدية أثبتت نجاحها. كيف تدمج بين المهارات الإنسانية (تفهم الدوافع والاحتياجات الفردية) والمهارات الفنية (الإشراف الفني على التدريس) لإقناع هذا المعلم وتطوير أدائه بسلاسة؟"
      points: 2
      answer: "الدمج يتم بالحوار الفردي وإظهار التقدير لخبرته واحتواء مخاوفه من التغيير كمهارات إنسانية، ثم تقديم دعم فني وإشرافي عملي عبر ورش تطبيقية ونماذج توضيحية وتبادل الزيارات وتطبيق تدريجي لا يسبب له حرجاً كمهارات فنية"

    - type: essay
      question: "بعد تراجع ملحوظ في سمعة المدرسة نتيجة انخفاض مستويات الخريجين، فقد المجتمع المحلي ثقته بالمدرسة. صِف خطة عمل متكاملة تستخدم فيها المهارات الإدراكية (تحليل السياق الداخلي والخارجي) والمهارات الذاتية (الاتزان النفسي وقوة الشخصية) لاستعادة هذه الثقة"
      points: 2
      answer: "استخدام المهارات الإدراكية في جمع البيانات من البيئة الداخلية والخارجية وتحليل أسباب الضعف بدقة، واستخدام المهارات الذاتية من خلال قيادة عملية الإصلاح بثبات واتزان، وتحمل المسؤولية بشفافية أمام أولياء الأمور لاتخاذ قرارات حازمة تحسن الأداء المؤسسي"

    - type: essay
      question: "يعاني قسمان أكاديميان في مدرستك (مثل قسم العلوم وقسم الرياضيات) من تنافس سلبي حاد حول ميزانية الأنشطة، مما خلق بيئة عمل مشحونة. كيف يمكنك تطبيق المهارات الإنسانية (حل النزاعات بطريقة بناءة وتعزيز روح الفريق) لتحويل هذا التنافس إلى عمل تكاملي مشترك؟"
      points: 2
      answer: "عقد جلسة حوارية تستمع للأطراف وتبني الاستيعاب المتبادل وتحدد النقاط المشتركة من أجل حل النزاعات، ثم اقتراح مبادرات ومشروعات علمية مدمجة تستلزم التعاون بين القسمين وتقاسم الموارد والاحتفاء بالإنجاز الجماعي لتعزيز روح الفريق"

    - type: essay
      question: "اشرح موقفاً افتراضياً يُحتم على مدير المدرسة استخدام المهارات الذاتية (النزاهة والعدالة) للتعامل مع معلم يجمعه به صلة قرابة قوية ولكنه يقصر في واجباته الوظيفية بشكل متكرر، مبيناً أثر تطبيق هذه المهارة بصرامة على الثقافة العامة والانضباط داخل المدرسة"
      points: 2
      answer: "الموقف يكمن في تطبيق اللوائح والمساءلة الرسمية وتوثيق التقصير بحيدة دون منح أية استثناءات خاصة لمعلم قريب، وأثر ذلك يرسخ قيم الشفافية والعدالة والمساواة بين الكادر، مما يزيد ثقة المعلمين بالقيادة ويعزز الانضباط والالتزام المهني"

    - type: instructions
      description: "انتهى الاختبار، ردد معي اللهم إني استودعتك ما قرأتُ وما حفظتُ وما تعلمتُ، فرده إليّ عند حاجتي إليه، إنك على كل شيء قدير"
