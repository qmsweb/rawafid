        - "المهارات الذاتية (التحفيز الذاتي)"
        - "المهارات الإنسانية (بناء علاقات إيجابية)"
        - "المهارات الذاتية (الحضور المهني)"
      answer: "المهارات الفنية (الإشراف الفني على التدريس)"

    - type: mcq
      question: "احتدم النقاش بين وليي أمر في غرفة الإدارة بسبب شجار بين أبنائهما، فاستمع المدير لهما دون مقاطعة، وتفهم غضبهما، ثم وجه الحوار للاتفاق على خطة تقويم سلوكي مشتركة. المهارة الأبرز هنا هي"
