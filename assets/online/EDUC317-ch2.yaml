        - "المهارات الإدراكية (القدرة على التنبؤ وبناء سيناريوهات)"
        - "المهارات الإنسانية (التسامح والمرونة)"
        - "المهارات الذاتية (قوة الشخصية)"
        - "المهارات الفنية (إدارة الاجتماعات)"
      answer: "المهارات الإدراكية (القدرة على التنبؤ وبناء سيناريوهات)"

    - type: mcq
      question: "أثناء انقطاع مفاجئ للتيار الكهربائي في يوم الاختبارات النهائية، وجه المدير فريقه بهدوء لنقل الطلبة إلى القاعات ذات الإضاءة الطبيعية مع تمديد وقت الاختبار دون إظهار أي توتر. هذا يعكس"
      points: 1
      choices:
        - "المهارات الإنسانية (التعاطف)"
