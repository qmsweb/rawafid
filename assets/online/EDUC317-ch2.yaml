        - "المهارات الإدراكية (الربط المنظومي)"
        - "المهارات الذاتية (النزاهة والعدالة)"
        - "المهارات الإنسانية (حل النزاعات بطريقة بناءة)"
      answer: "المهارات الإنسانية (حل النزاعات بطريقة بناءة)"

    - type: mcq
      question: "ربط المدير بين ارتفاع نسبة تأخر الطلبة الصباحي وبين التغيير الأخير في مسارات حافلات النقل العام، فتواصل مع الجهة المختصة لتعديل المواعيد. هذا يبرز مهارة"
      points: 1
