        - "المهارات الفنية (إدارة الوقت والموارد)"
        - "المهارات الإنسانية (تعزيز روح الفريق)"
        - "المهارات الذاتية (الحضور المهني)"
      answer: "المهارات الإدراكية (تحليل السياق الداخلي والخارجي)"

