        - "المهارات الذاتية (الاتزان النفسي وقوة الشخصية)"
        - "المهارات الإدراكية (إدارة التغيير)"
      answer: "المهارات الذاتية (الاتزان النفسي وقوة الشخصية)"

    - type: mcq
      question: "للتعامل مع تدني درجات مادة الرياضيات في عدة فصول، قام المدير بجدولة ورش عمل متخصصة لمعلمي المادة حول طرق التدريس الحديثة ومتابعة أثرها. تصنف هذه الخطوة ضمن"
