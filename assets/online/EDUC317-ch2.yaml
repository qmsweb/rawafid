      question: "تتضمن المهارات الفنية الجانب التنفيذي والإجرائي كإعداد الجداول المدرسية وإدارة نظم التقويم والتحصيل الدراسي واستخدام التقنية."
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "صواب"

    - type: tf
      question: "إذا تجاوز المدير عن خطأ غير مقصود لمعلم في تنظيم فعالية مدرسية ومنحه فرصة لتصحيحه والتعلم منه دون قسوة، فهذا يعكس مهارة الإشراف الفني."
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "خطأ"

    - type: tf
      question: "يقتصر الذكاء الانفعالي في الإدارة المدرسية على قدرة المدير على رفع درجات الطلبة الأكاديمية في الاختبارات النهائية."
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "خطأ"

    - type: tf
      question: "تتطلب المهارات الإدراكية من المدير فهم المدرسة كنظام مترابط، بحيث يدرك كيف تؤثر التغييرات والقرارات في أحد الأقسام على النظام بأكمله."
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "صواب"

    - type: tf
      question: "يُعد توزيع الأعباء والمسؤوليات وحصص الاحتياط بعدالة بين المعلمين دون محاباة، تطبيقاً مباشراً للمهارات الإنسانية للمدير."
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "خطأ"

    - type: tf
      question: "تأثير المدير غير المباشر في سلوك العاملين من خلال لغة جسده الواثقة وتواصله الفعال كقدوة، يندرج تحت مهارة الحضور المهني والكاريزما التربوية."
      points: 1
      choices:
        - "صواب"
        - "خطأ"
      answer: "صواب"

    - type: instructions
      mainTitle: ثالثا الأسئلة المقالية (التحليل والاستنتاج)
      description: أجب عن الأسئلة التالية بناء على فهمك للنصوص
      
    - type: essay
      question: "أنت مدير مدرسة تواجه أزمة مفاجئة تتمثل في استقبال أعداد كبيرة من الطلبة المحولين من منطقة أخرى، مما يهدد بحدوث اكتظاظ شديد ونقص في الموارد. اشرح كيف ستوظف المهارات الإدراكية (تحديداً التنبؤ بالمخاطر وبناء سيناريوهات بديلة) والمهارات الفنية (إدارة الموارد) للتعامل مع هذا الموقف بفاعلية."
      points: 2
      answer: "توظيف المهارات الإدراكية من خلال التنبؤ بالزيادة وحجم الضغط المتوقع وتصميم خطط طوارئ مسبقة كإعادة توزيع المساحات، وتوظيف المهارات الفنية بإعادة تنظيم الجدول المدرسي وتوزيع الكادر والموارد المتاحة بشكل يرشد استغلال القاعات والخدمات الهيكلية."

    - type: essay
      question: "يرفض أحد المعلمين ذوي الخبرة الطويلة في مدرستك تبني طرق التدريس التفاعلية الحديثة المعتمدة مؤخراً، مبرراً ذلك بأن الطرق التقليدية أثبتت نجاحها. كيف تدمج بين المهارات الإنسانية (تفهم الدوافع والاحتياجات الفردية) والمهارات الفنية (الإشراف الفني على التدريس) لإقناع هذا المعلم وتطوير أدائه بسلاسة؟"
      points: 2
      answer: "الدمج يتم بالحوار الفردي وإظهار التقدير لخبرته واحتواء مخاوفه من التغيير (مهارات إنسانية)، ثم تقديم دعم فني وإشرافي عملي عبر ورش تطبيقية ونماذج توضيحية وتبادل الزيارات وتطبيق تدريجي لا يسبب له حرجاً (مهارات فنية)."

    - type: essay
      question: "بعد تراجع ملحوظ في سمعة المدرسة نتيجة انخفاض مستويات الخريجين، فقد المجتمع المحلي ثقته بالمدرسة. صِف خطة عمل متكاملة تستخدم فيها المهارات الإدراكية (تحليل السياق الداخلي والخارجي) والمهارات الذاتية (الاتزان النفسي وقوة الشخصية) لاستعادة هذه الثقة."
      points: 2
      answer: "استخدام المهارات الإدراكية في جمع البيانات من البيئة الداخلية والخارجية وتحليل أسباب الضعف بدقة، واستخدام المهارات الذاتية من خلال قيادة عملية الإصلاح بثبات واتزان، وتحمل المسؤولية بشفافية أمام أولياء الأمور لاتخاذ قرارات حازمة تحسن الأداء المؤسسي."

    - type: essay
      question: "يعاني قسمان أكاديميان في مدرستك (مثل قسم العلوم وقسم الرياضيات) من تنافس سلبي حاد حول ميزانية الأنشطة، مما خلق بيئة عمل مشحونة. كيف يمكنك تطبيق المهارات الإنسانية (حل النزاعات بطريقة بناءة وتعزيز روح الفريق) لتحويل هذا التنافس إلى عمل تكاملي مشترك؟"
      points: 2
      answer: "عقد جلسة حوارية تستمع للأطراف وتبني الاستيعاب المتبادل وتحدد النقاط المشتركة (حل النزاعات)، ثم اقتراح مبادرات ومشروعات علمية مدمجة تستلزم التعاون بين القسمين وتقاسم الموارد والاحتفاء بالإنجاز الجماعي (تعزيز روح الفريق)."

    - type: essay
      question: "اشرح موقفاً افتراضياً يُحتم على مدير المدرسة استخدام المهارات الذاتية (النزاهة والعدالة) للتعامل مع معلم يجمعه به صلة قرابة قوية ولكنه يقصر في واجباته الوظيفية بشكل متكرر، مبيناً أثر تطبيق هذه المهارة بصرامة على الثقافة العامة والانضباط داخل المدرسة."
      points: 2
      answer: "الموقف يكمن في تطبيق اللوائح والمساءلة الرسمية وتوثيق التقصير بحيدة دون منح أية استثناءات خاصة لمعلم قريب، وأثر ذلك يرسخ قيم الشفافية والعدالة والمساواة بين الكادر، مما يزيد ثقة المعلمين بالقيادة ويعزز الانضباط والالتزام المهني."

    - type: instructions
      description: انتهى الاختبار، ردد معي اللهم إني استودعتك ما قرأتُ وما حفظتُ وما تعلمتُ، فرده إليّ عند حاجتي إليه، إنك على كل شيء قدير.
