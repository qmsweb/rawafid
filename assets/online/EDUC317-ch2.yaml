      question: "يحرص مدير المدرسة على تدوير الفصول ذات الكثافة الطلابية العالية بين جميع المعلمين المؤهلين سنوياً بدلاً من إثقال كاهل معلم واحد بها دائماً. هذا تطبيق لـ"
      points: 1
