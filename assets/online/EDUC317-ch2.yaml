    - type: mcq
      question: "لاحظ مدير مدرسة أن أحد المعلمين يتراجع أداؤه عند تكليفه بمهام إدارية، بينما يبدع في الأنشطة الابتكارية، فقام بتكليفه بإدارة نادي الابتكار بالمدرسة. ما المهارة التي طبقها المدير هنا؟"
      points: 1
      choices:
        - "المهارات الإدراكية (الرؤية الاستراتيجية)"
        - "المهارات الإنسانية (تفهم الدوافع والاحتياجات الفردية)"
        - "المهارات الفنية (الإشراف الفني)"
        - "المهارات الذاتية (الذكاء الانفعالي)"
      answer: "المهارات الإنسانية (تفهم الدوافع والاحتياجات الفردية)"

    - type: mcq
      question: "قرر مدير مدرسة التحول لاستخدام منصة رقمية شاملة للتواصل والتصحيح، متوقعاً أن يصبح هذا التوجه إلزامياً من الوزارة خلال السنوات القادمة. هذا التصرف يمثل"
      points: 1
