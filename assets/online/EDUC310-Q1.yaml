title: "اختبار في الوحدتين الأولى والثانية"
subject-name: "نظام التعليم"
subject-code: "EDUC310"
questions:
  
  - type: instructions 
    mainTitle: "ثانيا الأسئلة الموضوعية (صواب أو خطأ)"
    description: "حدد ما إذا كانت العبارة صحيحة أم خاطئة"
    
  - type: tf
    question: "يعتبر النظام التعليمي نظاما مغلقا لأنه يعتمد على قوانين ثابتة لا تتغير بتغير الظروف البيئية المحيطة"
    points: 1
    choices:
      - "صح"
      - "خطأ"
    answer: "خطأ"
    
  - type: tf
    question: "كفاءة النظام التعليمي لا تتوقف فقط على أداء أجزائه منفردة بل على درجة الترابط والتفاعل بين هذه الأجزاء"
    points: 1
    choices:
      - "صح"
      - "خطأ"
    answer: "صح"

  - type: tf
    question: "تصنف المناهج والوسائل التعليمية ضمن عنصر العمليات في بنية النظام التعليمي"
    points: 1
    choices:
      - "صح"
      - "خطأ"
    answer: "خطأ"

  - type: tf
    question: "الأهداف التربوية هي قيم ثابتة ومطلقة لا تتأثر باختلاف الظروف السياسية أو الاقتصادية للمجتمع"
    points: 1
    choices:
      - "صح"
      - "خطأ"
    answer: "خطأ"

  - type: tf
    question: "التغذية الراجعة هي الأداة التي تسمح للنظام التعليمي بمراجعة وتطوير نفسه بناء على نقاط القوة والضعف"
    points: 1
    choices:
      - "صح"
      - "خطأ"
    answer: "صح"

  - type: tf
    question: "العلاقة بين التعليم والاقتصاد علاقة تبادلية فالتعليم يزدهر بازدهار الاقتصاد والاقتصاد يتطور بجودة المخرجات التعليمية"
    points: 1
    choices:
      - "صح"
      - "خطأ"
    answer: "صح"

  - type: tf
    question: "في ظل اقتصاد المعرفة تظل العمالة الرخيصة وتوافر الأراضي هما أهم عوامل الإنتاج مقارنة برأس المال الفكري"
    points: 1
    choices:
      - "صح"
      - "خطأ"
    answer: "خطأ"

  - type: tf
    question: "يؤدي النظام المركزي في الإدارة التعليمية إلى سرعة كبيرة في معالجة المشكلات الطارئة في المدارس البعيدة عن العاصمة"
    points: 1
    choices:
      - "صح"
      - "خطأ"
    answer: "خطأ"

  - type: tf
    question: "تعد الهجرة الداخلية من العوامل السكانية التي قد تسبب ضغطا على الموازنات التعليمية وتوزيع الخدمات في مناطق معينة"
    points: 1
    choices:
      - "صح"
      - "خطأ"
    answer: "صح"

  - type: tf
    question: "السلم التعليمي هو هيكل موحد في جميع دول العالم ولا يتأثر بالموارد المالية المتاحة للدولة"
    points: 1
    choices:
      - "صح"
      - "خطأ"
    answer: "خطأ"
    
  - type: instructions
    mainTitle: "ثالثا الأسئلة المقالية (التحليل والاستنتاج)"
    description: "أجب عن الأسئلة التالية بناء على فهمك للنصوص"
    
  - type: essay
    question: "وضح كيف يؤثر العامل الجغرافي على ملامح النظام التعليمي في دولة ما مع ذكر أمثلة لما قد يتأثر بهذا العامل"
    points: 5
    answer: "يؤثر العامل الجغرافي بشكل مباشر على المناخ الذي يحدد طول العام الدراسي وتوقيت الإجازات وتصميم المباني المدرسية وكذلك التضاريس التي تؤثر على توزيع المدارس وسهولة نقل الطلاب والمعلمين"
    
  - type: essay
    question: "وازن بين النظام المركزي والنظام اللامركزي من حيث تأثير كل منهما على روح الابتكار لدى الموظفين وتساوي الفرص التعليمية بين المواطنين"
    points: 5
    answer: "بالنسبة لروح الابتكار يقلل النظام المركزي من الابتكار بسبب الاتكالية بينما يشجع النظام اللامركزي عليه نتيجة منح الصلاحيات أما تساوي الفرص فيتفوق النظام المركزي في تحقيق العدالة بين المناطق بينما قد يؤدي النظام اللامركزي إلى تفاوت في جودة الخدمات"
    
  - type: instructions
    mainTitle: ""
    description: "انتهى الاختبار، ردد معي اللهم إني استودعتك ما قرأت وما حفظت وما تعلمت، فرده إلي عند حاجتي إليه، إنك على كل شيء قدير."
