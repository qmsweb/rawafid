- title: "اختبار في المشاع الإبداعي"
  subject-name: "تكنولوجيا التعليم والتعلم"
  subject-code: "EDUC 221"
  questions: 
    - type: "instructions"
      mainTitle: "أولا الأسئلة الموضوعية (اختيار من متعدد)"
      description: "تخير الإجابة الصحيحة من بين البدائل المعطاة"
      
    - type: "mcq"
      question: "ما هو الهدف الرئيسي لمؤسسة المشاع الإبداعي كما ورد في المقرر"
      points: 1
      choices:
        - "حفظ جميع حقوق النشر للمؤلفين ومنع تداول أعمالهم"
        - "زيادة مشاركة المواد الإبداعية في مجالات متنوعة كالثقافة والتعليم"
        - "بيع المحتوى العلمي والثقافي للشركات الكبرى"
        - "تحويل جميع الأعمال الإبداعية إلى ملكية عامة دون شروط"
      [span_0](start_span)answer: "زيادة مشاركة المواد الإبداعية في مجالات متنوعة كالثقافة والتعليم[span_0](end_span)"
      
    - type: "mcq"
      question: "ماذا يقصد باختصار CC REL في نظام رخص المشاع الإبداعي"
      points: 1
      choices:
        - "النموذج التقليدي لحقوق التأليف والنشر"
        - "المشاع الرقمي للمحتوى المفتوح"
        - "لغة توضيح حقوق المشاع الإبداعي للبرمجيات"
        - "الرخصة التي تمنع الاستخدام التجاري"
      [span_1](start_span)answer: "لغة توضيح حقوق المشاع الإبداعي للبرمجيات[span_1](end_span)"
      
    - type: "mcq"
      question: "أي من الرخص الآتية تشترط ذكر اسم المؤلف وتسمح بالاستخدام التجاري ولكنها تمنع التعديل أو إنتاج عمل مشتق"
      points: 2
      choices:
        - "CC-BY"
        - "CC-BY-SA"
        - "CC-BY-ND"
        - "CC-BY-NC"
      [span_2](start_span)answer: "CC-BY-ND[span_2](end_span)"
      
    - type: "mcq"
      question: "تريد نشر ملف إلكتروني تعليمي وترغب في أن يطوره المعلمون الآخرون ويشتقوا منه بشرط ألا يبيعوه أو يتربحوا منه فما هي الرخصة الأنسب لك"
      points: 2
      choices:
        - "CC-BY-NC"
        - "CC-BY-ND"
        - "CC-BY-NC-ND"
        - "CC-BY"
      [span_3](start_span)answer: "CC-BY-NC[span_3](end_span)"
      
    - type: "instructions"
      mainTitle: "ثانيا الأسئلة الموضوعية (صواب أو خطأ)"
      description: "حدد ما إذا كانت العبارة صحيحة أم خاطئة"
      
    - type: "tf"
      question: "المشاع الإبداعي هي مؤسسة ربحية تسعى لبيع المواد الإبداعية في مجالات متنوعة"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      [span_4](start_span)answer: "خطأ[span_4](end_span)"
      
    - type: "tf"
      question: "رخص المشاع الإبداعي تحقق توازنا في النموذج التقليدي كل الحقوق محفوظة الذي أنشأه قانون حقوق التأليف والنشر"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      [span_5](start_span)answer: "صح[span_5](end_span)"
      
    - type: "tf"
      question: "علامة الاستخدام غير التجاري تعني أن يتشارك الناس أعمالك مطبوعة أو رقمية ويسمح لهم بالتربح منها"
      points: 1
      choices:
        - "صح"
        - "خطأ"
      [span_6](start_span)answer: "خطأ[span_6](end_span)"
      
    - type: "tf"
      question: "المشاع الرقمي هو تجمع للمحتوى يمكن نسخه وإعادة توزيعه خارج نطاق قانون حقوق التأليف والنشر"
      points: 2
      choices:
        - "صح"
        - "خطأ"
      [span_7](start_span)answer: "خطأ[span_7](end_span)"
      
    - type: "instructions"
      mainTitle: "ثالثا الأسئلة المقالية (التحليل والاستنتاج)"
      description: "أجب عن الأسئلة التالية بناء على فهمك للنصوص"
      
    - type: "essay"
      question: "بين الفروق الجوهرية بين رخصة CC-BY ورخصة CC-BY-NC-ND من حيث الصلاحيات الممنوحة للمستخدم"
      points: 3
      [span_8](start_span)answer: "رخصة CC-BY تشترط فقط ذكر اسم المؤلف وتسمح بالاستخدام التجاري والتعديل والاشتقاق، بينما رخصة CC-BY-NC-ND تشترط ذكر المؤلف ولكنها تمنع الاستخدام التجاري وتمنع أيضا التعديل أو إنتاج عمل مشتق[span_8](end_span)."
      
    - type: "essay"
      question: "كيف تساهم رخص المشاع الإبداعي في إثراء المحتوى العلمي والثقافي مقارنة بنظام حقوق النشر التقليدي"
      points: 4
      [span_9](start_span)[span_10](start_span)answer: "تساهم من خلال توفير تراخيص قانونية سهلة الفهم والاستخدام تمنح الأفراد والمؤسسات طريقة مبسطة لتحديد صلاحيات أعمالهم مما يخلق مشاعا رقميا يمكن نسخه وتعديله والاشتقاق منه بمرونة، وهذا يحقق توازنا يفتقده نموذج كل الحقوق محفوظة التقليدي[span_9](end_span)[span_10](end_span)."
      
    - type: "instructions"
      description: "انتهى الاختبار، ردد معي اللهم إني استودعتك ما قرأتُ وما حفظتُ وما تعلمتُ، فرده إليّ عند حاجتي إليه، إنك على كل شيء قدير."
