- title: "اختبار في تحليل نتائج الاختبار التحصيلي"
  subject-name: "القياس والتقويم"
  subject-code: "EDUC214"
  questions:
    - type: instructions
      mainTitle: "تنبيه"
      description: "المسائل الرياضية تمت كتابتها شفهيًا لأن نظام روافد لا يدعم المسائل الرياضية، وفي الاختبار النهائي يطلب منكم كتابة القانون والتعويض."
    - type: instructions
      mainTitle: "أولا الأسئلة الموضوعية (اختيار من متعدد)"
      description: "اختر الإجابة الصحيحة من بين البدائل المعطاة"
    - question: "يعرف معامل الصعوبة للفقرة بأنه"
      type: mcq
      points: 1
      choices:
        - "نسبة الطلبة الذين أجابوا على الفقرة إجابة صحيحة"
        - "نسبة الطلبة الذين أجابوا على الفقرة إجابة خاطئة"
        - "قدرة الفقرة على التمييز بين الطلبة"
        - "الاتساق في درجات الأفراد"
      answer: "نسبة الطلبة الذين أجابوا على الفقرة إجابة صحيحة"
    - question: "تتراوح قيمة معامل الصعوبة (والسهولة) ما بين"
      type: mcq
      points: 1
      choices:
        - "1 و -1"
        - "صفر و -1"
        - "صفر و 1"
        - "-2 و +2"
      answer: "صفر و 1"
    - question: "معامل الصعوبة + معامل السهولة يساوى"
      type: mcq
      points: 1
      choices:
        - "-1"
        - "1"
        - "صفر"
        - "2"
      answer: "1"
    - question: "من خلال تقديرات علماء القياس لمعاملات الصعوبة (أو السهولة)، فإن أفضل سؤال مما يلي هو الذي معامله"
      type: mcq
      points: 1
      choices:
        - "30%"
        - "47%"
        - "52%"
        - "49% و 53%"
      answer: "49% و 53%"
    - question: "تتراوح قيمة معامل التمييز ما بين"
      type: mcq
      points: 1
      choices:
        - "صفر و 1"
        - "1 و -1"
        - "1 و صفر"
        - "0.5 و 1"
      answer: "1 و -1"
    - question: "تعتبر الفقرة ذات تمييز جيد (حسب معيار إيبل) إذا كان معامل التمييز لها"
      type: mcq
      points: 1
      choices:
        - "أقل من 0.19"
        - "بين 0.20 - 0.29"
        - "بين 0.30 - 0.39"
        - "أكبر من 0.40"
      answer: "بين 0.30 - 0.39"
    - question: "إذا كان معامل تمييز فقرة ما (سالب) فإن ذلك يعني أن الفقرة"
      type: mcq
      points: 1
      choices:
        - "جيدة"
        - "لا بأس بها"
        - "ينصح بحذفها"
        - "ضعيفة"
      answer: "ينصح بحذفها"
    - question: "إذا أجاب على المفردة إجابة صحيحة من الفئة الدنيا عدد أكبر من الفئة العليا، فإن معامل التمييز"
      type: mcq
      points: 1
      choices:
        - "قيمة سالبة"
        - "صفر"
        - "قيمة موجبة"
        - "واحد"
      answer: "قيمة سالبة"
    - question: "أفضل فاعلية لمموهات (بدائل خاطئة) لفقرة تتكون من (5 بدائل) هو"
      type: mcq
      points: 1
      choices:
        - "0.25"
        - "-0.25"
        - "0.20"
        - "-0.20"
      answer: "-0.25"
    - question: "أفضل فاعلية مموهات لفقرة من (3 بدائل) هو"
      type: mcq
      points: 1
      choices:
        - "0.50"
        - "-0.50"
        - "0.33"
        - "-0.33"
      answer: "-0.50"
    - question: "نسبة التخمين الصائبة تكون أكبر ما يمكن للفقرة الموضوعية ذات البدائل"
      type: mcq
      points: 1
      choices:
        - "الثنائية"
        - "الثلاثية"
        - "الرباعية"
        - "الخماسية"
      answer: "الثنائية"
    - question: "في معادلات ضبط التخمين نفترض أن"
      type: mcq
      points: 1
      choices:
        - "كل إجابة خاطئة ناتجة عن عدم معرفة"
        - "كل إجابة صحيحة ناتجة عن معرفة"
        - "كل إجابة متروكة ناتجة عن النسيان"
        - "جميع ما ذكر"
      answer: "جميع ما ذكر"
    - question: "أي المقاييس الإحصائية الآتية يتأثر بالقيم المتطرفة (الشاذة)؟"
      type: mcq
      points: 1
      choices:
        - "الوسط الحسابي"
        - "المدى"
        - "الانحراف المعياري"
        - "جميع ما ذكر"
      answer: "جميع ما ذكر"
    - question: "عند تحليل نتائج الاختبارات، فإن أكثر مقياس يستخدم لتمثيل النزعة المركزية هو"
      type: mcq
      points: 1
      choices:
        - "الوسيط"
        - "المنوال"
        - "المتوسط الحسابي"
        - "الانحراف المعياري"
      answer: "المتوسط الحسابي"
    - question: "مؤشر إحصائي يعكس تشتت الدرجات هو"
      type: mcq
      points: 1
      choices:
        - "الوسيط"
        - "المتوسط الحسابي"
        - "الانحراف المعياري"
        - "المنوال"
      answer: "الانحراف المعياري"
    - question: "أراد معلم تحليل نتائج طلاب صفه البالغ عددهم (38)، فقام بتقسيم الطلبة إلى مجموعتين عليا ودنيا. سيكون عدد الطلاب في كل مجموعة"
      type: mcq
      points: 1
      choices:
        - "10"
        - "12"
        - "19"
        - "لا شيء مما ذكر"
      answer: "19"
    - question: "فقرة مزاوجة مكونة من (5) مقدمات و (6) إجابات، فإن نسبة التخمين عند إجابة الطالب على المقدمة الثالثة هي"
      type: mcq
      points: 1
      choices:
        - "0.75"
        - "0.33"
        - "0.25"
        - "0.50"
      answer: "0.25"
    - question: "حصل طالب على الدرجة (22) في اختبار مكون من (25) فقرة (اختيار من متعدد بـ 4 بدائل)، فإن درجته بعد معاقبته على التخمين هي"
      type: mcq
      points: 1
      choices:
        - "21.25"
        - "20.75"
        - "21"
        - "19"
      answer: "21"
    - question: "إذا كان الوسط الحسابي والمدى لدرجات الطلبة (13) و (15) على التوالي، فإنهما يصبحان بعد زيادة درجة (واحدة) لكل طالب"
      type: mcq
      points: 1
      choices:
        - "14 و 16"
        - "14 و 15"
        - "13 و 15"
        - "14 و 14"
      answer: "14 و 15"
    - question: "الوسط الحسابي والوسيط لمجموعة الدرجات (4، 5، 6، 7، 8) هما على التوالي"
      type: mcq
      points: 1
      choices:
        - "6 و 5"
        - "6 و 6"
        - "30 و 8"
        - "5 و 6"
      answer: "6 و 6"

    - type: instructions
      mainTitle: "ثانيا أسئلة الصواب والخطأ"
      description: "حدد ما إذا كانت كل عبارة من العبارات التالية صحيحة أم خاطئة"
    - question: "إذا كان معامل تمييز الفقرة (1.00) فإن صعوبتها ستكون بالضرورة (0.50)"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
    - question: "تتأثر جميع مقاييس النزعة المركزية بالقيم المتطرفة"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
    - question: "يتأثر الوسط الحسابي بالقيم الشاذة أو المتطرفة"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "صح"
    - question: "إذا أجاب جميع الطلبة على الفقرة إجابة خاطئة فإن معامل السهولة يساوي (1)"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
    - question: "كلما كان معامل سهولة السؤال بعيدا عن (0.5) كان السؤال أفضل"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"
    - question: "نسبة التخمين في أسئلة الاختيار من متعدد (من 4 بدائل) هي 50%"
      type: tf
      points: 1
      choices:
        - "صح"
        - "خطأ"
      answer: "خطأ"

    - type: instructions
      mainTitle: "ثالثا الأسئلة المقالية"
      description: "أجب عن الأسئلة المقالية التالية بصورة واضحة ومفصلة مدعما إجابتك بالأمثلة"
    - question: "يمثل الجدول الآتي إجابات طلاب المجموعة العليا وطلاب المجموعة الدنيا على فقرة اختيار من متعدد (4 بدائل)، علما بأن البديل (ب) هو الصحيح، وعدد الطلاب في كل مجموعة هو (30) طالبا حيث اختار البديل ب 20 طالبا من العليا و 10 من الدنيا، واختار البديل أ طالبين من العليا و 4 من الدنيا. المطلوب احسب صعوبة الفقرة، تمييز الفقرة، فاعلية البديل (أ)، وقيّم الفقرة من حيث خصائصها"
      type: essay
      points: 3
      answer: "صعوبة الفقرة تساوي 0.50 وهي ممتازة. تمييز الفقرة يساوي 0.33 وهو جيد. فاعلية البديل (أ) تساوي سالب 0.06. وتعتبر الفقرة جيدة لأن معامل صعوبتها مثالي ومعامل تمييزها يقع ضمن المدى الجيد"
    - question: "إذا كان عدد الطلاب في كل مجموعة من المجموعتين العليا والدنيا (45) طالبا، وكان عدد الطلاب الذين أجابوا إجابة صحيحة على الفقرة من المجموعة العليا (30) طالبا، ومن المجموعة الدنيا (15) طالبا. المطلوب أوجد معامل الصعوبة ومعامل التمييز للفقرة مع الحكم على النتيجة"
      type: essay
      points: 3
      answer: "معامل الصعوبة يساوي 0.50 ومعامل التمييز يساوي 0.33. وتعد الفقرة جيدة جدا لأنها تتمتع بصعوبة مثالية وتمييز جيد"
    - question: "أجاب 30 طالبا عن سؤال مقالي الدرجة العظمى له (10 درجات)، فإذا كان مجموع درجات الطلاب المحصلة على هذا السؤال هو (200 درجة). المطلوب احسب معامل السهولة أو الصعوبة"
      type: essay
      points: 3
      answer: "يتم حساب معامل الصعوبة للأسئلة متعددة التصحيح بقسمة مجموع درجات جميع الطلاب على حاصل ضرب عدد الطلاب في الدرجة العظمى للسؤال. أي 200 مقسومة على 300 مما يعطي ناتجا يقارب 0.67 أو 66.7 بالمئة"
