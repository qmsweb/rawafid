    - type: instructions
      mainTitle: "ثالثا الأسئلة المقالية"
      description: "أجب عن الأسئلة المقالية التالية بصورة واضحة ومفصلة مدعما إجابتك بالأمثلة"
    - question: "وضحي أربعا من العوامل المؤثرة في دقة تقدير معامل ثبات إعادة الاختبار"
      type: essay
      points: 4
      answer: "انتقال أثر التدريب حيث تزيد خبرات المفحوصين وانتقال أثر التعليم والمزاج وظروف تطبيق الاختبار وعامل التذكر للمعلومات"
    - question: "اشرح الفرق بين طريقة إعادة الاختبار وطريقة الصور المتكافئة لتقدير الثبات"
      type: essay
      points: 4
      answer: "إعادة الاختبار تعتمد على تطبيق نفس الاختبار على نفس مجموعة الأفراد ثم إعادته بعد فاصل زمني لتقدير معامل الاستقرار بينما الصور المتكافئة تتضمن إعداد صورتين متكافئتين وتطبيقهما على نفس المجموعة وإيجاد معامل الارتباط"
    - question: "أعطى المعلم اختبارين في نفس الوحدة الدراسية بفارق أسبوع وكانت نتائج الطلاب مختلفة ما تفسير ذلك من وجهة نظرك وفق ما درسته عن الثبات"
      type: essay
      points: 4
      answer: "يدل هذا الاختلاف على ضعف في الثبات وتحديدا معامل الاستقرار ويعزى ذلك لمصادر الخطأ مثل انتقال أثر التدريب أو تذكر الأسئلة أو اختلاف ظروف التطبيق"
    - question: "قارن بين الصدق التنبؤي والصدق التلازمي من حيث المفهوم"
      type: essay
      points: 4
      answer: "الصدق التنبؤي يمثل درجة تنبؤ علامات الأداة بمحك يقاس مستقبلا بينما الصدق التلازمي يمثل العلاقة بين درجات الاختبار وقياسات المحك في نفس الفترة الزمنية أو بفاصل قصير جدا"
