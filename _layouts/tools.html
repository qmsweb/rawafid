<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: "روافد - الأدوات" }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ '/images/favicon.png' | relative_url }}" type="image/jpg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
  <meta property="og:title" content="{{ page.title | default: 'روافد' }}">
  <meta property="og:description" content="{{ page.description | default: 'منصة تعليمية مجانية خصيصًا لطلبة اللغة العربية بجامعة الشرقية.' }}">
  <meta property="og:image" content="{{ '/images/cover.png' | relative_url }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="website">

  <script>
    (function() {
      const savedTheme = localStorage.getItem('rawafed-theme');
      if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <style>
    /* === المتغيرات === */
    :root {
      --primary-color: #1a2ac6;
      --primary-light-bg: #eff1ff;
      --bg-body: #f4f6fb;
      --bg-card: #ffffff;
      --border-color: #ccd1e0;
      --text-main: #2d2d2d;
      --text-muted: #666666;
      --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
      --hover-shadow: 0 15px 30px -5px rgba(26, 42, 198, 0.15);
      --radius-md: 16px;
    }

    [data-theme="dark"] {
      --primary-color: #7986cb;
      --primary-light-bg: #282a36;
      --bg-body: #121212;
      --bg-card: #1e1e1e;
      --border-color: #333333;
      --text-main: #e0e0e0;
      --text-muted: #a0a0a0;
      --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
      --hover-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "IBM Plex Sans Arabic", sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; padding-top: 80px; padding-bottom: 40px; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

    /* === نظام التحميل === */
    #main-content-area {
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }
    #main-content-area.loaded {
      opacity: 1;
    }

    /* === تنسيقات البانر / الإعلان === */
    .app-banner {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-top: 20px;
      margin-bottom: 30px;
      box-shadow: var(--card-shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border: 1px solid var(--border-color);
    }
    .banner-content {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .banner-img {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      object-fit: contain; /* لضمان ظهور الشعار بالكامل */
      background-color: #7F288F; /* لون خلفية الأيقونة المطلوب */
      padding: 10px; /* مسافة داخلية لترتيب الشعار */
      box-shadow: var(--card-shadow);
    }
    .banner-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .banner-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-main);
    }
    .banner-icon {
      color: #7F288F; /* لون متناسق مع الشعار */
      font-size: 1.2rem;
    }
    .banner-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .banner-btn {
      background: #7F288F; /* لون الزر ليتماشى مع المنصة */
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    .banner-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: var(--hover-shadow);
    }

    /* === تنسيقات الأدوات (شكل سوق التطبيقات) === */
    .section-title { 
        font-size: 1.3rem; 
        font-weight: 700; 
        color: var(--text-main); 
        margin-bottom: 20px; 
        border-right: 4px solid var(--primary-color); 
        padding-right: 12px; 
    }

    .tools-grid { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); 
        gap: 20px; 
        margin-bottom: 25px; 
    }
    
    .tool-item { 
        background: transparent; 
        border: none; 
        padding: 10px; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        gap: 12px; 
        cursor: pointer; 
        text-align: center; 
        transition: all 0.3s ease; 
    }
    
    .tool-item:hover { 
        transform: translateY(-4px); 
    }
    
    .tool-icon { 
        width: 70px; 
        height: 70px; 
        border-radius: 50%; 
        background: var(--bg-card); 
        color: var(--primary-color); 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-size: 1.6rem; 
        box-shadow: var(--card-shadow);
        border: 1px solid var(--border-color);
        transition: 0.3s ease; 
    }
    
    .tool-item:hover .tool-icon {
        background: var(--primary-color);
        color: #ffffff;
        border-color: var(--primary-color);
        box-shadow: var(--hover-shadow);
    }

    .tool-name { 
        font-size: 0.95rem; 
        font-weight: 600; 
        color: var(--text-main); 
    }

    /* === التجاوب مع الشاشات === */
    @media (max-width: 992px) {
      .tools-grid { grid-template-columns: repeat(3, 1fr); }
    }
    
    @media (max-width: 768px) {
      .tools-grid { grid-template-columns: repeat(2, 1fr); }
      .app-banner {
          flex-direction: column;
          align-items: flex-start;
          text-align: right;
      }
      .banner-btn {
          width: 100%;
          text-align: center;
      }
    }
  </style>
</head>
<body>

  {% include header.html %}

  <div class="container">
    
    {{ content }}

    <div id="main-content-area">
        
        <div class="app-banner">
            <div class="banner-content">
                <img src="https://sawamet.jassim.one/images/sawamet-logo.png" alt="شعار منصة صوامت" class="banner-img">
                <div class="banner-info">
                    <div class="banner-title">
                        <i class="fas fa-external-link-alt banner-icon"></i>
                        <span>منصة صوامت</span>
                    </div>
                    <p class="banner-desc">منصة مجانية تضم عدة أدوات تساعد الطلبة والباحثين والمهتمين بفرع علم الأصوات على فهم الصوامت العربية.</p>
                </div>
            </div>
            <button class="banner-btn" onclick="window.open('https://sawamet.jassim.one/', '_blank')">فتح الرابط</button>
        </div>

        <h3 class="section-title">الأدوات</h3>
        <div class="tools-grid">
            <div class="tool-item" onclick="window.location.href='/gpa-calculator'">
                <div class="tool-icon"><i class="fas fa-calculator"></i></div>
                <div class="tool-name">حاسبة المعدل</div>
            </div>
            <div class="tool-item" onclick="window.location.href='/tawtheeq-tool'">
                <div class="tool-icon"><i class="fas fa-quote-right"></i></div>
                <div class="tool-name">توثيق المراجع</div>
            </div>
            <div class="tool-item" onclick="window.location.href='/calendar'">
                <div class="tool-icon"><i class="fas fa-calendar-alt"></i></div>
                <div class="tool-name">التقويم الأكاديمي</div>
            </div>
            <div class="tool-item" onclick="window.location.href='/study-plan'">
                <div class="tool-icon"><i class="fas fa-book-open"></i></div>
                <div class="tool-name">الخطة الدراسية</div>
            </div>
        </div>

    </div> 
    
    {% include footer.html %}
  </div>

<script>
  /* === 1. إعدادات الثيم === */
  function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('rawafed-theme', newTheme);
  }

  /* === 2. إظهار المحتوى === */
  document.addEventListener('DOMContentLoaded', () => {
    const mainArea = document.getElementById('main-content-area');
    setTimeout(() => {
        mainArea.classList.add('loaded');
    }, 100);
  });
</script>

</body>
</html>
