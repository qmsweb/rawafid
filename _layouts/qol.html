<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="لعبة قل ولا تقل التفاعلية لطلبة اللغة العربية - منصة روافد.">
  <title>{{ page.title | default: "روافد - لعبة قل ولا تقل" }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ '/images/favicon.png' | relative_url }}" type="image/jpg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
   
  <meta property="og:title" content="لعبة قل ولا تقل - روافد">
  <meta property="og:description" content="اختبر معلوماتك اللغوية وتعرف على الأخطاء الشائعة والصواب في اللغة العربية.">
  <meta property="og:image" content="{{ '/images/cover.png' | relative_url }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="website">

  <script>
    (function() {
      const savedTheme = localStorage.getItem('rawafed-theme');
      if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <style>
    /* === المتغيرات === */
    :root {
      --primary-color: #1a2ac6;
      --primary-light-bg: #eff1ff;
      --bg-body: #f4f6fb;
      --bg-card: #ffffff;
      --border-color: #ccd1e0;
      --text-main: #2d2d2d;
      --text-muted: #666666;
      --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
      --hover-shadow: 0 15px 30px -5px rgba(26, 42, 198, 0.1);
      --radius-md: 12px;
    }

    [data-theme="dark"] {
      --primary-color: #7986cb;
      --primary-light-bg: #282a36;
      --bg-body: #121212;
      --bg-card: #1e1e1e;
      --border-color: #333333;
      --text-main: #e0e0e0;
      --text-muted: #a0a0a0;
      --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
      --hover-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "IBM Plex Sans Arabic", sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; padding-top: 80px; padding-bottom: 40px; transition: background-color 0.3s ease, color 0.3s ease; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

    #main-content-area {
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }
    #main-content-area.loaded {
      opacity: 1;
    }

    /* === تصميم لعبة قل ولا تقل === */
    .game-wrapper {
      max-width: 650px;
      margin: 20px auto 50px auto;
      text-align: center;
    }

    .game-header {
      margin-bottom: 30px;
    }

    .game-logo {
      width: 130px;
      height: 130px;
      object-fit: contain;
      margin-bottom: 15px;
      border-radius: 20px;
      background: var(--bg-card);
      padding: 10px;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border-color);
    }

    .game-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 8px;
    }

    .game-desc {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .score-board {
      display: inline-block;
      background: var(--bg-card);
      padding: 8px 25px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      margin-bottom: 25px;
      color: var(--text-main);
    }

    .question-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 35px 25px;
      box-shadow: var(--card-shadow);
      margin-bottom: 20px;
    }

    .question-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 30px;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .option-btn {
      background: var(--bg-body);
      border: 2px solid var(--border-color);
      color: var(--text-main);
      font-size: 1.2rem;
      padding: 18px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--primary-color);
      background: var(--primary-light-bg);
      color: var(--primary-color);
      transform: translateY(-2px);
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    /* ألوان الإجابات */
    .option-btn.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; }
    [data-theme="dark"] .option-btn.correct { background: rgba(40, 167, 69, 0.15) !important; color: #4ade80 !important; }
    
    .option-btn.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }
    [data-theme="dark"] .option-btn.wrong { background: rgba(220, 53, 69, 0.15) !important; color: #f87171 !important; }

    /* بطاقة النتيجة والتغذية الراجعة */
    .feedback-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 25px;
      box-shadow: var(--card-shadow);
      display: none;
      animation: slideUp 0.4s ease forwards;
    }

    .feedback-card.visible {
      display: block;
    }

    .feedback-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    .feedback-icon.success { color: #28a745; }
    [data-theme="dark"] .feedback-icon.success { color: #4ade80; }
    .feedback-icon.error { color: #dc3545; }
    [data-theme="dark"] .feedback-icon.error { color: #f87171; }

    .feedback-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text-main);
    }

    .feedback-reason {
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 20px;
      font-size: 1.05rem;
    }

    .next-btn {
      background: var(--primary-color);
      color: #ffffff;
      border: none;
      padding: 12px 30px;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .next-btn:hover {
      box-shadow: var(--hover-shadow);
      transform: translateY(-2px);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === شاشات الجوال === */
    @media (max-width: 768px) {
      .options-grid { grid-template-columns: 1fr; }
      .game-title { font-size: 1.7rem; }
      .question-text { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  {% include header.html %}

  <div class="container">
    <div id="main-content-area">
        
      <div class="game-wrapper">
        
        <div class="game-header">
          <img src="{{ 'images/apps/qol.png' | relative_url }}" alt="شعار لعبة قل ولا تقل" class="game-logo" onerror="this.src='https://via.placeholder.com/130x130?text=Logo'">
          <h1 class="game-title">لعبة: قُلْ ولا تَقُلْ</h1>
          <p class="game-desc">اختبر لغتك، وتعرّف على الفصيح والأفصح، والصواب والخطأ</p>
        </div>

        <div class="score-board">
          النتيجة: <span id="current-score" style="color: var(--primary-color);">0</span> / <span id="total-questions">0</span>
        </div>

        <div class="question-card" id="question-card">
          <div class="question-text">أيهما التعبير الصحيح؟</div>
          <div class="options-grid" id="options-container">
            </div>
        </div>

        <div class="feedback-card" id="feedback-card">
          <div id="feedback-icon" class="feedback-icon"></div>
          <div class="feedback-title" id="feedback-title"></div>
          <div class="feedback-reason" id="feedback-reason"></div>
          <button class="next-btn" onclick="loadNextQuestion()">
            <span>السؤال التالي</span>
            <i class="fas fa-arrow-left"></i>
          </button>
        </div>

      </div>

    </div>
  </div>

  {% include footer.html %}

<script>
  /* === 1. إعدادات الثيم === */
  function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('rawafed-theme', newTheme);
  }

  /* === 2. بيانات اللعبة ومنطق التشغيل === */
  // يمكنك إضافة أو تعديل الأسئلة هنا بحرية
  const questionsData = [
    {
      correct: "مُبَارَك",
      wrong: "مَبْرُوك",
      reason: "نقول (مُبارَك) لأنها اسم مفعول من الفعل (بارَكَ)، أما (مَبْروك) فهي من الفعل (بَرَكَ) كأن نقول: برك الجمل."
    },
    {
      correct: "تخرجتُ في الجامعة",
      wrong: "تخرجتُ من الجامعة",
      reason: "الفعل (تخرّج) يتعدى بحرف الجر (في) للدلالة على الوعاء الذي احتوى الطالب وتلقى فيه العلم، وليس (من)."
    },
    {
      correct: "نَفِدَت الكمية",
      wrong: "نَفَذَت الكمية",
      reason: "(نَفِدَ) بالدال تعني انتهى وفني، كما في قوله تعالى: {قُل لَّوْ كَانَ الْبَحْرُ مِدَادًا لِّكَلِمَاتِ رَبِّي لَنَفِدَ الْبَحْرُ}. أما (نَفَذَ) بالذال فتعني اخترق ومرّ."
    },
    {
      correct: "غير المباشر",
      wrong: "الغير مباشر",
      reason: "كلمة (غير) لا تقبل (أل) التعريف لأنها متوغلة في الإبهام، والصواب تعريف المضاف إليه بعدها."
    },
    {
      correct: "مُدِيرُون",
      wrong: "مُدَرَاء",
      reason: "جمع (مُدِير) جمع مذكر سالم هو (مُدِيرون)، ولا تُجمع جمع تكسير على (مُدَرَاء)."
    }
  ];

  let currentQuestionIndex = 0;
  let score = 0;
  let currentOptions = [];

  const elements = {
    mainArea: document.getElementById('main-content-area'),
    totalQuestions: document.getElementById('total-questions'),
    currentScore: document.getElementById('current-score'),
    optionsContainer: document.getElementById('options-container'),
    feedbackCard: document.getElementById('feedback-card'),
    feedbackIcon: document.getElementById('feedback-icon'),
    feedbackTitle: document.getElementById('feedback-title'),
    feedbackReason: document.getElementById('feedback-reason'),
  };

  // خلط المصفوفة (لتغيير أماكن الأزرار يميناً ويساراً)
  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function initGame() {
    elements.totalQuestions.textContent = questionsData.length;
    loadQuestion();
    // إظهار المحتوى بتأثير سلس
    setTimeout(() => {
      elements.mainArea.classList.add('loaded');
    }, 100);
  }

  function loadQuestion() {
    // إعادة تعيين الواجهة للسؤال الجديد
    elements.feedbackCard.classList.remove('visible');
    elements.optionsContainer.innerHTML = '';
    
    const currentQ = questionsData[currentQuestionIndex];
    currentOptions = [
      { text: currentQ.correct, isCorrect: true },
      { text: currentQ.wrong, isCorrect: false }
    ];
    
    shuffleArray(currentOptions);

    currentOptions.forEach((option, index) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = option.text;
      btn.onclick = () => checkAnswer(index, btn);
      elements.optionsContainer.appendChild(btn);
    });
  }

  function checkAnswer(selectedIndex, selectedBtn) {
    const isCorrect = currentOptions[selectedIndex].isCorrect;
    const currentQ = questionsData[currentQuestionIndex];
    const allButtons = elements.optionsContainer.querySelectorAll('.option-btn');

    // تعطيل الأزرار بعد الاختيار
    allButtons.forEach(btn => btn.disabled = true);

    if (isCorrect) {
      selectedBtn.classList.add('correct');
      score++;
      elements.currentScore.textContent = score;
      showFeedback(true, "أحسنت! إجابة صحيحة", currentQ.reason);
    } else {
      selectedBtn.classList.add('wrong');
      // إظهار الإجابة الصحيحة باللون الأخضر
      allButtons.forEach((btn, idx) => {
        if (currentOptions[idx].isCorrect) {
          btn.classList.add('correct');
        }
      });
      showFeedback(false, "إجابة خاطئة، تذكّر:", currentQ.reason);
    }
  }

  function showFeedback(isSuccess, title, reason) {
    elements.feedbackIcon.className = `feedback-icon fas ${isSuccess ? 'fa-check-circle success' : 'fa-times-circle error'}`;
    elements.feedbackTitle.textContent = title;
    elements.feedbackTitle.style.color = isSuccess ? (document.documentElement.getAttribute('data-theme') === 'dark' ? '#4ade80' : '#28a745') : (document.documentElement.getAttribute('data-theme') === 'dark' ? '#f87171' : '#dc3545');
    
    // إبراز الكلمة الصحيحة في التبرير
    const formattedReason = reason.replace(/\((.*?)\)/g, '<strong style="color:var(--primary-color);">($1)</strong>');
    elements.feedbackReason.innerHTML = formattedReason;
    
    // إذا كان هذا آخر سؤال، قم بتغيير نص زر "السؤال التالي"
    const nextBtn = elements.feedbackCard.querySelector('.next-btn');
    if (currentQuestionIndex === questionsData.length - 1) {
      nextBtn.innerHTML = '<span>إنهاء اللعبة</span> <i class="fas fa-flag-checkered"></i>';
    } else {
      nextBtn.innerHTML = '<span>السؤال التالي</span> <i class="fas fa-arrow-left"></i>';
    }

    elements.feedbackCard.classList.add('visible');
  }

  function loadNextQuestion() {
    if (currentQuestionIndex < questionsData.length - 1) {
      currentQuestionIndex++;
      loadQuestion();
    } else {
      showFinalResult();
    }
  }

  function showFinalResult() {
    elements.feedbackCard.classList.remove('visible');
    const container = document.getElementById('question-card');
    container.innerHTML = `
      <div style="text-align: center; padding: 20px 0;">
        <i class="fas fa-trophy" style="font-size: 4rem; color: #f59e0b; margin-bottom: 20px;"></i>
        <h2 style="font-size: 1.8rem; margin-bottom: 15px; color: var(--text-main);">انتهت اللعبة!</h2>
        <p style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 25px;">لقد حصلت على ${score} من ${questionsData.length}</p>
        <button class="next-btn" onclick="location.reload()">
          <i class="fas fa-redo"></i>
          <span>إعادة اللعب</span>
        </button>
      </div>
    `;
  }

  // تشغيل اللعبة عند تحميل الصفحة
  document.addEventListener('DOMContentLoaded', initGame);

</script>

</body>
</html>
